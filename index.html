              <button className="btn btn-ghost" onClick={() => setStep('paste')}>← Back</button>
              <button className="btn btn-primary" onClick={doImport} disabled={matchedCount === 0}>
                Import {totalTestsToImport} test{totalTestsToImport === 1 ? '' : 's'} into {matchedCount} player{matchedCount === 1 ? '' : 's'}
              </button>
            </div>
          </>
        )}

        {step === 'done' && (
          <div style={{textAlign:'center', padding:'30px 20px'}}>
            <div style={{fontSize:48, marginBottom:12}}>✓</div>
            <div style={{fontSize:16, fontWeight:700, marginBottom:6}}>Import complete</div>
            <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:20}}>
              Added {totalTestsToImport} test result{totalTestsToImport === 1 ? '' : 's'} across {matchedCount} player{matchedCount === 1 ? '' : 's'}.
              <br/>Open any player's profile → Gym Tests tab to see the data.
            </div>
            <button className="btn btn-primary" onClick={onClose}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PLAYER PROFILE — gym tests, goals, feedback, skill grades
// ═══════════════════════════════════════════════════════════
const DEFAULT_SKILLS = [
  'Catch & Pass', 'Tackle Technique', 'Ball Carries', 'Defensive Line',
  'Kicking', 'Communication', 'Game Awareness', 'Decision Making',
  'Speed', 'Strength & Power'
];
const DEFAULT_GYM_TESTS = [
  '40m Sprint', '20m Sprint', '10m Sprint', 'Yo-Yo Test', '1.2km Time Trial',
  'Bench Press (1RM)', 'Squat (1RM)', 'Chin-ups (max reps)', 'Push-ups (max reps)',
  'Vertical Jump'
];

function PlayerProfileModal({ player, playerIdx, updatePlayer, deletePlayer, onClose, currentSub, teamColor, inRoster, toggleRoster, POSITIONS }) {
  const [tab, setTab] = useState('overview');
  const profile = player.profile || {};

  function patchProfile(patch) {
    updatePlayer(playerIdx, 'profile', { ...profile, ...patch });
  }
  const updField = (f, v) => updatePlayer(playerIdx, f, v);

  const gymTests = Array.isArray(profile.gymTests) ? profile.gymTests : [];
  const testHistory = (profile.testHistory && typeof profile.testHistory === 'object') ? profile.testHistory : {};
  // For each test where lower value is better
  const LOWER_IS_BETTER = new Set(['Bronco', '40m Sprint', '20m Sprint', '10m Sprint', '1.2km Time Trial']);
  // For tests measured in time format MM:SS, lower is better
  const isTimeFormat = (v) => typeof v === 'string' && /^\d+:\d{2}$/.test(v);
  const valToNumber = (v) => {
    if (v == null) return null;
    const s = String(v).trim();
    if (isTimeFormat(s)) {
      const [m, sec] = s.split(':').map(Number);
      return m * 60 + sec;
    }
    const n = parseFloat(s.replace(/[^\d.\-]/g, ''));
    return isNaN(n) ? null : n;
  };

  const goals = Array.isArray(profile.goals) ? profile.goals : [];
  const feedback = Array.isArray(profile.feedback) ? profile.feedback : [];
  const skills = profile.skills && typeof profile.skills === 'object' ? profile.skills : {};
  const today = () => new Date().toISOString().slice(0, 10);

  // === GYM TESTS ===
  function addGymTest() {
    patchProfile({ gymTests: [...gymTests, { id: 'gt_' + Date.now(), date: today(), test: DEFAULT_GYM_TESTS[0], value: '', notes: '' }] });
  }
  function updateGymTest(id, patch) {
    patchProfile({ gymTests: gymTests.map(t => t.id === id ? { ...t, ...patch } : t) });
  }
  function removeGymTest(id) {
    patchProfile({ gymTests: gymTests.filter(t => t.id !== id) });
  }

  // === TEST HISTORY (bulk-imported, compact map) ===
  function updateTestHistory(testName, entries) {
    const next = { ...testHistory };
    if (!entries || entries.length === 0) delete next[testName];
    else next[testName] = entries.sort((a, b) => (a[0] || '').localeCompare(b[0] || ''));
    patchProfile({ testHistory: next });
  }
  function addHistoryEntry(testName) {
    const cur = testHistory[testName] || [];
    updateTestHistory(testName, [...cur, [today(), '']]);
  }
  function updateHistoryEntry(testName, idx, field, value) {
    const cur = (testHistory[testName] || []).slice();
    if (!cur[idx]) return;
    cur[idx] = field === 'date' ? [value, cur[idx][1]] : [cur[idx][0], value];
    updateTestHistory(testName, cur);
  }
  function removeHistoryEntry(testName, idx) {
    const cur = (testHistory[testName] || []).filter((_, i) => i !== idx);
    updateTestHistory(testName, cur);
  }
  function addHistoryTest() {
    const name = window.prompt('Test name to track:');
    if (!name || !name.trim()) return;
    if (testHistory[name.trim()]) return;
    updateTestHistory(name.trim(), [[today(), '']]);
  }

  // === GOALS ===
  function addGoal() {
    patchProfile({ goals: [...goals, { id: 'g_' + Date.now(), text: '', status: 'active', created: today() }] });
  }
  function updateGoal(id, patch) {
    patchProfile({ goals: goals.map(g => g.id === id ? { ...g, ...patch } : g) });
  }
  function removeGoal(id) {
    patchProfile({ goals: goals.filter(g => g.id !== id) });
  }

  // === FEEDBACK ===
  function addFeedback() {
    patchProfile({ feedback: [{ id: 'f_' + Date.now(), date: today(), from: '', text: '' }, ...feedback] });
  }
  function updateFeedback(id, patch) {
    patchProfile({ feedback: feedback.map(f => f.id === id ? { ...f, ...patch } : f) });
  }
  function removeFeedback(id) {
    patchProfile({ feedback: feedback.filter(f => f.id !== id) });
  }

  // === SKILLS ===
  const allSkills = useMemo(() => {
    const list = [...DEFAULT_SKILLS];
    Object.keys(skills).forEach(k => { if (!list.includes(k)) list.push(k); });
    return list;
  }, [skills]);
  function setSkillGrade(name, grade) {
    patchProfile({ skills: { ...skills, [name]: grade } });
  }
  function addCustomSkill() {
    const name = window.prompt('New skill name:');
    if (!name || !name.trim()) return;
    patchProfile({ skills: { ...skills, [name.trim()]: 0 } });
  }
  function removeSkill(name) {
    const next = { ...skills }; delete next[name];
    patchProfile({ skills: next });
  }

  const inTeam = inRoster(player._id);

  const tabBtn = (id, label) => ({
    flex: 1, padding: '9px 10px', fontSize: 12, fontWeight: 700, cursor: 'pointer',
    border: '1px solid ' + (tab === id ? teamColor : 'var(--border)'),
    background: tab === id ? teamColor : 'var(--bg-input)',
    color: tab === id ? 'white' : 'var(--text-secondary)',
    borderRadius: 8, fontFamily: 'inherit', minWidth: 0, whiteSpace: 'nowrap'
  });

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 720, maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto'}}>
        {/* HEADER */}
        <div style={{display:'flex', alignItems:'flex-start', gap:14, marginBottom:14, paddingBottom:14, borderBottom:'1px solid var(--border)'}}>
          <Avatar name={player.name} size={56} />
          <div style={{flex:1, minWidth:0}}>
            <input value={player.name || ''} onChange={e => updField('name', e.target.value)}
              style={{fontSize:20, fontWeight:800, color:'var(--text-primary)', background:'transparent', border:'1px solid transparent', borderRadius:6, padding:'2px 6px', width:'100%', outline:'none', fontFamily:'inherit'}}
              onFocus={e => e.target.style.borderColor='var(--border)'} onBlur={e => e.target.style.borderColor='transparent'} />
            <div style={{display:'flex', alignItems:'center', gap:10, marginTop:6, flexWrap:'wrap'}}>
              <label style={{fontSize:11, color:'var(--text-muted)', fontWeight:600}}>#
                <input value={player.number || ''} onChange={e => updField('number', e.target.value)} placeholder="—"
                  style={{width:40, marginLeft:4, padding:'3px 6px', fontSize:12, fontWeight:700, color:'var(--brand-cyan)', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:5, outline:'none', fontFamily:'inherit'}} />
              </label>
              <select value={player.position || ''} onChange={e => updField('position', e.target.value)}
                style={{padding:'4px 8px', fontSize:11, fontWeight:600, color:'var(--text-secondary)', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:5, fontFamily:'inherit', cursor:'pointer'}}>
                <option value="">Position...</option>
                {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <button onClick={() => toggleRoster(player._id)}
                style={{background: inTeam ? teamColor : 'transparent', color: inTeam ? 'white' : teamColor, border:`1px solid ${inTeam ? teamColor : 'var(--border)'}`, borderRadius:12, padding:'3px 10px', fontSize:10, fontWeight:700, cursor:'pointer'}}>
                {inTeam ? `✓ IN ${currentSub.toUpperCase()}` : `+ ${currentSub.toUpperCase()}`}
              </button>
              <button onClick={() => updField('available', player.available === false)}
                style={{background: player.available === false ? 'var(--red-bg)' : 'var(--green-bg)', color: player.available === false ? 'var(--red)' : 'var(--green)', border:'none', borderRadius:12, padding:'3px 10px', fontSize:10, fontWeight:700, cursor:'pointer'}}>
                {player.available === false ? 'UNAVAILABLE' : 'AVAILABLE'}
              </button>
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6, display:'inline-flex', flexShrink:0}}>
            <Icon name="x" size={18}/>
          </button>
        </div>

        {/* TABS */}
        <div style={{display:'flex', gap:6, marginBottom:16, flexWrap:'wrap'}}>
          <button style={tabBtn('overview', 'Overview')} onClick={() => setTab('overview')}>Overview</button>
          <button style={tabBtn('gym', 'Gym Tests')} onClick={() => setTab('gym')}>Gym Tests</button>
          <button style={tabBtn('feedback', 'Goals & Feedback')} onClick={() => setTab('feedback')}>Goals & Feedback</button>
          <button style={tabBtn('skills', 'Skill Grades')} onClick={() => setTab('skills')}>Skill Grades</button>
        </div>

        {/* OVERVIEW */}
        {tab === 'overview' && (
          <div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:14}}>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Height</label>
                <input className="form-input" placeholder="e.g. 168 cm" value={profile.height || ''} onChange={e => patchProfile({ height: e.target.value })} />
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Weight</label>
                <input className="form-input" placeholder="e.g. 65 kg" value={profile.weight || ''} onChange={e => patchProfile({ weight: e.target.value })} />
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Date of Birth</label>
                <input type="date" className="form-input" value={profile.dob || ''} onChange={e => patchProfile({ dob: e.target.value })} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Notes / Background</label>
              <textarea className="form-textarea" placeholder="Strengths, injury history, school, anything coaches should know..."
                value={profile.notes || ''} onChange={e => patchProfile({ notes: e.target.value })}
                style={{minHeight: 120}} />
            </div>
            <div style={{display:'flex', justifyContent:'flex-end', marginTop:14, paddingTop:14, borderTop:'1px solid var(--border)'}}>
              <button onClick={() => { if (window.confirm(`Remove ${player.name} from the squad? This deletes all profile data.`)) deletePlayer(playerIdx); }}
                style={{background:'var(--red-bg)', color:'var(--red)', border:'1px solid var(--red)', borderRadius:8, padding:'8px 14px', fontSize:12, fontWeight:700, cursor:'pointer'}}>
                Remove player from squad
              </button>
            </div>
          </div>
        )}

        {/* GYM TESTS */}
        {tab === 'gym' && (
          <div>
            {/* === TEST HISTORY (progression cards with sparkline charts) === */}
            {Object.keys(testHistory).length > 0 && (
              <div style={{marginBottom:18}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
                  <div>
                    <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>Progression</div>
                    <div style={{fontSize:11, color:'var(--text-muted)', marginTop:2}}>Latest result, change since first entry, and a chart of all dates.</div>
                  </div>
                  <button className="btn-outline" onClick={addHistoryTest} style={{fontSize:11, padding:'6px 12px', display:'inline-flex', alignItems:'center', gap:5}}>
                    <Icon name="plus" size={11}/> Track a test
                  </button>
                </div>

                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:12}}>
                  {Object.keys(testHistory).sort().map(testName => {
                    const entries = testHistory[testName] || [];
                    const lowerBetter = LOWER_IS_BETTER.has(testName);
                    const sortedEntries = [...entries].sort((a,b) => (a[0]||'').localeCompare(b[0]||''));
                    const valid = sortedEntries.filter(e => e[1] && valToNumber(e[1]) != null)
                      .map(e => ({ date: e[0], raw: e[1], n: valToNumber(e[1]) }));

                    const latest = valid.length ? valid[valid.length - 1] : null;
                    const first = valid.length ? valid[0] : null;
                    const sampleVal = valid.find(v => v.raw)?.raw || '';
                    const isTimeFmt = isTimeFormat(sampleVal);

                    let trend = null;
                    if (valid.length >= 2) {
                      const diff = latest.n - first.n;
                      const better = lowerBetter ? diff < 0 : diff > 0;
                      trend = { diff, better, sameVal: diff === 0 };
                    }

                    const fmtDelta = (d) => {
                      if (isTimeFmt) {
                        const abs = Math.abs(d);
                        const m = Math.floor(abs / 60), s = Math.round(abs % 60);
                        const sign = d < 0 ? '−' : (d > 0 ? '+' : '');
                        return `${sign}${m > 0 ? m + ':' + String(s).padStart(2,'0') : s + 's'}`;
                      }
                      const r = Math.round(d * 100) / 100;
                      if (r === 0) return '0';
                      return (r > 0 ? '+' : '') + (Number.isInteger(r) ? r : r.toFixed(2));
                    };
                    const fmtShortDate = (s) => {
                      if (!s) return '';
                      const [y, m, d] = s.split('-');
                      if (!y || !m || !d) return s;
                      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                      return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} '${y.slice(2)}`;
                    };

                    // Build sparkline SVG path
                    let sparkSvg = null;
                    if (valid.length >= 2) {
                      const W = 320, H = 70, PADX = 12, PADY = 14;
                      const ns = valid.map(v => v.n);
                      const min = Math.min(...ns), max = Math.max(...ns);
                      const range = (max - min) || 1;
                      const x = (i) => PADX + (W - 2*PADX) * (valid.length === 1 ? 0.5 : i / (valid.length - 1));
                      const y = (n) => {
                        const norm = (n - min) / range;
                        const visualPos = lowerBetter ? norm : (1 - norm);
                        return PADY + (H - 2*PADY) * visualPos;
                      };
                      const linePath = valid.map((p, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(p.n).toFixed(1)}`).join(' ');
                      const areaPath = linePath + ` L ${x(valid.length-1).toFixed(1)} ${H-PADY} L ${x(0).toFixed(1)} ${H-PADY} Z`;
                      sparkSvg = (
                        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:H, display:'block'}} preserveAspectRatio="none">
                          <path d={areaPath} fill={teamColor} opacity="0.12" />
                          <path d={linePath} stroke={teamColor} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                          {valid.map((p, i) => (
                            <g key={i}>
                              <circle cx={x(i)} cy={y(p.n)} r="5" fill="white" stroke={teamColor} strokeWidth="2" />
                              {(i === 0 || i === valid.length - 1) && (
                                <text x={x(i)} y={y(p.n) - 9} textAnchor="middle" fontSize="10" fontWeight="700" fill={teamColor}>{p.raw}</text>
                              )}
                            </g>
                          ))}
                        </svg>
                      );
                    }

                    return (
                      <div key={testName} style={{padding:'14px 14px 10px', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:12, boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
                        {/* Header row */}
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                          <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>{testName}</div>
                          {trend && !trend.sameVal && (
                            <span style={{fontSize:10, fontWeight:700, padding:'3px 9px', borderRadius:12,
                              background: trend.better ? 'var(--green-bg)' : 'var(--red-bg)',
                              color: trend.better ? 'var(--green)' : 'var(--red)'}}>
                              {trend.better ? '▲ improved' : '▼ regressed'}
                            </span>
                          )}
                        </div>

                        {/* Latest + Delta */}
                        {latest && (
                          <div style={{display:'flex', alignItems:'baseline', gap:12, marginBottom:8}}>
                            <div>
                              <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Latest</div>
                              <div style={{fontSize:24, fontWeight:800, color:teamColor, lineHeight:1.1}}>{latest.raw}</div>
                              <div style={{fontSize:10, color:'var(--text-muted)', marginTop:2}}>{fmtShortDate(latest.date)}</div>
                            </div>
                            {trend && (
                              <div style={{marginLeft:'auto', textAlign:'right'}}>
                                <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Change</div>
                                <div style={{fontSize:18, fontWeight:800, color: trend.sameVal ? 'var(--text-muted)' : (trend.better ? 'var(--green)' : 'var(--red)'), lineHeight:1.1}}>
                                  {fmtDelta(trend.diff)}
                                </div>
                                <div style={{fontSize:10, color:'var(--text-muted)', marginTop:2}}>vs {fmtShortDate(first.date)}</div>
                              </div>
                            )}
                          </div>
                        )}

                        {/* Sparkline */}
                        {sparkSvg && (
                          <div style={{margin:'8px -2px 4px'}}>
                            {sparkSvg}
                          </div>
                        )}

                        {/* Entry editor — compact, collapsed by default if >2 entries */}
                        <details style={{marginTop:6, fontSize:11}}>
                          <summary style={{cursor:'pointer', fontSize:11, fontWeight:600, color:'var(--text-muted)', listStyle:'none', padding:'4px 0', userSelect:'none'}}>
                            <span style={{display:'inline-flex', alignItems:'center', gap:4}}>
                              <Icon name="chevronRight" size={11}/> {entries.length} {entries.length === 1 ? 'entry' : 'entries'}
                            </span>
                          </summary>
                          <div style={{display:'flex', flexDirection:'column', gap:4, marginTop:6, paddingTop:6, borderTop:'1px solid var(--border)'}}>
                            {entries.map((entry, idx) => (
                              <div key={idx} style={{display:'flex', alignItems:'center', gap:6}}>
                                <input type="date" value={entry[0] || ''} onChange={e => updateHistoryEntry(testName, idx, 'date', e.target.value)}
                                  style={{width:128, padding:'3px 6px', fontSize:11, fontFamily:'inherit', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:4, outline:'none'}} />
                                <input value={entry[1] || ''} onChange={e => updateHistoryEntry(testName, idx, 'value', e.target.value)}
                                  placeholder="—"
                                  style={{flex:1, padding:'3px 6px', fontSize:12, fontWeight:600, color:teamColor, fontFamily:'inherit', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:4, outline:'none', textAlign:'right'}} />
                                <button onClick={() => removeHistoryEntry(testName, idx)} title="Remove entry"
                                  style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:2, display:'inline-flex'}}>
                                  <Icon name="x" size={11}/>
                                </button>
                              </div>
                            ))}
                            <button onClick={() => addHistoryEntry(testName)}
                              style={{marginTop:4, padding:'4px 8px', fontSize:11, fontWeight:600, color:teamColor, background:'transparent', border:`1px dashed ${teamColor}`, borderRadius:4, cursor:'pointer', fontFamily:'inherit'}}>
                              + add date
                            </button>
                          </div>
                        </details>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
              <div style={{fontSize:13, fontWeight:700, color:'var(--text-primary)'}}>One-off entries <span style={{fontSize:11, fontWeight:500, color:'var(--text-muted)'}}>({gymTests.length})</span></div>
              <button className="btn btn-primary btn-sm" onClick={addGymTest} style={{display:'inline-flex', alignItems:'center', gap:6}}>
                <Icon name="plus" size={12}/> Add test result
              </button>
            </div>
            {gymTests.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:'var(--text-muted)', background:'var(--bg-input)', borderRadius:8, fontSize:13}}>
                {Object.keys(testHistory).length === 0 ? 'No gym test data yet. Track sprints, lifts, fitness scores.' : 'No one-off entries yet.'}
              </div>
            ) : (
              <div style={{display:'flex', flexDirection:'column', gap:8}}>
                {[...gymTests].sort((a,b) => (b.date||'').localeCompare(a.date||'')).map(t => (
                  <div key={t.id} style={{display:'grid', gridTemplateColumns:'120px 1fr 120px auto', gap:8, padding:'10px', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:8, alignItems:'start'}}>
                    <input type="date" value={t.date || ''} onChange={e => updateGymTest(t.id, { date: e.target.value })}
                      style={{padding:'6px 8px', fontSize:12, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none'}} />
                    <input list={`gym-tests-${t.id}`} value={t.test || ''} onChange={e => updateGymTest(t.id, { test: e.target.value })}
                      placeholder="Test name"
                      style={{padding:'6px 8px', fontSize:13, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none'}} />
                    <datalist id={`gym-tests-${t.id}`}>
                      {DEFAULT_GYM_TESTS.map(g => <option key={g} value={g} />)}
                    </datalist>
                    <input value={t.value || ''} onChange={e => updateGymTest(t.id, { value: e.target.value })}
                      placeholder="Result"
                      style={{padding:'6px 8px', fontSize:13, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none', fontWeight:600, color:teamColor}} />
                    <button onClick={() => removeGymTest(t.id)} title="Remove"
                      style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6}}>
                      <Icon name="x" size={14}/>
                    </button>
                    <textarea value={t.notes || ''} onChange={e => updateGymTest(t.id, { notes: e.target.value })}
                      placeholder="Notes (optional)"
                      style={{gridColumn:'1 / -1', padding:'6px 8px', fontSize:12, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none', minHeight:34, resize:'vertical'}} />
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* GOALS & FEEDBACK */}
        {tab === 'feedback' && (
          <div style={{display:'flex', flexDirection:'column', gap:20}}>
            <div>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                <div style={{fontSize:13, fontWeight:700, color:'var(--text-primary)'}}>Goals ({goals.length})</div>
                <button className="btn btn-primary btn-sm" onClick={addGoal} style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <Icon name="plus" size={12}/> Add goal
                </button>
              </div>
              {goals.length === 0 ? (
                <div style={{padding:16, textAlign:'center', color:'var(--text-muted)', background:'var(--bg-input)', borderRadius:8, fontSize:12}}>
                  No goals yet.
                </div>
              ) : (
                <div style={{display:'flex', flexDirection:'column', gap:8}}>
                  {goals.map(g => (
                    <div key={g.id} style={{display:'flex', gap:8, padding:10, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:8, alignItems:'flex-start'}}>
                      <select value={g.status || 'active'} onChange={e => updateGoal(g.id, { status: e.target.value })}
                        style={{padding:'5px 8px', fontSize:11, fontWeight:700, color: g.status === 'done' ? 'var(--green)' : g.status === 'paused' ? 'var(--orange)' : teamColor,
                          background:'#fff', border:'1px solid var(--border)', borderRadius:12, cursor:'pointer', fontFamily:'inherit', flexShrink:0}}>
                        <option value="active">Active</option>
                        <option value="paused">Paused</option>
                        <option value="done">Done</option>
                      </select>
                      <textarea value={g.text || ''} onChange={e => updateGoal(g.id, { text: e.target.value })}
                        placeholder="What does the player want to work on?"
                        style={{flex:1, padding:'6px 8px', fontSize:13, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none', minHeight:40, resize:'vertical'}} />
                      <button onClick={() => removeGoal(g.id)} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4}}>
                        <Icon name="x" size={14}/>
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                <div style={{fontSize:13, fontWeight:700, color:'var(--text-primary)'}}>Coach feedback ({feedback.length})</div>
                <button className="btn btn-primary btn-sm" onClick={addFeedback} style={{display:'inline-flex', alignItems:'center', gap:6}}>
                  <Icon name="plus" size={12}/> Add feedback
                </button>
              </div>
              {feedback.length === 0 ? (
                <div style={{padding:16, textAlign:'center', color:'var(--text-muted)', background:'var(--bg-input)', borderRadius:8, fontSize:12}}>
                  No feedback yet.
                </div>
              ) : (
                <div style={{display:'flex', flexDirection:'column', gap:8}}>
                  {feedback.map(f => (
                    <div key={f.id} style={{padding:10, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:8}}>
                      <div style={{display:'flex', gap:8, marginBottom:6, alignItems:'center'}}>
                        <input type="date" value={f.date || ''} onChange={e => updateFeedback(f.id, { date: e.target.value })}
                          style={{padding:'4px 6px', fontSize:11, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:4, outline:'none'}} />
                        <input value={f.from || ''} onChange={e => updateFeedback(f.id, { from: e.target.value })}
                          placeholder="From (coach name)"
                          style={{flex:1, padding:'4px 6px', fontSize:11, fontWeight:600, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:4, outline:'none'}} />
                        <button onClick={() => removeFeedback(f.id)} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4}}>
                          <Icon name="x" size={13}/>
                        </button>
                      </div>
                      <textarea value={f.text || ''} onChange={e => updateFeedback(f.id, { text: e.target.value })}
                        placeholder="Feedback notes..."
                        style={{width:'100%', padding:'6px 8px', fontSize:13, fontFamily:'inherit', background:'#fff', border:'1px solid var(--border)', borderRadius:5, outline:'none', minHeight:50, resize:'vertical'}} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SKILL GRADES */}
        {tab === 'skills' && (
          <div>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12, flexWrap:'wrap', gap:8}}>
              <div style={{fontSize:12, color:'var(--text-muted)'}}>Grade 1 (beginner) → 5 (elite). Click a number to set.</div>
              <button className="btn btn-ghost btn-sm" onClick={addCustomSkill} style={{display:'inline-flex', alignItems:'center', gap:6}}>
                <Icon name="plus" size={12}/> Custom skill
              </button>
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:6}}>
              {allSkills.map(skillName => {
                const grade = skills[skillName] || 0;
                const isCustom = !DEFAULT_SKILLS.includes(skillName);
                return (
                  <div key={skillName} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 10px', background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:8}}>
                    <span style={{flex:1, fontSize:13, fontWeight:500, color:'var(--text-primary)'}}>{skillName}</span>
                    <div style={{display:'inline-flex', gap:4}}>
                      {[1,2,3,4,5].map(n => (
                        <button key={n} onClick={() => setSkillGrade(skillName, grade === n ? 0 : n)}
                          style={{
                            width: 28, height: 28, borderRadius: 6,
                            border: '1px solid ' + (grade >= n ? teamColor : 'var(--border)'),
                            background: grade >= n ? teamColor : 'transparent',
                            color: grade >= n ? 'white' : 'var(--text-muted)',
                            fontWeight: 700, fontSize: 12, cursor: 'pointer', fontFamily: 'inherit'
                          }}>{n}</button>
                      ))}
                    </div>
                    {isCustom && (
                      <button onClick={() => removeSkill(skillName)} title="Remove skill"
                        style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4}}>
                        <Icon name="x" size={13}/>
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-primary" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SQUAD TRACKER
// ═══════════════════════════════════════════════════════════
function SquadTracker({ squad, setSquad, roster, setRoster, matchday18, setMatchday18, currentSub, currentGroup }) {
  const [newName, setNewName] = useState('');
  const [showBulkAdd, setShowBulkAdd] = useState(false);
  const [bulkText, setBulkText] = useState('');
  const [bulkPreview, setBulkPreview] = useState([]);
  const [filterView, setFilterView] = useState('all');
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverPos, setDragOverPos] = useState(null);

  const POSITIONS = ['Fullback', 'Wing', 'Centre', 'Five-Eighth', 'Halfback', 'Hooker', 'Prop', 'Second Row', 'Lock', 'Interchange', 'Utility'];
  const ALL_SLOTS = [...POSITIONS, 'Unassigned'];
  // Match-day 1-18 positions (Rugby League standard layout)
  const TEAM_POSITIONS = [
    { num: 1,  pos: 'Fullback' },
    { num: 2,  pos: 'Wing' },
    { num: 3,  pos: 'Centre' },
    { num: 4,  pos: 'Centre' },
    { num: 5,  pos: 'Wing' },
    { num: 6,  pos: 'Five-Eighth' },
    { num: 7,  pos: 'Halfback' },
    { num: 8,  pos: 'Prop' },
    { num: 9,  pos: 'Hooker' },
    { num: 10, pos: 'Prop' },
    { num: 11, pos: 'Second Row' },
    { num: 12, pos: 'Second Row' },
    { num: 13, pos: 'Lock' },
    { num: 14, pos: 'Interchange' },
    { num: 15, pos: 'Interchange' },
    { num: 16, pos: 'Interchange' },
    { num: 17, pos: 'Interchange' },
    { num: 18, pos: '18th Player' },
  ];
  const teamColor = currentSub === 'Cup' ? 'var(--brand-pink)' : 'var(--brand-cyan)';
  const teamColorBg = currentSub === 'Cup' ? 'var(--accent-glow)' : 'rgba(41,186,229,0.12)';
  const genId = () => 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  const inRoster = (id) => Array.isArray(roster) && roster.includes(id);

  // Player profile modal
  const [profileIdx, setProfileIdx] = useState(null);
  const [showImportTests, setShowImportTests] = useState(false);
  const openProfileById = (id) => {
    const idx = squad.findIndex(p => p._id === id);
    if (idx >= 0) setProfileIdx(idx);
  };
  function toggleRoster(id) {
    setRoster(prev => {
      const arr = Array.isArray(prev) ? prev : [];
      if (arr.includes(id)) return arr.filter(x => x !== id);
      return [...arr, id];
    });
  }

  function handleQuickAdd(e) { if (e.key === 'Enter' && newName.trim()) { setSquad(prev => [...prev, { _id: genId(), name: newName.trim(), number:'', position:'', available:true }]); setNewName(''); } }
  function handleAddClick() { if (newName.trim()) { setSquad(prev => [...prev, { _id: genId(), name: newName.trim(), number:'', position:'', available:true }]); setNewName(''); } }
  function updatePlayer(i, f, v) { setSquad(prev => prev.map((p, idx) => idx === i ? { ...p, [f]: v } : p)); }
  function deletePlayer(i) {
    const removedId = squad[i] && squad[i]._id;
    setSquad(prev => prev.filter((_, idx) => idx !== i));
    if (removedId) setRoster(prev => (Array.isArray(prev) ? prev.filter(x => x !== removedId) : []));
  }
  function toggleAvailability(i) { setSquad(prev => prev.map((p, idx) => idx === i ? { ...p, available: p.available === false } : p)); }

  function parseBulkText(text) {
    if (!text.trim()) return [];
    return text.split('\n').filter(l => l.trim()).map(line => {
      const trimmed = line.trim();
      let number = '', name = '', position = '';
      const numMatch = trimmed.match(/^#?(\d+)[.\s\-)\t]+/);
      let rest = trimmed;
      if (numMatch) { number = numMatch[1]; rest = trimmed.slice(numMatch[0].length).trim(); }
      const dashSplit = rest.split(/\s*[-–—]\s*/);
      if (dashSplit.length > 1) {
        const lastPart = dashSplit[dashSplit.length - 1].trim();
        const posMatch = POSITIONS.find(p => lastPart.toLowerCase().includes(p.toLowerCase()));
        if (posMatch) { position = posMatch; name = dashSplit.slice(0, -1).join(' - ').trim(); } else name = rest;
      } else {
        const posMatch = POSITIONS.find(p => rest.toLowerCase().endsWith(p.toLowerCase()));
        if (posMatch) { position = posMatch; name = rest.slice(0, rest.length - posMatch.length).trim(); } else name = rest;
      }
      name = name.replace(/^[-–—.\s]+|[-–—.\s]+$/g, '').trim();
      return { _id: genId(), name, number, position, available: true };
    }).filter(p => p.name);
  }
  useEffect(() => { setBulkPreview(parseBulkText(bulkText)); }, [bulkText]);
  function handleBulkImport() { if (bulkPreview.length === 0) return; setSquad(prev => [...prev, ...bulkPreview]); setBulkText(''); setShowBulkAdd(false); }

  function handleDragStart(e, i) { setDragIdx(i); e.dataTransfer.effectAllowed = 'move'; setTimeout(() => { if (e.target) e.target.style.opacity = '0.4'; }, 0); }
  function handleDragEnd(e) { e.target.style.opacity = '1'; setDragIdx(null); setDragOverPos(null); }
  function handleGroupDragOver(e, pos) { e.preventDefault(); setDragOverPos(pos); }
  function handleGroupDrop(e, target) { e.preventDefault(); setDragOverPos(null); if (dragIdx === null) return; setSquad(prev => prev.map((p, i) => i === dragIdx ? { ...p, position: target } : p)); setDragIdx(null); }

  const filtered = squad.map((p, i) => ({ ...p, _idx: i })).filter(p => {
    if (filterView === 'available') return p.available !== false;
    if (filterView === 'unavailable') return p.available === false;
    if (filterView === 'inTeam') return inRoster(p._id);
    if (filterView === 'notInTeam') return !inRoster(p._id);
    return true;
  });
  const availableCount = squad.filter(p => p.available !== false).length;
  const unavailableCount = squad.filter(p => p.available === false).length;
  const rosterCount = Array.isArray(roster) ? roster.filter(id => squad.some(p => p._id === id)).length : 0;
  const grouped = {};
  for (const pos of ALL_SLOTS) grouped[pos] = [];
  filtered.forEach(p => { const pos = p.position && POSITIONS.includes(p.position) ? p.position : 'Unassigned'; grouped[pos].push(p); });

  function PlayerCard({ p }) {
    const isUnavailable = p.available === false;
    const inTeam = inRoster(p._id);
    return (
      <div
        draggable
        onDragStart={e => handleDragStart(e, p._idx)}
        onDragEnd={handleDragEnd}
        className={`pcard${isUnavailable ? ' unavailable' : ''}${inTeam ? ' in-team' : ''}`}
        style={{ ['--pcard-team-color']: teamColor }}
      >
        <Avatar name={p.name} size={38} unavailable={isUnavailable} />
        <div style={{flex:1, minWidth:0}}>
          <div className="pcard-name" onClick={e => { e.stopPropagation(); setProfileIdx(p._idx); }} title="Open profile">
            {p.name}
          </div>
          <div className="pcard-meta">
            <span className={`pcard-status-dot${isUnavailable ? ' out' : ''}`}
              onClick={e => { e.stopPropagation(); toggleAvailability(p._idx); }}
              title={isUnavailable ? 'Click to mark Available' : 'Click to mark Unavailable'}
              style={{cursor:'pointer'}} />
            {p.number && <span className="meta-num" onClick={e => e.stopPropagation()}>#{p.number}</span>}
            {inTeam && <span style={{color:teamColor, fontWeight:600}}>In {currentSub}</span>}
          </div>
        </div>
        <div className="pcard-actions">
          <select className="pcard-pos-select" value={p.position || ''}
            onChange={e => updatePlayer(p._idx, 'position', e.target.value)}
            onClick={e => e.stopPropagation()}
            title="Change position">
            <option value="">No position</option>
            {POSITIONS.map(pos => <option key={pos} value={pos}>{pos}</option>)}
          </select>
          <button className={`pcard-tag-btn${inTeam ? ' tagged' : ''}`}
            onClick={e => { e.stopPropagation(); toggleRoster(p._id); }}
            title={inTeam ? `Remove from ${currentSub}` : `Add to ${currentSub}`}>
            {inTeam ? '✓' : '+'}
          </button>
          <button className="pcard-hover-btn danger"
            onClick={e => { e.stopPropagation(); if (window.confirm(`Remove ${p.name} from the squad?`)) deletePlayer(p._idx); }}
            title="Remove player">
            <Icon name="x" size={14}/>
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:12}}>
          <div>
            <div className="card-title" style={{marginBottom:2, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
              <span>{currentGroup ? `${currentGroup.label} Squad` : 'Squad'}</span>
              <span style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1}}>shared between Cup &amp; Challenge</span>
            </div>
            <div style={{fontSize:12, color:'var(--text-muted)', display:'flex', gap:12, alignItems:'center', marginTop:4, flexWrap:'wrap'}}>
              <span>{squad.length} player{squad.length !== 1 ? 's' : ''}</span>
              <span style={{color:'var(--green)'}}>● {availableCount} available</span>
              {unavailableCount > 0 && <span style={{color:'var(--red)'}}>● {unavailableCount} unavailable</span>}
              <span style={{display:'inline-flex', alignItems:'center', gap:6, background:teamColorBg, color:teamColor, padding:'3px 10px', borderRadius:12, fontWeight:700}}>
                In {currentSub}: {rosterCount}
              </span>
            </div>
          </div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
            <button className="btn-outline" onClick={() => setShowImportTests(true)} style={{fontSize:11, padding:'6px 12px', color:'var(--brand-pink)', borderColor:'var(--brand-pink)'}}
              title="Bulk import gym test results from a spreadsheet">📊 Import Test Data</button>
            <button className="btn-outline" onClick={() => setShowBulkAdd(!showBulkAdd)} style={{fontSize:11, padding:'6px 12px'}}>{showBulkAdd ? 'Cancel' : 'Bulk Add'}</button>
          </div>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <input className="form-input" value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={handleQuickAdd}
            placeholder="Type player name and press Enter..." style={{flex:1, padding:'10px 14px', fontSize:13}} />
          <button className="btn btn-primary btn-sm" onClick={handleAddClick} style={{padding:'10px 16px', whiteSpace:'nowrap', display:'inline-flex', alignItems:'center', gap:6}}><Icon name="plus" size={13}/> Add</button>
        </div>
        <div style={{fontSize:10, color:'var(--text-muted)', marginTop:6}}>Tip: add players then assign positions using the dropdown on each card, or drag between groups</div>

        {showBulkAdd && (
          <div style={{marginTop:14, padding:16, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:10}}>
            <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Bulk Add Players</div>
            <textarea className="paste-area" value={bulkText} onChange={e => setBulkText(e.target.value)}
              placeholder={"Sarah Johnson\nMia Williams - Halfback\n3. Emma Brown - Centre"}
              style={{minHeight:100, fontSize:12}} />
            {bulkPreview.length > 0 && (
              <div style={{marginTop:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <span style={{fontSize:11, fontWeight:600, color:'var(--brand-cyan)'}}>{bulkPreview.length} player{bulkPreview.length !== 1 ? 's' : ''} detected</span>
                <button className="btn btn-primary btn-sm" onClick={handleBulkImport}>Add All</button>
              </div>
            )}
          </div>
        )}
      </div>

      {squad.length > 0 && (
        <div style={{display:'flex', gap:4, marginBottom:12, marginTop:4, flexWrap:'wrap'}}>
          {[
            {id:'all', label:`All (${squad.length})`},
            {id:'inTeam', label:`In ${currentSub} (${rosterCount})`},
            {id:'notInTeam', label:`Not in ${currentSub} (${squad.length - rosterCount})`},
            {id:'available', label:`Available (${availableCount})`},
            {id:'unavailable', label:`Unavailable (${unavailableCount})`}
          ].map(f => (
            <button key={f.id} className={`day-tab ${filterView === f.id ? 'active' : ''}`} onClick={() => setFilterView(f.id)} style={{fontSize:11, padding:'6px 14px'}}>{f.label}</button>
          ))}
        </div>
      )}

      {squad.length === 0 ? (
        <div className="card" style={{padding:'40px 0', textAlign:'center'}}>
          <div style={{fontSize:14, color:'var(--text-muted)', marginBottom:8}}>No players added yet</div>
          <div style={{fontSize:12, color:'var(--text-muted)'}}>Type a name above or use Bulk Add to paste a list</div>
        </div>
      ) : (
        <>
          {/* === MATCH-DAY 1-18 TEAM LIST === */}
          <TeamList18
            squad={squad}
            roster={roster}
            matchday18={matchday18 || []}
            setMatchday18={setMatchday18}
            currentSub={currentSub}
            teamColor={teamColor}
            teamColorBg={teamColorBg}
            TEAM_POSITIONS={TEAM_POSITIONS}
            onOpenProfile={openProfileById}
          />

          <div style={{display:'flex', alignItems:'center', gap:10, margin:'28px 0 14px'}}>
            <div style={{fontSize:15, fontWeight:700, color:'var(--text-primary)', letterSpacing:'-0.2px'}}>Squad by position</div>
            <div style={{flex:1, height:1, background:'var(--border)'}} />
            <div style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{squad.length} player{squad.length === 1 ? '' : 's'}</div>
          </div>
          <div className="squad-grid">
            {ALL_SLOTS.map(pos => {
              const players = grouped[pos] || [];
              const isDropTarget = dragOverPos === pos;
              const dropPos = pos === 'Unassigned' ? '' : pos;
              if (players.length === 0 && dragIdx === null) return null;
              return (
                <div key={pos} className="position-group"
                  onDragOver={e => handleGroupDragOver(e, pos)}
                  onDragLeave={() => setDragOverPos(null)}
                  onDrop={e => handleGroupDrop(e, dropPos)}
                  style={{borderColor: isDropTarget ? 'var(--brand-pink)' : undefined, background: isDropTarget ? 'var(--accent-glow)' : undefined}}>
                  <div className="position-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <span>{pos}</span>
                    <span className="pos-count">{players.length}</span>
                  </div>
                  {players.map(p => <PlayerCard key={p._idx} p={p} />)}
                  {players.length === 0 && <div style={{fontSize:11, color:'var(--text-muted)', padding:'8px 4px', fontStyle:'italic'}}>Drop players here</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {showImportTests && (
        <ImportTestDataModal
          squad={squad}
          setSquad={setSquad}
          onClose={() => setShowImportTests(false)}
        />
      )}

      {profileIdx !== null && squad[profileIdx] && (
        <PlayerProfileModal
          player={squad[profileIdx]}
          playerIdx={profileIdx}
          updatePlayer={updatePlayer}
          deletePlayer={(idx) => { deletePlayer(idx); setProfileIdx(null); }}
          onClose={() => setProfileIdx(null)}
          currentSub={currentSub}
          teamColor={teamColor}
          inRoster={inRoster}
          toggleRoster={toggleRoster}
          POSITIONS={POSITIONS}
        />
      )}
    </div>
  );
}

// Bootstrap: pull from cloud first (if configured) so React reads cloud data on first render
(async () => {
  await cloudSync.bootstrap();
  ReactDOM.render(<App />, document.getElementById('root'));
})();
</script>
