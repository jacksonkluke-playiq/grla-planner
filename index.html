                  >{d}</div>
                ))}
                {ALL_DAYS.filter(d => !days.includes(d)).length === 0 && (
                  <div style={{padding:'8px 14px', fontSize:12, color:'var(--text-muted)'}}>All days already added</div>
                )}
              </div>
            )}
          </div>
        </div>

        {allActivities.length > 0 && (
          <div className="session-start-time-wrap">
            <label style={{fontSize:'12px', fontWeight:600, color:'var(--text-secondary)'}}>{selectedDay} start time:</label>
            <input
              type="time"
              className="session-start-time"
              value={sessionStartTime}
              onChange={(e) => setSessionStartTime(e.target.value)}
            />
          </div>
        )}

        {allActivities.length > 0 ? (
          <div className="timeline">
            {allActivitiesWithTimes.map((a, i) => {
              const color = activityColor(a.activity);
              const isTrans = isTransition(a.activity);
              const isParallel = !!a.parallel && i > 0;
              const nextIsParallel = i < allActivitiesWithTimes.length - 1 && !!allActivitiesWithTimes[i+1].parallel;
              const isGroupStart = !isParallel && nextIsParallel;
              const isInRotation = isParallel || nextIsParallel;
              return (
              <div
                key={i}
                className={`timeline-item ${isTrans ? 'transition' : ''} ${draggedIndex === i ? 'dragging' : ''}`}
                style={isTrans ? {} : {
                  border: `1.5px solid ${color.border}`,
                  background: 'var(--bg-input)',
                  marginLeft: isInRotation ? 20 : 0,
                  marginTop: isGroupStart ? 14 : undefined,
                  marginBottom: isParallel && !nextIsParallel ? undefined : (isInRotation ? 6 : undefined)
                }}
                draggable
                onDragStart={() => setDraggedIndex(i)}
                onDragOver={(e) => {
                  e.preventDefault();
                  if (draggedIndex !== null && draggedIndex !== i) {
                    e.currentTarget.classList.add('drag-over');
                  }
                }}
                onDragLeave={(e) => {
                  e.currentTarget.classList.remove('drag-over');
                }}
                onDrop={(e) => {
                  e.preventDefault();
                  e.currentTarget.classList.remove('drag-over');
                  if (draggedIndex !== null && draggedIndex !== i) {
                    handleReorder(draggedIndex, i);
                    setDraggedIndex(null);
                  }
                }}
                onDragEnd={() => {
                  setDraggedIndex(null);
                  document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('drag-over'));
                }}
              >
                <div className="timeline-dot" style={isTrans ? {} : {background: color.dot}} />
                <div style={{display:'flex', alignItems:'flex-start', gap:10, width:'100%'}}>
                  <div className="timeline-drag-handle" onClick={(e) => e.stopPropagation()}>⠿</div>
                  <div style={{flex:1, minWidth:0}} onClick={() => setEditingIndex(i)}>
                    <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                      {a.time && <div className="timeline-time">{a.endTime ? `${a.time} – ${a.endTime}` : a.time}</div>}
                      {isGroupStart && <span style={{display:'inline-flex', alignItems:'center', gap:4, fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:0.5, color:'var(--brand-pink)', background:'rgba(233,91,158,0.12)', padding:'2px 6px', borderRadius:4}}><Icon name="rotate" size={10}/> Rotation / Stations</span>}
                      {isParallel && <span style={{display:'inline-flex', alignItems:'center', gap:4, fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:0.5, color:'var(--brand-pink)', background:'rgba(233,91,158,0.12)', padding:'2px 6px', borderRadius:4}}><Icon name="rotate" size={10}/> Parallel</span>}
                      {!isTrans && color.label && <span style={{fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', color: color.border, opacity:0.8}}>{color.label}</span>}
                    </div>
                    <div className="timeline-activity">{a.activity}</div>
                    <div className="timeline-meta">
                      {a.duration && <span className="timeline-badge badge-duration">{a.duration} min</span>}
                      {a.staff && <span className="timeline-badge badge-staff">{a.staff}</span>}
                      {a.focus && <span className="timeline-badge badge-focus">{a.focus}</span>}
                    </div>
                    {a.notes && <div className="timeline-notes">{a.notes}</div>}
                  </div>
                  <button
                    className="timeline-delete"
                    onClick={(e) => { e.stopPropagation(); handleDeleteActivity(i); }}
                    title="Delete activity"
                  >
                    ×
                  </button>
                </div>
              </div>
            );})}
          </div>
        ) : (
          <div className="empty-state">
            <div>No session plan loaded for this week yet.</div>
            <div style={{fontSize:12, marginTop:6}}>Use "+ Add Drill" to start building, or select a week with a pre-built plan (PS1, PS2, Wk1, GF).</div>
          </div>
        )}
      </div>

      <div className="card" style={{marginTop:4}}>
        <div className="card-title"><Icon name="clipboard" size={15} /> Session Review — Week {selectedWeek}, {selectedDay}</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:'var(--green)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:6, display:'block'}}>Strengths</label>
            <textarea className="form-textarea" value={(sessionReviews[customKey] && sessionReviews[customKey].strengths) || ''} onChange={e => setSessionReviews(prev => ({ ...prev, [customKey]: { ...(prev[customKey] || {}), strengths: e.target.value } }))}
              placeholder="What went well this session?" style={{minHeight:90}} />
          </div>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:'var(--orange)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:6, display:'block'}}>Work Ons</label>
            <textarea className="form-textarea" value={(sessionReviews[customKey] && sessionReviews[customKey].workOns) || ''} onChange={e => setSessionReviews(prev => ({ ...prev, [customKey]: { ...(prev[customKey] || {}), workOns: e.target.value } }))}
              placeholder="What needs improvement?" style={{minHeight:90}} />
          </div>
        </div>
      </div>

      {showGenerateModal && <GenerateSessionModal onClose={() => setShowGenerateModal(false)} onGenerate={(activities) => {
        setCustomActivities(prev => ({ ...prev, [customKey]: activities }));
        setShowGenerateModal(false);
      }} startTime={sessionStartTime} />}
      {showBlockModal && <GenerateBlockModal onClose={() => setShowBlockModal(false)} customActivities={customActivities} setCustomActivities={setCustomActivities} userWeekOverrides={userWeekOverrides} setUserWeekOverrides={setUserWeekOverrides} />}
      {showAddModal && <AddDrillModal onClose={() => setShowAddModal(false)} onAdd={handleAddDrill} />}
      {showCopyModal && <CopySessionModal onClose={() => setShowCopyModal(false)} onCopy={handleCopySession} currentWeek={selectedWeek} currentDay={selectedDay} currentTeam={currentTeam} customActivities={customActivities} seasonWeeks={seasonWeeks} />}
      {showPasteModal && <PasteSessionModal onClose={() => setShowPasteModal(false)} onPaste={handlePasteSession} />}
      {showNewsletterModal && (
        <NewsletterModal
          onClose={() => setShowNewsletterModal(false)}
          weekData={weekData}
          weekDays={weekDays}
          customActivities={customActivities}
          selectedWeek={selectedWeek}
          currentGroup={currentGroup}
          currentSub={currentSub}
        />
      )}
      {editingIndex !== null && allActivitiesWithTimes[editingIndex] && (
        <EditActivityModal
          activity={allActivitiesWithTimes[editingIndex]}
          canBeParallel={editingIndex > 0}
          onClose={() => setEditingIndex(null)}
          onSave={(updated) => {
            handleActivityFieldChange(editingIndex, null, updated);
            setEditingIndex(null);
          }}
          onDelete={() => {
            handleDeleteActivity(editingIndex);
            setEditingIndex(null);
          }}
        />
      )}
    </div>
  );
}

function GenerateBlockModal({ onClose, customActivities, setCustomActivities, userWeekOverrides, setUserWeekOverrides }) {
  const allCategories = Object.keys(DRILL_LIBRARY);
  const [selectedCats, setSelectedCats] = useState(['Contact & Defence', 'Core Skills (Drills)', 'Core Skills']);

  // Coaching outcomes the user can pick — these shape the weekly focus narrative
  const outcomeOptions = [
    { id: 'line-speed', label: 'Line Speed', group: 'Defence' },
    { id: 'marker-defence', label: 'Marker Defence', group: 'Defence' },
    { id: 'tackle-technique', label: 'Tackle Technique', group: 'Defence' },
    { id: 'ruck-speed', label: 'Ruck Speed', group: 'Defence' },
    { id: 'edge-defence', label: 'Edge Defence', group: 'Defence' },
    { id: 'goal-line-defence', label: 'Goal Line Defence', group: 'Defence' },
    { id: 'running-lines', label: 'Running Lines', group: 'Attack' },
    { id: 'catch-pass', label: 'Catch & Pass', group: 'Attack' },
    { id: 'set-plays', label: 'Set Plays', group: 'Attack' },
    { id: 'ball-playing', label: 'Ball Playing', group: 'Attack' },
    { id: 'offloads', label: 'Offloads', group: 'Attack' },
    { id: 'yardage', label: 'Yardage / Carries', group: 'Attack' },
    { id: 'kick-chase', label: 'Kick Chase', group: 'Kicking' },
    { id: 'kick-return', label: 'Kick Return', group: 'Kicking' },
    { id: 'short-kicking', label: 'Short Kicking Game', group: 'Kicking' },
    { id: 'game-management', label: 'Game Management', group: 'Mental' },
    { id: 'decision-making', label: 'Decision Making', group: 'Mental' },
    { id: 'communication', label: 'Communication', group: 'Mental' },
    { id: 'conditioning', label: 'Conditioning', group: 'Fitness' },
    { id: 'speed-agility', label: 'Speed & Agility', group: 'Fitness' },
  ];

  const outcomeGroups = ['Defence', 'Attack', 'Kicking', 'Mental', 'Fitness'];
  const [selectedOutcomes, setSelectedOutcomes] = useState(['tackle-technique', 'line-speed']);
  const [startWeekIndex, setStartWeekIndex] = useState(0);
  const [preview, setPreview] = useState(null);

  function toggleCat(cat) {
    setSelectedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
    setPreview(null);
  }
  function toggleOutcome(id) {
    setSelectedOutcomes(prev => prev.includes(id) ? prev.filter(o => o !== id) : [...prev, id]);
    setPreview(null);
  }

  const catIcons = {
    /* catIcons removed — clean text only */
  };

  // Helper to pick random drill
  function pickDrill(categories) {
    const cats = Array.isArray(categories) ? categories : [categories];
    const available = [];
    for (const cat of cats) {
      if (DRILL_LIBRARY[cat]) {
        available.push(...DRILL_LIBRARY[cat].drills);
      }
    }
    if (available.length === 0) return null;
    return available[Math.floor(Math.random() * available.length)];
  }

  // Build the 5-week progression from user selections
  function buildProgression() {
    const outcomeLabels = selectedOutcomes.map(id => outcomeOptions.find(o => o.id === id)?.label).filter(Boolean);
    const focusText = outcomeLabels.length > 0 ? outcomeLabels.join(', ') : 'General';

    // Warm-up cats: prefer Speed & Mobility if selected
    const warmCats = selectedCats.includes('Speed & Mobility') ? ['Speed & Mobility'] : selectedCats;
    // Skill cats: prefer Core Skills if selected
    const skillCatOptions = selectedCats.filter(c => c.includes('Core Skills'));
    const skillCats = skillCatOptions.length > 0 ? skillCatOptions : selectedCats;
    // Game cats: prefer game categories if selected
    const gameCatOptions = selectedCats.filter(c => c.includes('Game') || c.includes('Conditioned'));
    const gameCats = gameCatOptions.length > 0 ? gameCatOptions : selectedCats;

    return [
      {
        title: 'Individual Foundations',
        description: 'Basic skills in isolation — high reps, low pressure',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: ['Small Sided Games'].filter(c => DRILL_LIBRARY[c]).length > 0 ? ['Small Sided Games'] : gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Individual Foundations — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — individual technique, low contact, high rep' : 'Basic individual skills, low contact high rep')
      },
      {
        title: 'Unit Combinations',
        description: 'Pairs & small groups — building connections',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats.length > 0 ? gameCats : ['Small Sided Games'],
        warmCats: warmCats,
        weekOverrideFocus: 'Unit Combinations — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — 2v1 combos, partnerships, moderate contact' : '2v1 combos, partnerships, moderate contact')
      },
      {
        title: 'Phase & Structure',
        description: 'Team structure and phase play',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Phase & Structure — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — team shapes, defensive systems, building contact' : 'Set plays, attacking shapes, defensive structure')
      },
      {
        title: 'Pressure & Decision Making',
        description: 'Adding defensive pressure to everything',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Pressure & Decision Making — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — opposed, decision under fatigue, full contact' : 'Opposed attack, decision making under pressure, full contact')
      },
      {
        title: 'Full Game Integration',
        description: 'Putting it all together — game-like scenarios',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Full Game Integration — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — full simulation, transitions, match intensity' : 'Full game simulation, transitions, match intensity')
      }
    ];
  }

  // Generate a single 60-min session
  function generateSession(prog) {
    const warmUp = pickDrill(prog.warmCats);
    const skill = pickDrill(prog.skillCats);
    const main1 = pickDrill(prog.mainCats);
    const main2 = pickDrill(prog.mainCats);
    const game = pickDrill(prog.gameCats);

    return [
      { activity: warmUp ? warmUp.name : 'Warm Up', duration: '10', staff: '', focus: 'Warm up', notes: warmUp ? warmUp.notes : 'Movement prep' },
      { activity: 'Transition', duration: '2', staff: '', focus: '', notes: '' },
      { activity: skill ? skill.name : 'Core Skill Block', duration: '10', staff: '', focus: 'Skill', notes: skill ? skill.notes : '' },
      { activity: 'Transition — Drink Break', duration: '3', staff: '', focus: '', notes: '' },
      { activity: main1 ? main1.name : 'Main Theme Block 1', duration: '12', staff: '', focus: prog.title, notes: main1 ? main1.notes : '' },
      { activity: main2 ? main2.name : 'Main Theme Block 2', duration: '8', staff: '', focus: prog.title, notes: main2 ? main2.notes : '' },
      { activity: 'Transition — Drink Break', duration: '2', staff: '', focus: '', notes: '' },
      { activity: game ? game.name : 'Game Situation', duration: '10', staff: '', focus: prog.title + ' — Game', notes: game ? game.notes : '' },
      { activity: 'Circle Breath — Debrief', duration: '3', staff: 'All', focus: 'Reflection', notes: 'What went well, improvements, big ups' },
    ];
  }

  function generateBlock() {
    if (selectedCats.length === 0) return;

    const progression = buildProgression();
    const sessionsMap = {};
    const weekOverrides = {};

    for (let progWeek = 0; progWeek < 5; progWeek++) {
      const seasonWeek = SEASON_WEEKS[startWeekIndex + progWeek];
      if (!seasonWeek) break;

      const weekKey = seasonWeek.week;
      const prog = progression[progWeek];

      sessionsMap[`${weekKey}-Tuesday`] = generateSession(prog);
      sessionsMap[`${weekKey}-Thursday`] = generateSession(prog);

      weekOverrides[weekKey] = {
        focus: prog.weekOverrideFocus,
        outcomes: prog.weekOverrideOutcomes,
        tuesday: prog.title + ' — Tuesday',
        thursday: prog.title + ' — Thursday'
      };
    }

    setPreview({
      sessionsMap,
      weekOverrides,
      selectedWeeks: SEASON_WEEKS.slice(startWeekIndex, startWeekIndex + 5),
      progression
    });
  }

  function commitBlock() {
    if (!preview) return;
    setCustomActivities(prev => ({ ...prev, ...preview.sessionsMap }));
    setUserWeekOverrides(prev => ({ ...prev, ...preview.weekOverrides }));
    onClose();
  }

  const availableStarts = SEASON_WEEKS.length >= 5 ? SEASON_WEEKS.slice(0, SEASON_WEEKS.length - 4) : SEASON_WEEKS;
  const totalDrills = selectedCats.reduce((s, c) => s + (DRILL_LIBRARY[c]?.drills?.length || 0), 0);
  const canGenerate = selectedCats.length > 0;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 740, maxHeight: '90vh', overflowY: 'auto'}}>
        <h3>Generate 5-Week Training Block</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Pick your drill categories and coaching outcomes, then we'll build a progressive 5-week block (10 sessions) that goes from individual foundations to full game integration.
        </p>

        {/* Start Week */}
        <div className="form-group" style={{marginBottom:14}}>
          <label className="form-label">Start Week</label>
          <select className="form-select" value={startWeekIndex} onChange={e => { setStartWeekIndex(Number(e.target.value)); setPreview(null); }}>
            {availableStarts.map((w, idx) => (
              <option key={w.week} value={idx}>
                {w.week === 'GF' ? 'GF' : w.week.startsWith('PS') ? w.week : `Wk ${w.week}`} — {w.dates}
              </option>
            ))}
          </select>
        </div>

        {/* Drill Categories */}
        <div style={{marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
            <label className="form-label" style={{margin:0}}>Drill Categories</label>
            <div style={{display:'flex', gap:6}}>
              <button onClick={() => { setSelectedCats([...allCategories]); setPreview(null); }} style={{fontSize:10, color:'var(--accent-light)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>All</button>
              <button onClick={() => { setSelectedCats([]); setPreview(null); }} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
            </div>
          </div>
          <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:6}}>{selectedCats.length} selected · {totalDrills} drills available</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:5, maxHeight:130, overflowY:'auto', padding:'2px 0'}}>
            {allCategories.map(cat => {
              const isSelected = selectedCats.includes(cat);
              const drillCount = DRILL_LIBRARY[cat]?.drills?.length || 0;
              return (
                <button key={cat} onClick={() => toggleCat(cat)}
                  style={{
                    padding:'6px 10px', borderRadius:7,
                    border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                    background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                    cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:5, flexShrink:0
                  }}>
                  <span style={{fontSize:10, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{cat}</span>
                  <span style={{fontSize:8, color:'var(--text-muted)'}}>({drillCount})</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Coaching Outcomes */}
        <div style={{marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
            <label className="form-label" style={{margin:0}}>Coaching Outcomes</label>
            <button onClick={() => { setSelectedOutcomes([]); setPreview(null); }} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
          </div>
          <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:6}}>What do you want this block to develop? These shape the weekly focus and outcomes.</div>
          {outcomeGroups.map(group => {
            const groupOutcomes = outcomeOptions.filter(o => o.group === group);
            return (
              <div key={group} style={{marginBottom:6}}>
                <div style={{fontSize:9, fontWeight:600, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1, marginBottom:3}}>{group}</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                  {groupOutcomes.map(o => {
                    const isSelected = selectedOutcomes.includes(o.id);
                    return (
                      <button key={o.id} onClick={() => toggleOutcome(o.id)}
                        style={{
                          padding:'5px 10px', borderRadius:6,
                          border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                          background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                          cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:4, flexShrink:0
                        }}>
                        <span style={{fontSize:10, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{o.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Progression Preview (static) */}
        <div style={{background:'var(--bg-input)', borderRadius:8, padding:10, marginBottom:14, border:'1px solid var(--border)'}}>
          <div style={{fontSize:11, fontWeight:600, marginBottom:6, color:'var(--text-primary)'}}>5-Week Progression (Simple → Complex)</div>
          <div style={{display:'flex', gap:4, alignItems:'center'}}>
            {['Individual', 'Unit Combos', 'Phase & Structure', 'Pressure', 'Full Game'].map((label, idx) => (
              <React.Fragment key={idx}>
                <div style={{flex:1, textAlign:'center', padding:'4px 2px', borderRadius:6, background: `rgba(233,91,158,${0.06 + idx * 0.06})`, fontSize:9, fontWeight:600, color:'var(--accent-light)', lineHeight:1.2}}>
                  Wk {idx + 1}<br/><span style={{fontWeight:400, fontSize:8, color:'var(--text-secondary)'}}>{label}</span>
                </div>
                {idx < 4 && <span style={{color:'var(--text-muted)', fontSize:10}}>→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <button className="btn-outline" onClick={generateBlock} style={{marginBottom:12, fontSize:11, width:'100%'}} disabled={!canGenerate}>
          Generate Block
        </button>

        {!canGenerate && (
          <div style={{textAlign:'center', padding:'12px 0', color:'var(--text-muted)', fontSize:12}}>
            Select at least one drill category to generate a block
          </div>
        )}

        {preview && (
          <div>
            <div style={{fontSize:12, fontWeight:600, marginBottom:8, color:'var(--text-primary)'}}>Preview — {preview.selectedWeeks.length} weeks, {preview.selectedWeeks.length * 2} sessions</div>
            <div className="parse-preview" style={{maxHeight:280, overflowY:'auto', marginBottom:12}}>
              {preview.selectedWeeks.map((w, wIdx) => {
                const prog = preview.progression[wIdx];
                return (
                  <div key={w.week} style={{marginBottom:10, paddingBottom:10, borderBottom:'1px solid var(--border)'}}>
                    <div style={{fontSize:11, fontWeight:600, color:'var(--accent-light)', marginBottom:2}}>
                      {w.week === 'GF' ? 'GF' : w.week.startsWith('PS') ? w.week : `Wk ${w.week}`} — {prog.title}
                    </div>
                    <div style={{fontSize:9, color:'var(--text-muted)', marginBottom:4}}>{prog.weekOverrideOutcomes}</div>
                    <div style={{display:'flex', gap:20}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10, color:'var(--text-secondary)', fontWeight:500, marginBottom:3}}>Tuesday</div>
                        {(preview.sessionsMap[`${w.week}-Tuesday`] || []).filter(a => !a.activity.toLowerCase().includes('transition')).slice(0, 4).map((a, i) => (
                          <div key={i} style={{fontSize:9, color:'var(--text-muted)', lineHeight:1.3}}>
                            • {a.duration}m {a.activity.slice(0, 35)}
                          </div>
                        ))}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10, color:'var(--text-secondary)', fontWeight:500, marginBottom:3}}>Thursday</div>
                        {(preview.sessionsMap[`${w.week}-Thursday`] || []).filter(a => !a.activity.toLowerCase().includes('transition')).slice(0, 4).map((a, i) => (
                          <div key={i} style={{fontSize:9, color:'var(--text-muted)', lineHeight:1.3}}>
                            • {a.duration}m {a.activity.slice(0, 35)}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-outline" onClick={() => { setPreview(null); setTimeout(generateBlock, 50); }} style={{marginRight:'auto'}} disabled={!canGenerate}>
            Re-roll
          </button>
          <button className="btn btn-primary" onClick={commitBlock} disabled={!preview}>
            Load Block
          </button>
        </div>
      </div>
    </div>
  );
}

function CopySessionModal({ onClose, onCopy, currentWeek, currentDay, currentTeam, customActivities, seasonWeeks }) {
  // Build TEAMS list locally (App's TEAMS isn't passed in, but the structure is fixed)
  const AGE_GROUPS = [
    { id: '7-8',   label: 'Years 7/8',   short: '7/8'   },
    { id: '9-10',  label: 'Years 9/10',  short: '9/10'  },
    { id: '11-12', label: 'Years 11/12', short: '11/12' }
  ];
  const SUB_TEAMS = ['Cup', 'Challenge'];
  const TEAMS = AGE_GROUPS.flatMap(g => SUB_TEAMS.map(s => ({ id: `${g.id}-${s.toLowerCase()}`, label: `${g.label} ${s}` })));

  const [sourceTeam, setSourceTeam] = useState(currentTeam);
  const [sourceWeek, setSourceWeek] = useState("");
  const [sourceDay, setSourceDay] = useState("");

  // Get the source team's customActivities (current team uses prop; others read from localStorage)
  const sourceCustomActivities = useMemo(() => {
    if (sourceTeam === currentTeam) return customActivities || {};
    try { return JSON.parse(localStorage.getItem(`playiq_${sourceTeam}_customActivities`) || '{}'); } catch(e) { return {}; }
  }, [sourceTeam, currentTeam, customActivities]);

  // For each week present in either the blueprint or the source team's custom data,
  // build a map of day → activities (custom overrides blueprint)
  const sourceWeekMap = useMemo(() => {
    const map = {};
    // Seed from blueprint
    Object.entries(SESSION_DETAILS).forEach(([wk, days]) => {
      map[wk] = {};
      Object.entries(days).forEach(([d, acts]) => { map[wk][d] = acts; });
    });
    // Override / add custom
    Object.entries(sourceCustomActivities).forEach(([key, acts]) => {
      const dash = key.indexOf('-');
      if (dash < 0) return;
      const wk = key.slice(0, dash);
      const d = key.slice(dash + 1);
      if (!Array.isArray(acts) || acts.length === 0) return;
      if (!map[wk]) map[wk] = {};
      map[wk][d] = acts;
    });
    return map;
  }, [sourceCustomActivities]);

  // Sort weeks numerically (1, 2, 3 ... PS1, GF)
  const sortedWeeks = useMemo(() => {
    return Object.keys(sourceWeekMap).sort((a, b) => {
      const an = parseInt(a, 10), bn = parseInt(b, 10);
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      if (!isNaN(an)) return -1;
      if (!isNaN(bn)) return 1;
      return a.localeCompare(b);
    });
  }, [sourceWeekMap]);

  // Filter out the (current week, current day) tuple — but only when source team is current team
  const availableWeeks = sortedWeeks.filter(w => {
    const days = sourceWeekMap[w] || {};
    const validDays = Object.keys(days).filter(d => Array.isArray(days[d]) && days[d].length > 0);
    if (validDays.length === 0) return false;
    if (sourceTeam !== currentTeam) return true;
    if (w === currentWeek && validDays.length === 1 && validDays[0] === currentDay) return false;
    return true;
  });

  const sourceDays = sourceWeek && sourceWeekMap[sourceWeek]
    ? Object.keys(sourceWeekMap[sourceWeek]).filter(d => Array.isArray(sourceWeekMap[sourceWeek][d]) && sourceWeekMap[sourceWeek][d].length > 0)
    : [];

  const previewActivities = sourceWeek && sourceDay && sourceWeekMap[sourceWeek]?.[sourceDay]
    ? sourceWeekMap[sourceWeek][sourceDay]
    : [];

  // Reset week/day when team changes
  useEffect(() => {
    setSourceWeek("");
    setSourceDay("");
  }, [sourceTeam]);

  const SEASON_WKS = seasonWeeks || [];
  const weekLabel = (w) => {
    const sw = SEASON_WKS.find(s => s.week === w);
    if (!sw) return `Wk ${w}`;
    const label = sw.week === 'GF' ? 'GF' : sw.week.startsWith('PS') ? sw.week : `Wk ${sw.week}`;
    return sw.dates ? `${label} — ${sw.dates}` : label;
  };
  const blockColors = { 1: 'var(--orange)', 2: 'var(--blue)', 3: 'var(--green)', 4: 'var(--red)' };
  const phaseColor = (w) => {
    const sw = SEASON_WKS.find(s => s.week === w);
    if (!sw) return 'var(--text-muted)';
    return blockColors[sw.block] || 'var(--text-muted)';
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 640, maxWidth: '92vw'}}>
        <h3>Copy Session</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Pick a source team, week and day. Its activities will replace what's currently in <strong style={{color:'var(--accent-light)'}}>{currentDay}</strong> of the current week.
        </p>

        <div className="form-group">
          <label className="form-label">Source Team</label>
          <select className="form-select" value={sourceTeam} onChange={e => setSourceTeam(e.target.value)}>
            {TEAMS.map(t => (
              <option key={t.id} value={t.id}>{t.label}{t.id === currentTeam ? ' (current)' : ''}</option>
            ))}
          </select>
        </div>

        <div className="copy-source">
          <div>
            <div className="form-label">Source Week</div>
            <div className="copy-week-list" style={{background:'var(--bg-input)', borderRadius:8, padding:6, border:'1px solid var(--border)'}}>
              {availableWeeks.length === 0 && (
                <div style={{padding:12, fontSize:12, color:'var(--text-muted)', fontStyle:'italic'}}>
                  No sessions yet for this team.
                </div>
              )}
              {availableWeeks.map(w => {
                const days = sourceWeekMap[w] || {};
                const actCount = Object.values(days).filter(a => Array.isArray(a)).reduce((s, a) => s + a.length, 0);
                return (
                  <div key={w} className={`copy-week-item ${sourceWeek === w ? 'selected' : ''}`}
                    onClick={() => {
                      setSourceWeek(w);
                      const validDays = Object.keys(days).filter(d => Array.isArray(days[d]) && days[d].length > 0);
                      setSourceDay(validDays[0] || "");
                    }}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <span className="phase-dot" style={{background: phaseColor(w)}} />
                      <span style={{color:'var(--text-primary)', fontWeight: sourceWeek === w ? 600 : 400}}>{weekLabel(w)}</span>
                    </div>
                    <span className="copy-preview-count">{actCount} drills</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div>
            <div className="form-label">Source Day</div>
            {sourceDays.length > 0 ? (
              <div style={{marginBottom:12}}>
                <div className="day-tabs" style={{flexWrap:'wrap'}}>
                  {sourceDays.map(d => (
                    <button key={d} className={`day-tab ${sourceDay === d ? 'active' : ''}`} onClick={() => setSourceDay(d)}>{d}</button>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{fontSize:12, color:'var(--text-muted)', padding: 12}}>Select a week to see available days</div>
            )}

            {previewActivities.length > 0 && (
              <div className="parse-preview" style={{maxHeight:220, overflowY:'auto'}}>
                <div className="parse-preview-title">Preview ({previewActivities.length} activities)</div>
                {previewActivities.map((a, i) => (
                  <div key={i} className="parse-row">
                    <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.time || '—'}</span>
                    <span style={{color:'var(--text-primary)'}}>{a.activity}</span>
                    <span style={{color:'var(--text-muted)'}}>{a.duration ? `${a.duration}m` : ''}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary"
            onClick={() => onCopy(previewActivities)}
            disabled={!sourceWeek || previewActivities.length === 0}>
            Copy {previewActivities.length} Activities
          </button>
        </div>
      </div>
    </div>
  );
}

function PasteSessionModal({ onClose, onPaste }) {
  const [rawText, setRawText] = useState("");
  const [parsed, setParsed] = useState([]);

  function parseText(text) {
    if (!text.trim()) { setParsed([]); return; }
    const lines = text.split('\n').filter(l => l.trim());
    const results = [];

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;

      // Try multiple formats:
      // Format 1: "4:00 | Mobility | 15 | Notes here" (pipe separated)
      // Format 2: "4:00  Mobility  15min  Notes here" (tab/multi-space separated)
      // Format 3: "4:00,Mobility,15,Notes here" (comma separated)
      // Format 4: "- Mobility (15 min)" (bullet list)
      // Format 5: Just a drill name

      let activity = { time: "", activity: "", duration: "", notes: "", focus: "", staff: "" };

      if (trimmed.includes('|')) {
        const parts = trimmed.split('|').map(p => p.trim());
        if (parts.length >= 2) {
          // Check if first part looks like a time
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(' | ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(' | ');
          }
        }
      } else if (trimmed.includes(',')) {
        const parts = trimmed.split(',').map(p => p.trim());
        if (parts.length >= 2) {
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(', ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(', ');
          }
        }
      } else if (trimmed.includes('\t')) {
        const parts = trimmed.split('\t').map(p => p.trim()).filter(Boolean);
        if (parts.length >= 2) {
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(' ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(' ');
          }
        }
      } else {
        // Bullet list or plain text
        let cleaned = trimmed.replace(/^[-*•]\s*/, '').replace(/^\d+[.)]\s*/, '');
        // Extract duration in parentheses: "Mobility (15 min)"
        const durMatch = cleaned.match(/\((\d+)\s*(?:min|m|mins|minutes)?\)/i);
        if (durMatch) {
          activity.duration = durMatch[1];
          cleaned = cleaned.replace(durMatch[0], '').trim();
        }
        // Extract time at start: "4:30 Mobility"
        const timeMatch = cleaned.match(/^(\d{1,2}[:.]\d{2}|\d{3,4})\s+/);
        if (timeMatch) {
          activity.time = timeMatch[1];
          cleaned = cleaned.replace(timeMatch[0], '').trim();
        }
        activity.activity = cleaned;
      }

      if (activity.activity) {
        results.push(activity);
      }
    }
    setParsed(results);
  }

  function handleTextChange(text) {
    setRawText(text);
    parseText(text);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 640}}>
        <h3>Paste a Session Plan</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Paste a session from a spreadsheet, text doc, notes app, or any format. PlayIQ will parse it into your timeline.
        </p>

        <div className="format-hint">
          <div className="format-hint-title">Supported formats</div>
          <div style={{fontSize:11, color:'var(--text-secondary)', lineHeight:1.8}}>
            <div><code>4:00 | Mobility | 15 | Movement prep</code> — pipe separated</div>
            <div><code>4:00, Mobility, 15, Movement prep</code> — comma separated</div>
            <div><code>- Mobility (15 min)</code> — bullet list with optional duration</div>
            <div><code>Warm Up Game</code> — just the drill name</div>
            <div>Or paste directly from Excel/Google Sheets (tab-separated)</div>
          </div>
        </div>

        <textarea
          className="paste-area"
          placeholder={"Paste your session here...\n\nExamples:\n4:00 | Meeting Room | 20 | Team review\n4:20 | Mobility | 15\n4:35 | Speed | 15 | A.B.C Runs\n4:50 | Con Game | 20 | Coffin Ball\n5:10 | Positional Craft | 25\n5:35 | Circle Breath | 5 | Debrief"}
          value={rawText}
          onChange={e => handleTextChange(e.target.value)}
        />

        {parsed.length > 0 && (
          <div className="parse-preview">
            <div className="parse-preview-title">Parsed Preview — {parsed.length} activities detected</div>
            {parsed.map((a, i) => (
              <div key={i} className="parse-row">
                <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.time || '—'}</span>
                <span style={{color:'var(--text-primary)'}}>{a.activity}</span>
                <span style={{color:'var(--text-muted)'}}>{a.duration ? `${a.duration}m` : ''}</span>
              </div>
            ))}
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => onPaste(parsed)} disabled={parsed.length === 0}>
            Import {parsed.length} Activities
          </button>
        </div>
      </div>
    </div>
  );
}
