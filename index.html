// NEWSLETTER GENERATOR — weekly parent/community update (≤100 words)
// ═══════════════════════════════════════════════════════════
function NewsletterModal({ onClose, weekData, weekDays, customActivities, selectedWeek, currentGroup, currentSub }) {
  const teamLabel = currentGroup ? `${currentGroup.label} ${currentSub || ''}`.trim() : 'Team';
  const WORD_LIMIT = 100;

  function buildNewsletter() {
    const days = (weekDays && weekDays[selectedWeek]) || ['Tuesday', 'Thursday'];
    const focus = (weekData?.focus || '').trim();
    const outcomes = (weekData?.outcomes || '').trim();
    const game = (weekData?.game || '').trim();
    const wkLabel = weekData?.week || selectedWeek;

    // Helpers
    const isTrans = (n) => typeof n === 'string' && (
      n.toLowerCase().startsWith('transition') || n.toLowerCase().includes('drink break')
    );
    const cleanName = (s) => (s || '')
      .replace(/^(CORE:|CORE\s*-|CORE\s+|Skill:|Defence\s*-|Attack\s*-)\s*/i, '')
      .replace(/\s+\([^)]*\)\s*$/, '')
      .trim();
    const lower1 = (s) => (s || '').replace(/^./, c => c.toLowerCase());
    const stripPeriod = (s) => (s || '').replace(/\.$/, '');

    // Gather per-day drill names (deduped)
    const dayContent = [];
    days.forEach(d => {
      const acts = customActivities[`${selectedWeek}-${d}`] || [];
      const drills = [...new Set(acts.filter(a => !isTrans(a.activity)).map(a => cleanName(a.activity)).filter(Boolean))];
      if (drills.length > 0) dayContent.push({ day: d, drills });
    });

    // === HEADER (subject line + greeting) ===
    const headerLine = `${teamLabel} — Week ${wkLabel} Update`;
    const greeting = `Hi ${teamLabel} families,`;

    // === BODY — written for parents, conversational ===
    const bodyParts = [];

    // Opening line
    if (focus) {
      bodyParts.push(`This week the girls have been focused on ${lower1(stripPeriod(focus))}.`);
    } else {
      bodyParts.push(`Here's a quick wrap of what the girls have been working on at training this week.`);
    }

    // What they did across the week
    if (dayContent.length === 1) {
      const d = dayContent[0];
      const tops = d.drills.slice(0, 3).map(lower1);
      bodyParts.push(`In ${d.day}'s session they covered ${tops.join(', ').replace(/,([^,]*)$/, ' and$1')}.`);
    } else if (dayContent.length === 2) {
      const a = dayContent[0], b = dayContent[1];
      const aTops = a.drills.slice(0, 2).map(lower1).join(' and ');
      const bTops = b.drills.slice(0, 2).map(lower1).join(' and ');
      bodyParts.push(`${a.day}'s session focused on ${aTops}, and ${b.day} built on that with ${bTops}.`);
    } else if (dayContent.length >= 3) {
      const allTopDrills = [...new Set(dayContent.flatMap(d => d.drills.slice(0, 2).map(lower1)))].slice(0, 5);
      bodyParts.push(`Across ${dayContent.length} sessions we worked on ${allTopDrills.join(', ').replace(/,([^,]*)$/, ' and$1')}.`);
    } else {
      bodyParts.push(`We continued building on our core skill and conditioning work.`);
    }

    // Outcomes / what coaches noticed
    if (outcomes) bodyParts.push(`${stripPeriod(outcomes)}.`);

    // Match this week — practical info for parents
    if (game) {
      bodyParts.push(`Looking ahead, we've got ${stripPeriod(game)} — please make sure boots, mouthguards, and a full water bottle are packed.`);
    }

    // === SIGN OFF ===
    const signoff = `Thanks for your continued support — the girls love what they're doing.\n\n— Keebra Park GRLA Coaching Staff`;

    // Trim body if approaching 100 words (leaves room for greeting + signoff)
    let body = bodyParts.join(' ');
    const TARGET_BODY_WORDS = 80;
    const bw = body.split(/\s+/).filter(Boolean);
    if (bw.length > TARGET_BODY_WORDS) body = bw.slice(0, TARGET_BODY_WORDS - 1).join(' ') + '…';

    return `${headerLine}\n\n${greeting}\n\n${body}\n\n${signoff}`;
  }

  const [text, setText] = useState(buildNewsletter);
  const [copied, setCopied] = useState(false);

  // Word count = everything except the header subject line (first line before the first blank line)
  const wordCount = (() => {
    const parts = text.split(/\n\n/);
    const body = parts.length > 1 ? parts.slice(1).join(' ') : text;
    return body.trim().split(/\s+/).filter(Boolean).length;
  })();
  const overLimit = wordCount > WORD_LIMIT;

  function regenerate() {
    setText(buildNewsletter());
    setCopied(false);
  }
  function copyText() {
    try {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      });
    } catch (e) {
      // Fallback: select textarea
      const ta = document.getElementById('newsletter-textarea');
      if (ta) { ta.select(); document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 1800); }
    }
  }
  function emailIt() {
    const subject = encodeURIComponent(`${teamLabel} — Week ${weekData?.week || selectedWeek} Update`);
    const body = encodeURIComponent(text);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 600, maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
          <div>
            <h3 style={{marginBottom:4}}>Weekly Parent Update</h3>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              A friendly weekly recap to send to <strong style={{color:'var(--accent-light)'}}>{teamLabel}</strong> parents. Auto-generated from this week's sessions — edit freely before sending.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6, display:'inline-flex'}}>
            <Icon name="x" size={18}/>
          </button>
        </div>

        <textarea id="newsletter-textarea" value={text} onChange={e => setText(e.target.value)}
          style={{
            width:'100%', minHeight:240, padding:14, marginTop:8,
            background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:10,
            fontFamily:'inherit', fontSize:14, lineHeight:1.6, color:'var(--text-primary)',
            resize:'vertical', outline:'none'
          }}
          onFocus={e => e.target.style.borderColor='var(--border-focus)'}
          onBlur={e => e.target.style.borderColor='var(--border)'} />

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:10, flexWrap:'wrap', gap:8}}>
          <div style={{fontSize:11, color: overLimit ? 'var(--red)' : 'var(--text-muted)', fontWeight: overLimit ? 700 : 500}}>
            {wordCount} / {WORD_LIMIT} words{overLimit ? ' — over limit' : ''}
          </div>
          <button onClick={regenerate} className="btn-outline"
            style={{padding:'6px 12px', fontSize:11, display:'inline-flex', alignItems:'center', gap:5}}>
            <Icon name="rotate" size={11}/> Regenerate
          </button>
        </div>

        <div className="btn-row" style={{marginTop:14, gap:8}}>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          <button className="btn btn-ghost" onClick={emailIt} style={{display:'inline-flex', alignItems:'center', gap:6}}>
            ✉ Email
          </button>
          <button className="btn btn-primary" onClick={copyText} style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <Icon name="copy" size={13}/> {copied ? 'Copied!' : 'Copy text'}
          </button>
        </div>
      </div>
    </div>
  );
}

function GenerateSessionModal({ onClose, onGenerate, startTime }) {
  const allCategories = Object.keys(DRILL_LIBRARY);
  const [selectedCats, setSelectedCats] = useState(['Contact & Defence', 'Core Skills (Drills)']);
  const [preview, setPreview] = useState(null);

  // Pick a random drill from a category (or list of categories)
  function pickDrill(categories) {
    const cats = Array.isArray(categories) ? categories : [categories];
    const available = [];
    for (const cat of cats) {
      if (DRILL_LIBRARY[cat]) {
        available.push(...DRILL_LIBRARY[cat].drills);
      }
    }
    if (available.length === 0) return null;
    return available[Math.floor(Math.random() * available.length)];
  }

  function toggleCat(cat) {
    setSelectedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
  }

  function selectAll() { setSelectedCats([...allCategories]); }
  function clearAll() { setSelectedCats([]); }

  // Category display helpers
  const catIcons = {
    /* catIcons removed — clean text only */
  };

  // Session structure: 60 min total
  function generate() {
    if (selectedCats.length === 0) { setPreview(null); return; }

    // Warm up: prefer Speed & Mobility, else pull from selected
    const warmUpCats = selectedCats.includes('Speed & Mobility') ? ['Speed & Mobility'] : selectedCats;
    const warmUp = pickDrill(warmUpCats);

    // Skill: prefer Core Skills categories if selected, else pull from selected
    const skillCatOptions = selectedCats.filter(c => c.includes('Core Skills'));
    const skillCats = skillCatOptions.length > 0 ? skillCatOptions : selectedCats;
    const skill = pickDrill(skillCats);

    // Main theme blocks: pull from ALL selected categories
    const main1 = pickDrill(selectedCats);
    const main2 = pickDrill(selectedCats);

    // Game situation: prefer game categories if selected, else pull from selected
    const gameCatOptions = selectedCats.filter(c => c.includes('Game') || c.includes('Conditioned'));
    const gameCats = gameCatOptions.length > 0 ? gameCatOptions : selectedCats;
    const game = pickDrill(gameCats);

    // Build focus label from selected categories (shortened)
    const focusLabel = selectedCats.length <= 3
      ? selectedCats.map(c => c.replace(/ — .*/, '').replace(' (Drills)', '')).join(' + ')
      : selectedCats.length + ' categories';

    const session = [
      { activity: warmUp ? warmUp.name : 'Warm Up', duration: '10', staff: '', focus: 'Warm up', notes: warmUp ? warmUp.notes : 'Movement prep' },
      { activity: 'Transition', duration: '2', staff: '', focus: '', notes: 'Instructions for next block' },
      { activity: skill ? skill.name : 'Core Skill Block', duration: '10', staff: '', focus: 'Skill', notes: skill ? skill.notes : 'Core skill work' },
      { activity: 'Transition — Drink Break', duration: '3', staff: '', focus: '', notes: '' },
      { activity: main1 ? main1.name : 'Main Theme Block 1', duration: '12', staff: '', focus: focusLabel, notes: main1 ? main1.notes : '' },
      { activity: main2 ? main2.name : 'Main Theme Block 2', duration: '8', staff: '', focus: focusLabel, notes: main2 ? main2.notes : '' },
      { activity: 'Transition — Drink Break', duration: '2', staff: '', focus: '', notes: '' },
      { activity: game ? game.name : 'Game Situation', duration: '10', staff: '', focus: focusLabel + ' — Game', notes: game ? game.notes : 'Game incorporating theme' },
      { activity: 'Circle Breath — Debrief', duration: '3', staff: 'All', focus: 'Reflection', notes: 'What went well, what to improve, big ups' },
    ];

    setPreview(session);
  }

  // Auto-generate on mount and when categories change
  useEffect(() => { generate(); }, [selectedCats]);

  const totalDrills = selectedCats.reduce((s, c) => s + (DRILL_LIBRARY[c]?.drills?.length || 0), 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 680}}>
        <h3>Generate Session</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:12}}>
          Select the categories you want drills pulled from. Pick as many as you like — we'll build a 60-minute session mixing them all together.
        </p>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontSize:11, color:'var(--text-muted)'}}>
            {selectedCats.length} selected · {totalDrills} drills available
          </span>
          <div style={{display:'flex', gap:6}}>
            <button onClick={selectAll} style={{fontSize:10, color:'var(--accent-light)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Select All</button>
            <button onClick={clearAll} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
          </div>
        </div>

        <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:16, maxHeight:180, overflowY:'auto', padding:'4px 0'}}>
          {allCategories.map(cat => {
            const isSelected = selectedCats.includes(cat);
            const drillCount = DRILL_LIBRARY[cat]?.drills?.length || 0;
            return (
              <button
                key={cat}
                onClick={() => toggleCat(cat)}
                style={{
                  padding:'8px 12px', borderRadius:8,
                  border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                  background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                  cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:6,
                  flexShrink: 0
                }}
              >
                <span style={{fontSize:11, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{cat}</span>
                <span style={{fontSize:9, color:'var(--text-muted)', fontWeight:400}}>({drillCount})</span>
              </button>
            );
          })}
        </div>

        <button className="btn-outline" onClick={generate} style={{marginBottom:12, fontSize:11}} disabled={selectedCats.length === 0}>
          {preview ? 'Re-roll Drills' : 'Generate'}
        </button>

        {selectedCats.length === 0 && (
          <div style={{textAlign:'center', padding:'20px 0', color:'var(--text-muted)', fontSize:12}}>
            Select at least one category to generate a session
          </div>
        )}

        {preview && (
          <div className="parse-preview" style={{maxHeight:240, overflowY:'auto'}}>
            <div className="parse-preview-title">Preview — {preview.length} activities, {preview.reduce((s,a) => s + (parseInt(a.duration)||0), 0)} min</div>
            {preview.map((a, i) => {
              const isTrans = a.activity.toLowerCase().includes('transition');
              return (
                <div key={i} className="parse-row" style={{opacity: isTrans ? 0.5 : 1}}>
                  <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.duration}m</span>
                  <span style={{color:'var(--text-primary)', fontWeight: isTrans ? 400 : 600}}>{a.activity}</span>
                  <span style={{color:'var(--text-muted)', fontSize:10}}>{a.focus}</span>
                </div>
              );
            })}
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => preview && onGenerate(preview)} disabled={!preview || selectedCats.length === 0}>
            Load Session
          </button>
        </div>
      </div>
    </div>
  );
}

function EditActivityModal({ activity, onClose, onSave, onDelete, canBeParallel }) {
  const [name, setName] = useState(activity.activity || '');
  const [duration, setDuration] = useState(activity.duration || '');
  const [staff, setStaff] = useState(activity.staff || '');
  const [focus, setFocus] = useState(activity.focus || '');
  const [notes, setNotes] = useState(activity.notes || '');
  const [parallel, setParallel] = useState(!!activity.parallel);
  const [showDrillPicker, setShowDrillPicker] = useState(false);
  const [drillSearch, setDrillSearch] = useState('');
  const [expandedCat, setExpandedCat] = useState(null);

  function handleSave() {
    onSave({
      ...activity,
      activity: name,
      duration: duration,
      staff: staff,
      focus: focus,
      notes: notes,
      parallel: canBeParallel ? parallel : false,
    });
  }

  function handlePickDrill(drill, cat) {
    setName(drill.name);
    if (drill.notes && !notes.trim()) setNotes(drill.notes);
    setShowDrillPicker(false);
  }

  // Filter the library by search
  const filteredLibrary = useMemo(() => {
    if (!drillSearch.trim()) return DRILL_LIBRARY;
    const q = drillSearch.toLowerCase();
    const result = {};
    for (const [cat, data] of Object.entries(DRILL_LIBRARY)) {
      const matches = data.drills.filter(d => d.name.toLowerCase().includes(q) || (d.notes && d.notes.toLowerCase().includes(q)));
      if (matches.length > 0) result[cat] = { ...data, drills: matches };
    }
    return result;
  }, [drillSearch]);
  const totalResults = Object.values(filteredLibrary).reduce((s, c) => s + c.drills.length, 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:560}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
          <h3 style={{margin:0}}>Edit Activity</h3>
          <button onClick={onDelete} style={{background:'var(--red-bg)', color:'var(--red)', border:'1px solid transparent', borderRadius:6, padding:'6px 12px', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s', display:'inline-flex', alignItems:'center', gap:6}}
            onMouseOver={e => e.currentTarget.style.borderColor = 'var(--red)'}
            onMouseOut={e => e.currentTarget.style.borderColor = 'transparent'}
          ><Icon name="trash" size={12}/> Delete</button>
        </div>

        {/* Drill library picker */}
        <div className="form-group">
          <button onClick={() => setShowDrillPicker(!showDrillPicker)}
            style={{width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid ' + (showDrillPicker ? 'var(--brand-pink)' : 'var(--border)'),
              background: showDrillPicker ? 'var(--accent-glow)' : 'var(--bg-input)',
              color: showDrillPicker ? 'var(--brand-pink)' : 'var(--text-secondary)',
              cursor:'pointer', fontSize:12, fontWeight:600, fontFamily:'inherit',
              display:'flex', justifyContent:'space-between', alignItems:'center', transition:'all 0.15s'}}
          >
            <span style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="library" size={14}/> Pick from Drill Library</span>
            <span style={{display:'inline-flex', transform: showDrillPicker ? 'rotate(180deg)' : 'rotate(0)', transition:'transform 0.2s'}}><Icon name="chevronDown" size={14}/></span>
          </button>

          {showDrillPicker && (
            <div style={{marginTop:10, padding:12, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:10, maxHeight:320, overflowY:'auto'}}>
              <div style={{position:'relative', marginBottom:10}}>
                <span style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', display:'inline-flex'}}><Icon name="search" size={14}/></span>
                <input value={drillSearch} onChange={e => setDrillSearch(e.target.value)} placeholder="Search drills..."
                  style={{width:'100%', padding:'8px 12px 8px 32px', border:'1px solid var(--border)', borderRadius:6, background:'#fff', fontSize:12, fontFamily:'inherit', outline:'none'}} autoFocus />
              </div>
              {drillSearch && <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:8}}>{totalResults} result{totalResults !== 1 ? 's' : ''}</div>}
              {Object.entries(filteredLibrary).map(([cat, data]) => {
                const isOpen = drillSearch ? true : expandedCat === cat;
                return (
                  <div key={cat} style={{marginBottom:6}}>
                    <div onClick={() => setExpandedCat(isOpen ? null : cat)}
                      style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 8px', cursor:'pointer', borderRadius:5, fontSize:12, fontWeight:600, color: data.color || 'var(--text-primary)', background: isOpen ? 'rgba(0,0,0,0.04)' : 'transparent'}}>
                      <span>{cat}</span>
                      <span style={{fontSize:10, color:'var(--text-muted)', fontWeight:500}}>{data.drills.length}</span>
                    </div>
                    {isOpen && (
                      <div style={{paddingLeft:10, marginTop:4}}>
                        {data.drills.map((d, i) => (
                          <div key={i} onClick={() => handlePickDrill(d, cat)}
                            style={{padding:'6px 8px', fontSize:12, color:'var(--text-primary)', cursor:'pointer', borderRadius:4, transition:'all 0.1s'}}
                            onMouseOver={e => { e.currentTarget.style.background = 'var(--accent-glow)'; e.currentTarget.style.color = 'var(--brand-pink)'; }}
                            onMouseOut={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-primary)'; }}
                          >{d.name}</div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              {totalResults === 0 && <div style={{fontSize:12, color:'var(--text-muted)', textAlign:'center', padding:12}}>No drills match "{drillSearch}"</div>}
            </div>
          )}
        </div>

        <div className="form-group">
          <label className="form-label">Activity Name</label>
          <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Positional Craft" />
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div className="form-group">
            <label className="form-label">Duration (min)</label>
            <input className="form-input" type="number" min="1" max="120" value={duration} onChange={e => setDuration(e.target.value)} placeholder="e.g. 15" />
          </div>
          <div className="form-group">
            <label className="form-label">Staff</label>
            <input className="form-input" value={staff} onChange={e => setStaff(e.target.value)} placeholder="e.g. Jackson, Mel" />
          </div>
        </div>
        {canBeParallel && (
          <div className="form-group">
            <label style={{display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background: parallel ? 'var(--accent-glow)' : 'var(--bg-input)', border: '1px solid ' + (parallel ? 'var(--brand-pink)' : 'var(--border)'), borderRadius:8, cursor:'pointer', transition:'all 0.15s'}}>
              <input type="checkbox" checked={parallel} onChange={e => setParallel(e.target.checked)} style={{accentColor:'var(--brand-pink)', cursor:'pointer'}} />
              <div style={{flex:1}}>
                <div style={{fontSize:12, fontWeight:600, color: parallel ? 'var(--brand-pink)' : 'var(--text-primary)', display:'flex', alignItems:'center', gap:6}}>
                  <Icon name="rotate" size={13}/> Run at the same time as previous drill
                </div>
                <div style={{fontSize:10, color:'var(--text-muted)', marginTop:2}}>Use for rotations/stations where multiple groups train simultaneously</div>
              </div>
            </label>
          </div>
        )}
        <div className="form-group">
          <label className="form-label">Focus</label>
          <input className="form-input" value={focus} onChange={e => setFocus(e.target.value)} placeholder="e.g. Warm up, Defence contact" />
        </div>
        <div className="form-group">
          <label className="form-label">Notes</label>
          <textarea className="form-textarea" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Coaching notes, instructions, key points..." />
        </div>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!name.trim()}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

function AddDrillModal({ onClose, onAdd }) {
  const [mode, setMode] = useState('library'); // 'library' | 'custom'
  const [category, setCategory] = useState(Object.keys(DRILL_LIBRARY)[0]);
  const [selectedDrill, setSelectedDrill] = useState("");
  const [customName, setCustomName] = useState("");
  const [customFocus, setCustomFocus] = useState("");
  const [time, setTime] = useState("");
  const [duration, setDuration] = useState("");
  const [staff, setStaff] = useState("");
  const [notes, setNotes] = useState("");

  const drills = DRILL_LIBRARY[category]?.drills || [];
  const canSubmit = mode === 'library' ? !!selectedDrill : !!customName.trim();

  function handleSubmit() {
    if (!canSubmit) return;
    if (mode === 'library') {
      const drill = drills.find(d => d.name === selectedDrill);
      onAdd({
        time: time || "",
        activity: selectedDrill,
        duration: duration || "",
        notes: notes || (drill?.notes || ""),
        focus: "",
        staff: staff || "",
      });
    } else {
      onAdd({
        time: time || "",
        activity: customName.trim(),
        duration: duration || "",
        notes: notes || "",
        focus: customFocus.trim() || "",
        staff: staff || "",
      });
    }
  }

  const tabBtnStyle = (active) => ({
    flex: 1, padding: '10px 14px', borderRadius: 8, fontSize: 12, fontWeight: 700,
    border: '1px solid ' + (active ? 'var(--accent)' : 'var(--border)'),
    background: active ? 'var(--accent-glow)' : 'var(--bg-input)',
    color: active ? 'var(--accent-light)' : 'var(--text-secondary)',
    cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.15s'
  });

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Add Drill to Session</h3>

        <div style={{display:'flex', gap:8, marginBottom:16}}>
          <button style={tabBtnStyle(mode === 'library')} onClick={() => setMode('library')}>From Drill Library</button>
          <button style={tabBtnStyle(mode === 'custom')} onClick={() => setMode('custom')}>Custom drill</button>
        </div>

        {mode === 'library' ? (
          <>
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-select" value={category} onChange={e => { setCategory(e.target.value); setSelectedDrill(""); }}>
                {Object.keys(DRILL_LIBRARY).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Drill</label>
              <select className="form-select" value={selectedDrill} onChange={e => setSelectedDrill(e.target.value)}>
                <option value="">Select a drill...</option>
                {drills.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
              </select>
              {selectedDrill && drills.find(d => d.name === selectedDrill)?.notes && (
                <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
                  {drills.find(d => d.name === selectedDrill).notes}
                </div>
              )}
            </div>
          </>
        ) : (
          <>
            <div className="form-group">
              <label className="form-label">Drill name *</label>
              <input className="form-input" autoFocus placeholder="e.g. 4 v 4 Edge Defence"
                value={customName} onChange={e => setCustomName(e.target.value)} />
              <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
                Type any drill name — it doesn't need to be in the library.
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Focus / Tag (optional)</label>
              <input className="form-input" placeholder="e.g. Defence · Skill · Conditioning"
                value={customFocus} onChange={e => setCustomFocus(e.target.value)} />
            </div>
          </>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div className="form-group">
            <label className="form-label">Time</label>
            <input className="form-input" placeholder="e.g. 5:15" value={time} onChange={e => setTime(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Duration (min)</label>
            <input className="form-input" placeholder="e.g. 15" value={duration} onChange={e => setDuration(e.target.value)} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Staff</label>
          <input className="form-input" placeholder="e.g. Jackson, Mel" value={staff} onChange={e => setStaff(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Notes</label>
          <textarea className="form-textarea" placeholder="Coaching notes..." value={notes} onChange={e => setNotes(e.target.value)} />
        </div>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={!canSubmit}>Add to Session</button>
        </div>
      </div>
    </div>
  );
}

function SeasonOverview({ setActiveTab, setSelectedWeek, setSelectedDay, seasonWeeks, userWeekOverrides, customActivities, weekDays }) {
  const SEASON_WEEKS = seasonWeeks || DEFAULT_SEASON_WEEKS;
  const overrides = userWeekOverrides || {};
  const acts = customActivities || {};
  const wd = weekDays || {};
  const palette = ['#E95B9E', '#29BAE5', '#d97706', '#16a34a', '#a855f7'];
  const blockColorMap = {};
  const blockOrder = [];
  SEASON_WEEKS.forEach(w => { if (!blockOrder.includes(w.block)) blockOrder.push(w.block); });
  blockOrder.forEach((name, i) => { blockColorMap[name] = palette[i % palette.length]; });

  function getMerged(w) {
    const ov = overrides[w.week] || {};
    return { ...w, focus: ov.focus ?? w.focus, outcomes: ov.outcomes ?? w.outcomes, game: ov.game ?? w.game };
  }
  // Sessions planned for a week (days that have activities)
  function sessionsForWeek(week) {
    const days = wd[week] || ['Tuesday', 'Thursday'];
    return days.filter(d => (acts[`${week}-${d}`] || []).length > 0).map(d => ({ day: d, count: acts[`${week}-${d}`].length }));
  }
  const dayShort = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun' };

  return (
    <div className="card">
      <div className="card-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span>Season Overview</span>
        <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{SEASON_WEEKS.length} weeks · {blockOrder.length} blocks</span>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'70px 130px 180px 1fr 140px', gap:8, padding:'10px 0', borderBottom:'1px solid var(--border)', marginBottom:6}}>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Week</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Dates</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Sessions</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Focus / Outcomes</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Game</div>
      </div>
      {SEASON_WEEKS.map((w, i) => {
        const merged = getMerged(w);
        const prevBlock = i > 0 ? SEASON_WEEKS[i-1].block : null;
        const blockColor = blockColorMap[w.block] || 'var(--text-secondary)';
        const plannedDays = sessionsForWeek(w.week);
        const allDays = (wd[w.week] || ['Tuesday', 'Thursday']);
        return (
          <React.Fragment key={w.week}>
            {w.block !== prevBlock && (
              <div style={{paddingTop: 14, paddingBottom: 6}}>
                <span style={{display:'inline-block', fontSize:10, fontWeight:700, padding:'3px 10px', borderRadius:4, letterSpacing:0.5, textTransform:'uppercase', background: `${blockColor}1A`, color: blockColor}}>{w.block}</span>
              </div>
            )}
            <div
              style={{display:'grid', gridTemplateColumns:'70px 130px 180px 1fr 140px', gap:8, padding:'10px 8px', borderBottom:'1px solid rgba(0,0,0,0.06)', cursor:'pointer', borderRadius:6, transition:'background 0.1s', alignItems:'start'}}
              onMouseOver={e => e.currentTarget.style.background = 'var(--bg-input)'}
              onMouseOut={e => e.currentTarget.style.background = 'transparent'}
              onClick={() => { setSelectedWeek(w.week); setActiveTab('session'); }}
            >
              <div style={{fontSize:13, fontWeight:700, color:'var(--brand-cyan)'}}>Wk {w.week}</div>
              <div style={{fontSize:12, color:'var(--text-muted)'}}>{w.dates || '—'}</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                {allDays.map(d => {
                  const planned = plannedDays.find(p => p.day === d);
                  return (
                    <span key={d} onClick={(e) => { e.stopPropagation(); setSelectedWeek(w.week); if (setSelectedDay) setSelectedDay(d); setActiveTab('session'); }}
                      style={{
                        fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:10,
                        background: planned ? 'var(--accent-glow)' : 'var(--bg-input)',
                        color: planned ? 'var(--brand-pink)' : 'var(--text-muted)',
                        border: '1px solid ' + (planned ? 'var(--brand-pink)' : 'var(--border)'),
                        display:'inline-flex', alignItems:'center', gap:3
                      }}
                      title={planned ? `${planned.count} activities on ${d}` : `${d} — no session yet`}
                    >
                      {dayShort[d] || d}{planned ? ` · ${planned.count}` : ''}
                    </span>
                  );
                })}
              </div>
              <div style={{fontSize:12, color:'var(--text-primary)', lineHeight:1.5}}>
                {merged.focus ? <div style={{color:'var(--brand-pink)', fontWeight:600, fontSize:11}}>{merged.focus}</div> : null}
                {merged.outcomes ? <div style={{color:'var(--text-secondary)', marginTop:2}}>{merged.outcomes}</div> : null}
                {!merged.focus && !merged.outcomes && <span style={{color:'var(--text-muted)'}}>—</span>}
              </div>
              <div style={{fontSize:12, fontWeight:600, color: merged.game ? 'var(--orange)' : 'var(--text-muted)'}}>{merged.game || '—'}</div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

function DrillLibrary({ search, setSearch }) {
  const [expandedDrill, setExpandedDrill] = useState(null);
  const [openCats, setOpenCats] = useState({});

  function toggleCat(cat) {
    setOpenCats(prev => ({ ...prev, [cat]: !prev[cat] }));
  }

  // When searching, auto-open all matching categories
  const isCatOpen = (cat) => search ? true : !!openCats[cat];

  const filtered = useMemo(() => {
    if (!search) return DRILL_LIBRARY;
    const s = search.toLowerCase();
    const result = {};
    Object.entries(DRILL_LIBRARY).forEach(([cat, data]) => {
      const matches = data.drills.filter(d => d.name.toLowerCase().includes(s) || (d.notes && d.notes.toLowerCase().includes(s)) || cat.toLowerCase().includes(s));
      if (matches.length > 0) result[cat] = { ...data, drills: matches };
    });
    return result;
  }, [search]);

  const totalDrills = Object.values(filtered).reduce((sum, c) => sum + c.drills.length, 0);

  function getPhase(notes) {
    if (!notes) return null;
    const n = notes.toLowerCase();
    if (n.startsWith('attack')) return 'attack';
    if (n.startsWith('defence') || n.startsWith('defense')) return 'defence';
    if (n.startsWith('kicking')) return 'kicking';
    return null;
  }

  function drillKey(cat, name) { return `${cat}::${name}`; }

  function toggleDrill(cat, name) {
    const key = drillKey(cat, name);
    setExpandedDrill(prev => prev === key ? null : key);
  }

  // Find which weeks use a drill (fuzzy match)
  function findUsedInWeeks(drillName) {
    const weeks = [];
    const search = drillName.toLowerCase().replace(/^(fwd|ob|hlf|hkr|core):\s*/i, '');
    Object.entries(SESSION_DETAILS).forEach(([week, days]) => {
      Object.entries(days).forEach(([day, activities]) => {
        if (activities.some(a => a.activity.toLowerCase().includes(search.substring(0, 15)))) {
          const sw = SEASON_WEEKS.find(s => s.week === week);
          const label = sw ? (sw.week === 'GF' ? 'GF' : sw.week.startsWith('PS') ? sw.week : `Wk ${sw.week}`) : week;
          if (!weeks.includes(label)) weeks.push(label);
        }
      });
    });
    return weeks;
  }

  return (
    <div>
      <div className="card">
        <div className="card-title">Drill Library — {totalDrills} drills across {Object.keys(filtered).length} categories</div>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>Click any drill to see full coaching notes, position tags, and which weeks it appears in.</p>
        <div className="search-wrap">
          <span className="search-icon">&#x2315;</span>
          <input className="search-input" placeholder="Search drills by name, category, or notes..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap'}}>
          <button className="btn-outline" onClick={() => { const all = {}; Object.keys(filtered).forEach(c => all[c] = true); setOpenCats(all); }}>
            <span className="ico">▼</span> Expand All
          </button>
          <button className="btn-outline" onClick={() => setOpenCats({})}>
            <span className="ico">▶</span> Collapse All
          </button>
        </div>
        <div className="drill-categories">
          {Object.entries(filtered).map(([cat, data]) => {
            const isOpen = isCatOpen(cat);
            return (
              <div key={cat} className="drill-cat">
                <div className={`drill-cat-header ${isOpen ? 'open' : ''}`} onClick={() => toggleCat(cat)}>
                  <span style={{color: data.color}}>●</span>
                  {cat}
                  <span className="drill-cat-count">{data.drills.length}</span>
                  <span className="cat-chevron">▶</span>
                </div>
                {isOpen && (
                  <div className="drill-cat-body">
                    {data.drills.map(d => {
                      const key = drillKey(cat, d.name);
                      const isExpanded = expandedDrill === key;
                      const phase = getPhase(d.notes);
                      const usedIn = isExpanded ? findUsedInWeeks(d.name) : [];

                      return (
                        <div key={d.name} className={`drill-item ${isExpanded ? 'expanded' : ''}`} onClick={() => toggleDrill(cat, d.name)}>
                          <div className="drill-name-row">
                            <span>
                              {d.name}
                              {d.position && <span style={{fontSize:10, color:'var(--text-muted)', marginLeft:6}}>({d.position})</span>}
                            </span>
                            <span className="drill-arrow">▶</span>
                          </div>

                          {isExpanded && (
                            <div className="drill-detail" onClick={e => e.stopPropagation()}>
                              {d.notes && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">Coaching Notes</div>
                                  <div className="drill-detail-value">{d.notes.replace(/^(Attack|Defence|Defense|Kicking)\s*[-—]\s*/i, '')}</div>
                                </div>
                              )}

                              <div className="drill-detail-section">
                                <div className="drill-detail-label">Tags</div>
                                <div>
                                  {d.position && <span className="drill-detail-tag tag-position">{d.position}</span>}
                                  {phase === 'attack' && <span className="drill-detail-tag tag-attack">Attack</span>}
                                  {phase === 'defence' && <span className="drill-detail-tag tag-defence">Defence</span>}
                                  {phase === 'kicking' && <span className="drill-detail-tag tag-kicking">Kicking</span>}
                                  <span className="drill-detail-tag" style={{background:'rgba(233,91,158,0.1)', color: data.color}}>{cat}</span>
                                </div>
                              </div>

                              {d.gps && (d.gps.mpm || d.gps.hsr || d.gps.time) && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">GPS Load Data (avg)</div>
                                  <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                                    {d.gps.time && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(6,182,212,0.1)', color:'#06b6d4', fontWeight:600}}>{d.gps.time} min</span>}
                                    {d.gps.mpm && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(34,197,94,0.1)', color:'#22c55e', fontWeight:600}}>{d.gps.mpm} m/min</span>}
                                    {d.gps.hsr && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(249,115,22,0.1)', color:'#f97316', fontWeight:600}}>{d.gps.hsr} HSR/min</span>}
                                    {d.gps.al && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(168,85,247,0.1)', color:'#a855f7', fontWeight:600}}>{d.gps.al} AL/min</span>}
                                  </div>
                                </div>
                              )}

                              {usedIn.length > 0 && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">Used in Weeks</div>
                                  <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
                                    {usedIn.map(w => (
                                      <span key={w} style={{fontSize:10, padding:'2px 8px', borderRadius:4, background:'var(--blue-bg)', color:'var(--blue)', fontWeight:600}}>{w}</span>
                                    ))}
                                  </div>
                                </div>
                              )}

                              {!d.notes && !d.position && (
                                <div style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>No additional details yet. Add notes when you use this drill.</div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// SEASON SETUP MODAL

function SeasonSetupModal({ onComplete, onClose, existing }) {
  const [totalWeeks, setTotalWeeks] = useState(existing?.totalWeeks || 10);
  const [startDate, setStartDate] = useState(existing?.startDate || '');
  const [blockCount, setBlockCount] = useState(existing?.blockNames?.length || 4);
  const [blockNames, setBlockNames] = useState(existing?.blockNames || [...DEFAULT_BLOCK_NAMES]);

  function handleBlockCountChange(count) {
    setBlockCount(count);
    const names = [...blockNames];
    while (names.length < count) names.push(`Block ${names.length + 1}`);
    setBlockNames(names.slice(0, count));
  }
  function handleSave() {
    onComplete({ totalWeeks: parseInt(totalWeeks) || 10, startDate: startDate || null, blockNames: blockNames.slice(0, blockCount) });
  }
  const weeksPerBlock = Math.max(1, Math.floor(totalWeeks / blockCount));
  return (
    <div className="modal-overlay">
      <div className="modal-content" style={{maxWidth:540}}>
        <div className="modal-title">Set Up Your Season</div>
        <div className="modal-subtitle">Customise the number of weeks, blocks, and start date for this team's season.</div>
        <div className="form-group">
          <label className="form-label">Total weeks</label>
          <input type="number" min="1" max="52" className="form-input" value={totalWeeks} onChange={e => setTotalWeeks(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Start date (optional)</label>
          <input type="date" className="form-input" value={startDate} onChange={e => setStartDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Number of blocks</label>
          <select className="form-select" value={blockCount} onChange={e => handleBlockCountChange(parseInt(e.target.value))}>
            {[2,3,4,5].map(n => <option key={n} value={n}>{n} blocks (~{Math.max(1, Math.floor(totalWeeks/n))} weeks each)</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Block names</label>
          {blockNames.slice(0, blockCount).map((name, i) => (
            <input key={i} className="form-input" value={name}
              onChange={e => { const n = [...blockNames]; n[i] = e.target.value; setBlockNames(n); }}
              style={{marginBottom:6}} />
          ))}
        </div>
        <div className="modal-buttons">
          {onClose && <button className="modal-btn modal-btn-secondary" onClick={onClose}>Cancel</button>}
          <button className="modal-btn modal-btn-primary" onClick={handleSave}>Save Season</button>
        </div>
      </div>
    </div>
  );
}

// DAILY PLANNER

function DailyPlanner({ customActivities, setActiveTab, setSelectedWeek, setSelectedDay, userWeekOverrides, setUserWeekOverrides, seasonWeeks, weekDays, currentTeam, sessionStartTimes, getSessionStartTime, seasonConfig }) {
  const today = new Date();
  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][today.getDay()];
  const dateStr = today.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });

  // Auto-detect "current week" from season start date when available
  const autoWeekIdx = useMemo(() => {
    if (!seasonConfig || !seasonConfig.startDate) return 0;
    const start = new Date(seasonConfig.startDate);
    if (isNaN(start.getTime())) return 0;
    const diffMs = today - start;
    if (diffMs < 0) return 0;
    const wk = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 7));
    return Math.max(0, Math.min(seasonWeeks.length - 1, wk));
  }, [seasonConfig, seasonWeeks.length]);
  const [homeWeekIdx, setHomeWeekIdx] = useState(autoWeekIdx);
  useEffect(() => { setHomeWeekIdx(autoWeekIdx); }, [autoWeekIdx]);

  const currentWeek = seasonWeeks[homeWeekIdx] || seasonWeeks[0];
  const activeDays = (weekDays && weekDays[currentWeek?.week]) || ['Tuesday', 'Thursday'];
  const sessionDay = activeDays.includes(dayName) ? dayName : activeDays[0];
  const customKey = `${currentWeek?.week}-${sessionDay}`;
  const todaysActivities = recalcTimes(customActivities[customKey] || [], getSessionStartTime ? getSessionStartTime(currentWeek?.week, sessionDay) : '16:00');
  const sessionsThisWeek = activeDays.filter(d => (customActivities[`${currentWeek?.week}-${d}`] || []).length > 0).length;

  const weekOverride = currentWeek ? (userWeekOverrides[currentWeek.week] || {}) : {};
  const weekFocus = weekOverride.focus || currentWeek?.focus || '';
  const weekOutcomes = weekOverride.outcomes || currentWeek?.outcomes || '';
  function updateWeekField(field, value) {
    if (!currentWeek) return;
    setUserWeekOverrides(prev => ({ ...prev, [currentWeek.week]: { ...(prev[currentWeek.week] || {}), [field]: value } }));
  }
  function openSession() {
    setSelectedWeek(currentWeek?.week || '1');
    setSelectedDay(sessionDay);
    setActiveTab('session');
  }

  return (
    <div>
      <div className="card" style={{background: 'linear-gradient(135deg, rgba(233,91,158,0.08), rgba(41,186,229,0.08))', border:'1px solid var(--border)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:12}}>
          <div>
            <div style={{fontSize:11, fontWeight:700, color:'var(--brand-pink)', textTransform:'uppercase', letterSpacing:1.5}}>Today</div>
            <div style={{fontSize:22, fontWeight:800, color:'var(--text-primary)', marginTop:2}}>{dateStr}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1}}>Week</div>
            <div style={{fontSize:24, fontWeight:800, color:'var(--brand-cyan)'}}>{currentWeek?.week || '—'}</div>
          </div>
        </div>
        <div style={{marginTop:14}}>
          <label style={{fontSize:11, fontWeight:700, color:'var(--brand-cyan)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:4, display:'block'}}>Session Objective</label>
          <div contentEditable suppressContentEditableWarning style={{fontSize:14, fontWeight:600, color:'var(--text-primary)', padding:'4px 0', borderBottom:'1px dashed transparent', outline:'none', minHeight:22, cursor:'text'}}
            onFocus={e => { e.currentTarget.style.borderBottomColor = 'var(--border)'; }}
            onBlur={e => { e.currentTarget.style.borderBottomColor = 'transparent'; updateWeekField('focus', e.currentTarget.textContent); }}
            dangerouslySetInnerHTML={{__html: weekFocus || '<span style="color:#8f95a8;font-weight:400">Click to set objective...</span>'}}
          />
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginTop:4}}>
        <div className="card">
          <div className="card-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span>Today's Session</span>
            {todaysActivities.length > 0 && <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{todaysActivities.length} activities</span>}
          </div>
          {todaysActivities.length > 0 ? (
            <>
              <div style={{marginBottom:10}}>
                {todaysActivities.map((a, i) => {
                  const isTrans = isTransition(a.activity || '');
                  const color = activityColor(a.activity || '');
                  return (
                    <div key={i} style={{display:'flex', gap:10, padding:'8px 10px', marginBottom:4, borderRadius:8, borderLeft: isTrans ? 'none' : `3px solid ${color.border}`, background: isTrans ? 'transparent' : 'var(--bg-input)'}}>
                      <div style={{fontSize:11, fontWeight:700, color: color.border, minWidth:40}}>{a.time || '—'}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13, color:'var(--text-primary)', fontWeight:500}}>{a.activity || 'Unnamed'}
                          {!isTrans && color.label && <span style={{fontSize:9, fontWeight:700, textTransform:'uppercase', color: color.border, marginLeft:6, opacity:0.7}}>{color.label}</span>}
                        </div>
                        {a.duration && <div style={{fontSize:11, color:'var(--text-muted)', marginTop:2}}>{a.duration} min{a.focus ? ' · ' + a.focus : ''}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <button className="btn btn-primary btn-sm" onClick={openSession} style={{width:'100%'}}>Open Session Builder</button>
            </>
          ) : (
            <div style={{textAlign:'center', padding:'32px 0'}}>
              <div style={{fontSize:13, color:'var(--text-muted)', marginBottom:10}}>No session planned for {sessionDay}</div>
              <button className="btn btn-primary btn-sm" onClick={openSession}>Build a Session</button>
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-title">Weekly Focus</div>
          <label className="form-label" style={{color:'var(--brand-cyan)'}}>Focus</label>
          <input className="form-input" value={weekFocus} onChange={e => updateWeekField('focus', e.target.value)} placeholder="e.g. Defensive line speed, catch-pass under pressure" style={{marginBottom:10}} />
          <label className="form-label" style={{color:'var(--brand-pink)'}}>Desired outcomes</label>
          <textarea className="form-textarea" value={weekOutcomes} onChange={e => updateWeekField('outcomes', e.target.value)} placeholder="What should the team walk away knowing/doing by the end of this week?" style={{minHeight:80}} />
        </div>
      </div>

      {/* === WEEKLY VIEW — all training days for the selected week === */}
      <div className="card" style={{marginTop:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10, marginBottom:14}}>
          <div>
            <div className="card-title" style={{marginBottom:2}}>This Week's Sessions</div>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              Week {currentWeek?.week}{currentWeek?.dates ? ' · ' + currentWeek.dates : ''}{currentWeek?.blockName ? ' · ' + currentWeek.blockName : ''}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <button className="btn-outline" onClick={() => setHomeWeekIdx(i => Math.max(0, i - 1))}
              disabled={homeWeekIdx === 0}
              style={{padding:'6px 10px', fontSize:11, opacity: homeWeekIdx === 0 ? 0.4 : 1}}>‹ Prev</button>
            <select value={homeWeekIdx} onChange={e => setHomeWeekIdx(parseInt(e.target.value, 10))}
              style={{padding:'6px 10px', fontSize:12, fontWeight:600, fontFamily:'inherit', border:'1px solid var(--border)', borderRadius:6, background:'var(--bg-card)', color:'var(--text-primary)', cursor:'pointer'}}>
              {seasonWeeks.map((w, i) => (
                <option key={w.week} value={i}>Week {w.week}{w.dates ? ' · ' + w.dates : ''}</option>
              ))}
            </select>
            <button className="btn-outline" onClick={() => setHomeWeekIdx(i => Math.min(seasonWeeks.length - 1, i + 1))}
              disabled={homeWeekIdx >= seasonWeeks.length - 1}
              style={{padding:'6px 10px', fontSize:11, opacity: homeWeekIdx >= seasonWeeks.length - 1 ? 0.4 : 1}}>Next ›</button>
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:`repeat(auto-fit, minmax(200px, 1fr))`, gap:10}}>
          {activeDays.map(day => {
            const key = `${currentWeek?.week}-${day}`;
            const startTime = getSessionStartTime ? getSessionStartTime(currentWeek?.week, day) : '16:00';
            const acts = recalcTimes(customActivities[key] || [], startTime);
            const drills = acts.filter(a => !isTransition(a.activity || ''));
            const totalDuration = acts.reduce((sum, a) => sum + (parseInt(a.duration) || 0), 0);
            const isToday = day === dayName && homeWeekIdx === autoWeekIdx;
            const accent = isToday ? 'var(--brand-pink)' : 'var(--brand-cyan)';
            return (
              <div key={day}
                onClick={() => { setSelectedWeek(currentWeek?.week); setSelectedDay(day); setActiveTab('session'); }}
                style={{
                  padding: 12,
                  borderRadius: 10,
                  background: isToday ? 'rgba(233,91,158,0.06)' : 'var(--bg-card)',
                  border: `1px solid ${isToday ? 'var(--brand-pink)' : 'var(--border)'}`,
                  borderTop: `3px solid ${accent}`,
                  cursor: 'pointer',
                  transition: 'transform 0.1s, box-shadow 0.1s'
                }}
                onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)'; }}
                onMouseLeave={e => { e.currentTarget.style.boxShadow = 'none'; }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8}}>
                  <div style={{fontSize:14, fontWeight:700, color: isToday ? 'var(--brand-pink)' : 'var(--text-primary)'}}>
                    {day}{isToday ? ' · today' : ''}
                  </div>
                  <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)'}}>{startTime}</div>
                </div>
                {acts.length === 0 ? (
                  <div style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic', padding:'14px 0', textAlign:'center'}}>No session planned</div>
                ) : (
                  <>
                    <div style={{fontSize:10, fontWeight:600, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6}}>
                      {drills.length} drill{drills.length === 1 ? '' : 's'} · {totalDuration} min
                    </div>
                    {acts.slice(0, 6).map((a, i) => {
                      const isTrans = isTransition(a.activity || '');
                      const color = activityColor(a.activity || '');
                      return (
                        <div key={i} style={{
                          display:'flex', gap:6, alignItems:'center',
                          padding:'3px 0', fontSize:11,
                          opacity: isTrans ? 0.55 : 1
                        }}>
                          <span style={{minWidth:36, fontWeight:700, color: isTrans ? 'var(--text-muted)' : color.border}}>{a.time || '—'}</span>
                          <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color: isTrans ? 'var(--text-muted)' : 'var(--text-primary)'}}>{a.activity}</span>
                        </div>
                      );
                    })}
                    {acts.length > 6 && (
                      <div style={{fontSize:10, color:'var(--text-muted)', marginTop:4, fontStyle:'italic'}}>+ {acts.length - 6} more</div>
                    )}
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{marginTop:4}}>
        <div className="card-title" style={{display:'flex', justifyContent:'space-between'}}>
          <span>Season Progress</span>
          <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{sessionsThisWeek} sessions planned this week</span>
        </div>
        <div style={{height:12, background:'var(--bg-input)', borderRadius:6, overflow:'hidden', marginTop:8}}>
          <div style={{height:'100%', width:`${Math.min(100, (1/seasonWeeks.length)*100)}%`, background:'var(--brand-pink)', borderRadius:6}} />
        </div>
        <div style={{fontSize:11, color:'var(--text-muted)', marginTop:6}}>Week 1 of {seasonWeeks.length}</div>
      </div>

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TEAM LIST 1-18 — match-day team selection
// ═══════════════════════════════════════════════════════════
function TeamList18({ squad, roster, matchday18, setMatchday18, currentSub, teamColor, teamColorBg, TEAM_POSITIONS, onOpenProfile }) {
  // Build a map of squad players by id for quick lookup
  const playerById = useMemo(() => {
    const m = {};
    (squad || []).forEach(p => { if (p._id) m[p._id] = p; });
    return m;
  }, [squad]);

  // Players eligible for selection: those tagged for this team (in roster).
  // Sort by name for the picker.
  const eligible = useMemo(() => {
    const ids = Array.isArray(roster) ? roster : [];
    return ids
      .map(id => playerById[id])
      .filter(Boolean)
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  }, [roster, playerById]);

  // Ensure matchday18 has length 18 (pad with empty strings)
  const slots = useMemo(() => {
    const out = Array.isArray(matchday18) ? matchday18.slice(0, 18) : [];
    while (out.length < 18) out.push('');
    return out;
  }, [matchday18]);

  function setSlot(idx, playerId) {
    setMatchday18(prev => {
      const arr = (Array.isArray(prev) ? prev.slice(0, 18) : []);
      while (arr.length < 18) arr.push('');
      arr[idx] = playerId || '';
      return arr;
    });
  }
  function clearAll() {
    if (window.confirm('Clear all 18 positions?')) setMatchday18(Array(18).fill(''));
  }
  function autoFill() {
    // Auto-assign players to first available slot, in name order, skipping slots already filled
    const used = new Set(slots.filter(Boolean));
    const remaining = eligible.filter(p => !used.has(p._id));
    setMatchday18(prev => {
      const arr = (Array.isArray(prev) ? prev.slice(0, 18) : []);
      while (arr.length < 18) arr.push('');
      let r = 0;
      for (let i = 0; i < 18 && r < remaining.length; i++) {
        if (!arr[i]) { arr[i] = remaining[r]._id; r++; }
      }
      return arr;
    });
  }

  const filledCount = slots.filter(Boolean).length;
  // Detect duplicates (same player assigned to multiple slots)
  const counts = {};
  slots.forEach(id => { if (id) counts[id] = (counts[id] || 0) + 1; });
  const duplicates = Object.keys(counts).filter(id => counts[id] > 1);

  return (
    <div className="card" style={{borderTop:`4px solid ${teamColor}`, marginTop:0}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:12}}>
        <div>
          <div className="card-title" style={{marginBottom:2, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <span>Match-day Team — {currentSub}</span>
            <span style={{display:'inline-flex', alignItems:'center', gap:6, background:teamColorBg, color:teamColor, padding:'2px 10px', borderRadius:12, fontSize:11, fontWeight:700}}>
              {filledCount} / 18
            </span>
          </div>
          <div style={{fontSize:12, color:'var(--text-muted)', marginTop:4}}>
            Pick from {eligible.length} player{eligible.length === 1 ? '' : 's'} tagged for {currentSub}.
            {eligible.length === 0 && ' Tag players using the + ' + currentSub.toUpperCase() + ' button below.'}
          </div>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button className="btn-outline" onClick={autoFill} disabled={eligible.length === 0}
            style={{fontSize:11, padding:'6px 12px', opacity: eligible.length === 0 ? 0.5 : 1}}>
            Auto-fill empty slots
          </button>
          <button className="btn-outline" onClick={clearAll} disabled={filledCount === 0}
            style={{fontSize:11, padding:'6px 12px', opacity: filledCount === 0 ? 0.5 : 1}}>
            Clear all
          </button>
        </div>
      </div>

      {duplicates.length > 0 && (
        <div style={{fontSize:11, color:'var(--red)', background:'var(--red-bg)', padding:'6px 10px', borderRadius:6, marginBottom:10}}>
          ⚠ {duplicates.length} player{duplicates.length === 1 ? '' : 's'} assigned to more than one position.
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:8}}>
        {TEAM_POSITIONS.map((tp, idx) => {
          const playerId = slots[idx];
          const player = playerId ? playerById[playerId] : null;
          const isDuplicate = playerId && counts[playerId] > 1;
          const isBench = tp.num >= 14;
          return (
            <div key={tp.num} style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'8px 10px', background:'var(--bg-card)',
              border:`1px solid ${isDuplicate ? 'var(--red)' : (player ? teamColor : 'var(--border)')}`,
              borderRadius:8,
              opacity: isBench ? 0.95 : 1,
              borderLeft: `4px solid ${isBench ? 'var(--text-muted)' : teamColor}`
            }}>
              <div style={{
                width:28, height:28, flexShrink:0,
                background: player ? teamColor : 'var(--bg-input)',
                color: player ? 'white' : 'var(--text-muted)',
                borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center',
                fontWeight:800, fontSize:12
              }}>{tp.num}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span>{tp.pos}</span>
                  {player && onOpenProfile && (
                    <span onClick={() => onOpenProfile(player._id)} title="Open profile"
                      style={{cursor:'pointer', color:teamColor, fontSize:9, fontWeight:700, textTransform:'none', letterSpacing:0}}>
                      profile ›
                    </span>
                  )}
                </div>
                <select value={playerId || ''} onChange={e => setSlot(idx, e.target.value)}
                  style={{
                    width:'100%', padding:'4px 6px', fontSize:13, fontWeight: player ? 600 : 400,
                    color: player ? 'var(--text-primary)' : 'var(--text-muted)',
                    background:'transparent', border:'1px solid transparent',
                    borderRadius:5, cursor:'pointer', fontFamily:'inherit', outline:'none'
                  }}
                  onFocus={e => e.target.style.borderColor='var(--border)'}
                  onBlur={e => e.target.style.borderColor='transparent'}>
                  <option value="">— empty —</option>
                  {eligible.map(p => (
                    <option key={p._id} value={p._id}>
                      {p.name}{p.position ? ' (' + p.position + ')' : ''}
                    </option>
                  ))}
                </select>
              </div>
              {player && (
                <button onClick={() => setSlot(idx, '')} title="Clear position"
                  style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4, display:'inline-flex', flexShrink:0}}>
                  <Icon name="x" size={12}/>
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// BULK IMPORT TEST DATA — paste spreadsheet rows, fuzzy match, assign
// ═══════════════════════════════════════════════════════════
function ImportTestDataModal({ squad, setSquad, onClose }) {
  const [rawText, setRawText] = useState('');
  const [importDate, setImportDate] = useState(() => {
    // Default to 1 Aug of last year — typical pre-season testing date
    const d = new Date(); d.setFullYear(d.getFullYear() - 1, 7, 1);
    return d.toISOString().slice(0, 10);
  });
  const [seasonTag, setSeasonTag] = useState(() => String(new Date().getFullYear() - 1));
  const [step, setStep] = useState('paste'); // paste | review | done
  const [overrideMap, setOverrideMap] = useState({}); // { rowIdx: playerId }
  const [skipMap, setSkipMap] = useState({}); // { rowIdx: true }

  const normalize = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');

  // === Parse rawText into headers + rows ===
  const parsed = useMemo(() => {
    if (!rawText.trim()) return { headers: [], rows: [] };
    const lines = rawText.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return { headers: [], rows: [] };
    const split = (line) => {
      // Tab-separated preferred (spreadsheet paste), fall back to comma
      if (line.indexOf('\t') >= 0) return line.split('\t').map(c => c.trim());
      return line.split(',').map(c => c.trim());
    };
    const headers = split(lines[0]);
    const dataRows = lines.slice(1).map(l => split(l));
    return { headers, rows: dataRows };
  }, [rawText]);

  // === Match each row to a squad player ===
  const matched = useMemo(() => {
    return parsed.rows.map((row, idx) => {
      const importedName = row[0] || '';
      let player = null;
      const overrideId = overrideMap[idx];
      if (overrideId) {
        player = squad.find(p => p._id === overrideId) || null;
      } else if (importedName) {
        const norm = normalize(importedName);
        // Exact normalized match
        player = squad.find(p => normalize(p.name) === norm) || null;
        if (!player) {
          // Last name match (last token)
          const tokens = importedName.toLowerCase().split(/[\s,]+/).filter(Boolean);
          const last = tokens[tokens.length - 1] || '';
          const first = tokens[0] || '';
          if (last) {
            const candidates = squad.filter(p => {
              const n = p.name.toLowerCase();
              return n.includes(last) || n.includes(first);
            });
            if (candidates.length === 1) player = candidates[0];
            else if (candidates.length > 1 && first) {
              player = candidates.find(p => p.name.toLowerCase().includes(first)) || null;
            }
          }
        }
      }
      // Pull test columns (skip first col = name). Skip cols with blank header (separator cols).
      const tests = [];
      for (let c = 1; c < parsed.headers.length; c++) {
        const value = (row[c] || '').trim();
        const test = (parsed.headers[c] || '').trim();
        if (!test) continue; // separator column between term blocks
        if (!value || value === '·' || value === '-' || value === '—') continue;
        tests.push({ test, value });
      }
      return { idx, importedName, player, tests };
    });
  }, [parsed, squad, overrideMap]);

  const matchedCount = matched.filter(m => m.player && !skipMap[m.idx]).length;
  const unmatchedCount = matched.filter(m => !m.player && !skipMap[m.idx]).length;
  const totalTestsToImport = matched.reduce((sum, m) => {
    if (!m.player || skipMap[m.idx]) return sum;
    return sum + m.tests.length;
  }, 0);

  function doImport() {
    setSquad(prev => prev.map(p => {
      const myRows = matched.filter(m => m.player && m.player._id === p._id && !skipMap[m.idx]);
      if (myRows.length === 0) return p;
      const newEntries = myRows.flatMap(m => m.tests.map(t => ({
        id: 'gt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        date: importDate,
        test: t.test,
        value: t.value,
        notes: seasonTag ? `${seasonTag} testing` : '',
      })));
      const existing = (p.profile && Array.isArray(p.profile.gymTests)) ? p.profile.gymTests : [];
      return { ...p, profile: { ...(p.profile || {}), gymTests: [...existing, ...newEntries] } };
    }));
    setStep('done');
  }

  const exampleText = "Name\t40m Sprint\tYo-Yo Test\tBench Press (1RM)\tSquat (1RM)\nHalo Clarke-Telka\t5.82\t1850\t30kg\t55kg\nAva Nia\t5.55\t2100\t35kg\t65kg";

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 760, maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
          <div>
            <h3 style={{marginBottom:4}}>Import Test Data</h3>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              Paste rows from a spreadsheet. Names get auto-matched to your squad — review and confirm before importing.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6, display:'inline-flex'}}>
            <Icon name="x" size={18}/>
          </button>
        </div>

        {step === 'paste' && (
          <>
            <div className="format-hint" style={{marginBottom:12}}>
              <div className="format-hint-title">Expected format (paste from Excel / Google Sheets)</div>
              <pre style={{fontSize:11, color:'var(--text-secondary)', whiteSpace:'pre-wrap', margin:0}}>{`Name        40m Sprint   Yo-Yo Test   Bench Press   Squat
Halo Clarke    5.82       1850          30kg          55kg
Ava Nia        5.55       2100          35kg          65kg`}</pre>
              <div style={{fontSize:11, color:'var(--text-muted)', marginTop:6}}>
                First column = player name. Other columns = test names. Tab or comma separated. Header row required.
              </div>
            </div>

            <textarea className="paste-area" value={rawText} onChange={e => setRawText(e.target.value)}
              placeholder="Paste your test data here..."
              style={{minHeight: 200}} />

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:14}}>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Date for these results</label>
                <input type="date" className="form-input" value={importDate} onChange={e => setImportDate(e.target.value)} />
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Season tag (added to notes)</label>
                <input className="form-input" value={seasonTag} onChange={e => setSeasonTag(e.target.value)}
                  placeholder="e.g. 2024 pre-season" />
              </div>
            </div>

            <div className="btn-row" style={{marginTop:16}}>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-ghost" onClick={() => setRawText(exampleText)}>Use example</button>
              <button className="btn btn-primary" onClick={() => setStep('review')}
                disabled={parsed.rows.length === 0}>
                Continue → Review {parsed.rows.length} row{parsed.rows.length === 1 ? '' : 's'}
              </button>
            </div>
          </>
        )}

        {step === 'review' && (
          <>
            <div style={{padding:12, background:'var(--bg-input)', borderRadius:8, marginBottom:12, fontSize:12, display:'flex', gap:16, flexWrap:'wrap'}}>
              <div><span style={{color:'var(--text-muted)'}}>Matched:</span> <strong style={{color:'var(--green)'}}>{matchedCount}</strong></div>
              <div><span style={{color:'var(--text-muted)'}}>Unmatched:</span> <strong style={{color: unmatchedCount > 0 ? 'var(--red)' : 'var(--text-muted)'}}>{unmatchedCount}</strong></div>
              <div><span style={{color:'var(--text-muted)'}}>Tests to import:</span> <strong style={{color:'var(--brand-pink)'}}>{totalTestsToImport}</strong></div>
              <div style={{marginLeft:'auto'}}><span style={{color:'var(--text-muted)'}}>Date:</span> <strong>{importDate}</strong></div>
            </div>

            <div style={{maxHeight:340, overflowY:'auto', border:'1px solid var(--border)', borderRadius:8}}>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
                <thead>
                  <tr style={{position:'sticky', top:0, background:'var(--bg-input)', zIndex:1}}>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>From sheet</th>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Assign to player</th>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Tests</th>
                    <th style={{padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Skip</th>
                  </tr>
                </thead>
                <tbody>
                  {matched.map(m => {
                    const skipped = !!skipMap[m.idx];
                    return (
                      <tr key={m.idx} style={{borderTop:'1px solid var(--border)', background: skipped ? 'var(--bg-input)' : 'transparent', opacity: skipped ? 0.5 : 1}}>
                        <td style={{padding:'8px 10px', fontWeight:600}}>{m.importedName || '(blank)'}</td>
                        <td style={{padding:'8px 10px'}}>
                          <select value={m.player ? m.player._id : ''}
                            onChange={e => setOverrideMap(prev => ({...prev, [m.idx]: e.target.value}))}
                            style={{width:'100%', padding:'4px 6px', fontSize:12, fontFamily:'inherit',
                              background: m.player ? 'var(--green-bg)' : 'var(--red-bg)',
                              color: m.player ? 'var(--green)' : 'var(--red)', fontWeight:600,
                              border:`1px solid ${m.player ? 'var(--green)' : 'var(--red)'}`, borderRadius:5}}>
                            <option value="">— No match —</option>
                            {squad.map(p => <option key={p._id} value={p._id} style={{color:'var(--text-primary)', background:'#fff'}}>{p.name}</option>)}
                          </select>
                        </td>
                        <td style={{padding:'8px 10px', color:'var(--text-secondary)'}}>
                          {m.tests.length > 0 ? m.tests.map(t => `${t.test}: ${t.value}`).join(', ') : <span style={{color:'var(--text-muted)'}}>—</span>}
                        </td>
                        <td style={{padding:'8px 10px', textAlign:'center'}}>
                          <input type="checkbox" checked={skipped} onChange={e => setSkipMap(prev => ({...prev, [m.idx]: e.target.checked}))} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="btn-row" style={{marginTop:16}}>
