          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-outline" onClick={() => { setPreview(null); setTimeout(generateBlock, 50); }} style={{marginRight:'auto'}} disabled={!canGenerate}>
            Re-roll
          </button>
          <button className="btn btn-primary" onClick={commitBlock} disabled={!preview}>
            Load Block
          </button>
        </div>
      </div>
    </div>
  );
}

function CopySessionModal({ onClose, onCopy, currentWeek, currentDay, currentTeam, customActivities, seasonWeeks }) {
  // Build TEAMS list locally (App's TEAMS isn't passed in, but the structure is fixed)
  const AGE_GROUPS = [
    { id: '7-8',   label: 'Years 7/8',   short: '7/8'   },
    { id: '9-10',  label: 'Years 9/10',  short: '9/10'  },
    { id: '11-12', label: 'Years 11/12', short: '11/12' }
  ];
  const SUB_TEAMS = ['Cup', 'Challenge'];
  const TEAMS = AGE_GROUPS.flatMap(g => SUB_TEAMS.map(s => ({ id: `${g.id}-${s.toLowerCase()}`, label: `${g.label} ${s}` })));

  const [sourceTeam, setSourceTeam] = useState(currentTeam);
  const [sourceWeek, setSourceWeek] = useState("");
  const [sourceDay, setSourceDay] = useState("");

  // Get the source team's customActivities (current team uses prop; others read from localStorage)
  const sourceCustomActivities = useMemo(() => {
    if (sourceTeam === currentTeam) return customActivities || {};
    try { return JSON.parse(localStorage.getItem(`playiq_${sourceTeam}_customActivities`) || '{}'); } catch(e) { return {}; }
  }, [sourceTeam, currentTeam, customActivities]);

  // For each week present in either the blueprint or the source team's custom data,
  // build a map of day → activities (custom overrides blueprint)
  const sourceWeekMap = useMemo(() => {
    const map = {};
    // Seed from blueprint
    Object.entries(SESSION_DETAILS).forEach(([wk, days]) => {
      map[wk] = {};
      Object.entries(days).forEach(([d, acts]) => { map[wk][d] = acts; });
    });
    // Override / add custom
    Object.entries(sourceCustomActivities).forEach(([key, acts]) => {
      const dash = key.indexOf('-');
      if (dash < 0) return;
      const wk = key.slice(0, dash);
      const d = key.slice(dash + 1);
      if (!Array.isArray(acts) || acts.length === 0) return;
      if (!map[wk]) map[wk] = {};
      map[wk][d] = acts;
    });
    return map;
  }, [sourceCustomActivities]);

  // Sort weeks numerically (1, 2, 3 ... PS1, GF)
  const sortedWeeks = useMemo(() => {
    return Object.keys(sourceWeekMap).sort((a, b) => {
      const an = parseInt(a, 10), bn = parseInt(b, 10);
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      if (!isNaN(an)) return -1;
      if (!isNaN(bn)) return 1;
      return a.localeCompare(b);
    });
  }, [sourceWeekMap]);

  // Filter out the (current week, current day) tuple — but only when source team is current team
  const availableWeeks = sortedWeeks.filter(w => {
    const days = sourceWeekMap[w] || {};
    const validDays = Object.keys(days).filter(d => Array.isArray(days[d]) && days[d].length > 0);
    if (validDays.length === 0) return false;
    if (sourceTeam !== currentTeam) return true;
    if (w === currentWeek && validDays.length === 1 && validDays[0] === currentDay) return false;
    return true;
  });

  const sourceDays = sourceWeek && sourceWeekMap[sourceWeek]
    ? Object.keys(sourceWeekMap[sourceWeek]).filter(d => Array.isArray(sourceWeekMap[sourceWeek][d]) && sourceWeekMap[sourceWeek][d].length > 0)
    : [];

  const previewActivities = sourceWeek && sourceDay && sourceWeekMap[sourceWeek]?.[sourceDay]
    ? sourceWeekMap[sourceWeek][sourceDay]
    : [];

  // Reset week/day when team changes
  useEffect(() => {
    setSourceWeek("");
    setSourceDay("");
  }, [sourceTeam]);

  const SEASON_WKS = seasonWeeks || [];
  const weekLabel = (w) => {
    const sw = SEASON_WKS.find(s => s.week === w);
    if (!sw) return `Wk ${w}`;
    const label = sw.week === 'GF' ? 'GF' : sw.week.startsWith('PS') ? sw.week : `Wk ${sw.week}`;
    return sw.dates ? `${label} — ${sw.dates}` : label;
  };
  const blockColors = { 1: 'var(--orange)', 2: 'var(--blue)', 3: 'var(--green)', 4: 'var(--red)' };
  const phaseColor = (w) => {
    const sw = SEASON_WKS.find(s => s.week === w);
    if (!sw) return 'var(--text-muted)';
    return blockColors[sw.block] || 'var(--text-muted)';
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 640, maxWidth: '92vw'}}>
        <h3>Copy Session</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Pick a source team, week and day. Its activities will replace what's currently in <strong style={{color:'var(--accent-light)'}}>{currentDay}</strong> of the current week.
        </p>

        <div className="form-group">
          <label className="form-label">Source Team</label>
          <select className="form-select" value={sourceTeam} onChange={e => setSourceTeam(e.target.value)}>
            {TEAMS.map(t => (
              <option key={t.id} value={t.id}>{t.label}{t.id === currentTeam ? ' (current)' : ''}</option>
            ))}
          </select>
        </div>

        <div className="copy-source">
          <div>
            <div className="form-label">Source Week</div>
            <div className="copy-week-list" style={{background:'var(--bg-input)', borderRadius:8, padding:6, border:'1px solid var(--border)'}}>
              {availableWeeks.length === 0 && (
                <div style={{padding:12, fontSize:12, color:'var(--text-muted)', fontStyle:'italic'}}>
                  No sessions yet for this team.
                </div>
              )}
              {availableWeeks.map(w => {
                const days = sourceWeekMap[w] || {};
                const actCount = Object.values(days).filter(a => Array.isArray(a)).reduce((s, a) => s + a.length, 0);
                return (
                  <div key={w} className={`copy-week-item ${sourceWeek === w ? 'selected' : ''}`}
                    onClick={() => {
                      setSourceWeek(w);
                      const validDays = Object.keys(days).filter(d => Array.isArray(days[d]) && days[d].length > 0);
                      setSourceDay(validDays[0] || "");
                    }}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <span className="phase-dot" style={{background: phaseColor(w)}} />
                      <span style={{color:'var(--text-primary)', fontWeight: sourceWeek === w ? 600 : 400}}>{weekLabel(w)}</span>
                    </div>
                    <span className="copy-preview-count">{actCount} drills</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div>
            <div className="form-label">Source Day</div>
            {sourceDays.length > 0 ? (
              <div style={{marginBottom:12}}>
                <div className="day-tabs" style={{flexWrap:'wrap'}}>
                  {sourceDays.map(d => (
                    <button key={d} className={`day-tab ${sourceDay === d ? 'active' : ''}`} onClick={() => setSourceDay(d)}>{d}</button>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{fontSize:12, color:'var(--text-muted)', padding: 12}}>Select a week to see available days</div>
            )}

            {previewActivities.length > 0 && (
              <div className="parse-preview" style={{maxHeight:220, overflowY:'auto'}}>
                <div className="parse-preview-title">Preview ({previewActivities.length} activities)</div>
                {previewActivities.map((a, i) => (
                  <div key={i} className="parse-row">
                    <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.time || '—'}</span>
                    <span style={{color:'var(--text-primary)'}}>{a.activity}</span>
                    <span style={{color:'var(--text-muted)'}}>{a.duration ? `${a.duration}m` : ''}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary"
            onClick={() => onCopy(previewActivities)}
            disabled={!sourceWeek || previewActivities.length === 0}>
            Copy {previewActivities.length} Activities
          </button>
        </div>
      </div>
    </div>
  );
}

function PasteSessionModal({ onClose, onPaste }) {
  const [rawText, setRawText] = useState("");
  const [parsed, setParsed] = useState([]);

  function parseText(text) {
    if (!text.trim()) { setParsed([]); return; }
    const lines = text.split('\n').filter(l => l.trim());
    const results = [];

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;

      // Try multiple formats:
      // Format 1: "4:00 | Mobility | 15 | Notes here" (pipe separated)
      // Format 2: "4:00  Mobility  15min  Notes here" (tab/multi-space separated)
      // Format 3: "4:00,Mobility,15,Notes here" (comma separated)
      // Format 4: "- Mobility (15 min)" (bullet list)
      // Format 5: Just a drill name

      let activity = { time: "", activity: "", duration: "", notes: "", focus: "", staff: "" };

      if (trimmed.includes('|')) {
        const parts = trimmed.split('|').map(p => p.trim());
        if (parts.length >= 2) {
          // Check if first part looks like a time
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(' | ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(' | ');
          }
        }
      } else if (trimmed.includes(',')) {
        const parts = trimmed.split(',').map(p => p.trim());
        if (parts.length >= 2) {
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(', ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(', ');
          }
        }
      } else if (trimmed.includes('\t')) {
        const parts = trimmed.split('\t').map(p => p.trim()).filter(Boolean);
        if (parts.length >= 2) {
          if (/^\d{1,2}[:.]\d{2}$/.test(parts[0]) || /^\d{3,4}$/.test(parts[0])) {
            activity.time = parts[0];
            activity.activity = parts[1] || "";
            activity.duration = (parts[2] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(3).join(' ');
          } else {
            activity.activity = parts[0];
            activity.duration = (parts[1] || "").replace(/[^0-9]/g, '');
            activity.notes = parts.slice(2).join(' ');
          }
        }
      } else {
        // Bullet list or plain text
        let cleaned = trimmed.replace(/^[-*•]\s*/, '').replace(/^\d+[.)]\s*/, '');
        // Extract duration in parentheses: "Mobility (15 min)"
        const durMatch = cleaned.match(/\((\d+)\s*(?:min|m|mins|minutes)?\)/i);
        if (durMatch) {
          activity.duration = durMatch[1];
          cleaned = cleaned.replace(durMatch[0], '').trim();
        }
        // Extract time at start: "4:30 Mobility"
        const timeMatch = cleaned.match(/^(\d{1,2}[:.]\d{2}|\d{3,4})\s+/);
        if (timeMatch) {
          activity.time = timeMatch[1];
          cleaned = cleaned.replace(timeMatch[0], '').trim();
        }
        activity.activity = cleaned;
      }

      if (activity.activity) {
        results.push(activity);
      }
    }
    setParsed(results);
  }

  function handleTextChange(text) {
    setRawText(text);
    parseText(text);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 640}}>
        <h3>Paste a Session Plan</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Paste a session from a spreadsheet, text doc, notes app, or any format. PlayIQ will parse it into your timeline.
        </p>

        <div className="format-hint">
          <div className="format-hint-title">Supported formats</div>
          <div style={{fontSize:11, color:'var(--text-secondary)', lineHeight:1.8}}>
            <div><code>4:00 | Mobility | 15 | Movement prep</code> — pipe separated</div>
            <div><code>4:00, Mobility, 15, Movement prep</code> — comma separated</div>
            <div><code>- Mobility (15 min)</code> — bullet list with optional duration</div>
            <div><code>Warm Up Game</code> — just the drill name</div>
            <div>Or paste directly from Excel/Google Sheets (tab-separated)</div>
          </div>
        </div>

        <textarea
          className="paste-area"
          placeholder={"Paste your session here...\n\nExamples:\n4:00 | Meeting Room | 20 | Team review\n4:20 | Mobility | 15\n4:35 | Speed | 15 | A.B.C Runs\n4:50 | Con Game | 20 | Coffin Ball\n5:10 | Positional Craft | 25\n5:35 | Circle Breath | 5 | Debrief"}
          value={rawText}
          onChange={e => handleTextChange(e.target.value)}
        />

        {parsed.length > 0 && (
          <div className="parse-preview">
            <div className="parse-preview-title">Parsed Preview — {parsed.length} activities detected</div>
            {parsed.map((a, i) => (
              <div key={i} className="parse-row">
                <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.time || '—'}</span>
                <span style={{color:'var(--text-primary)'}}>{a.activity}</span>
                <span style={{color:'var(--text-muted)'}}>{a.duration ? `${a.duration}m` : ''}</span>
              </div>
            ))}
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => onPaste(parsed)} disabled={parsed.length === 0}>
            Import {parsed.length} Activities
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// NEWSLETTER GENERATOR — weekly parent/community update (≤100 words)
// ═══════════════════════════════════════════════════════════
function NewsletterModal({ onClose, weekData, weekDays, customActivities, selectedWeek, currentGroup, currentSub }) {
  const teamLabel = currentGroup ? `${currentGroup.label} ${currentSub || ''}`.trim() : 'Team';
  const WORD_LIMIT = 220;

  // Optional context fields — things the auto-gen can't infer
  const [matchResult, setMatchResult] = useState('');
  const [matchNotes, setMatchNotes] = useState('');
  const [conditions, setConditions] = useState('');
  const [lookAhead, setLookAhead] = useState('');
  const [coachName, setCoachName] = useState('');

  function buildNewsletter() {
    const days = (weekDays && weekDays[selectedWeek]) || ['Tuesday', 'Thursday'];
    const focus = (weekData?.focus || '').trim();
    const outcomes = (weekData?.outcomes || '').trim();
    const game = (weekData?.game || '').trim();
    const wkLabel = weekData?.week || selectedWeek;
    const result = (matchResult || '').trim();
    const matchExtra = (matchNotes || '').trim();
    const cond = (conditions || '').trim();
    const ahead = (lookAhead || '').trim();
    const coach = (coachName || '').trim();

    // Helpers
    const isTrans = (n) => typeof n === 'string' && (
      n.toLowerCase().startsWith('transition') || n.toLowerCase().includes('drink break')
    );
    const cleanName = (s) => (s || '')
      .replace(/^(CORE:|CORE\s*-|CORE\s+|Skill:|Defence\s*-|Attack\s*-)\s*/i, '')
      .replace(/\s+\([^)]*\)\s*$/, '')
      .trim();
    const lower1 = (s) => (s || '').replace(/^./, c => c.toLowerCase());
    const stripPeriod = (s) => (s || '').replace(/\.$/, '');
    const cap1 = (s) => (s || '').replace(/^./, c => c.toUpperCase());

    // Gather per-day drill names (deduped)
    const dayContent = [];
    days.forEach(d => {
      const acts = customActivities[`${selectedWeek}-${d}`] || [];
      const drills = [...new Set(acts.filter(a => !isTrans(a.activity)).map(a => cleanName(a.activity)).filter(Boolean))];
      if (drills.length > 0) dayContent.push({ day: d, drills });
    });

    // === HEADER (subject line) ===
    // If there's a result, headline mirrors Mr Schwass / Mrs Webber style:
    //   "Year 9/10 Titans Cup (30) def. St James (4) – Mrs Webber"
    // Otherwise: "Years 7/8 Cup – Mrs Carter"
    let headerLine = teamLabel;
    if (result) headerLine = `${teamLabel} — ${result}`;
    if (coach) headerLine = `${headerLine}${result ? '' : ''} – ${coach}`;
    headerLine = headerLine || `${teamLabel} — Week ${wkLabel} Update`;

    // === BODY — narrative coach voice, day-by-day ===
    const bodyParts = [];

    // Opener: lead with result if there's one, else with weekly focus or generic
    if (result) {
      bodyParts.push(`This week the team had ${matchExtra ? lower1(matchExtra) : 'a big week capped off by our match'}.`);
      if (matchExtra && !matchExtra.toLowerCase().includes('result')) {
        // matchExtra was the lead — don't repeat it
      }
    } else if (focus) {
      bodyParts.push(`This week the girls continued to build on ${lower1(stripPeriod(focus))} as we work towards the season ahead.`);
    } else {
      bodyParts.push(`Here is a quick wrap of what the girls have been working on at training this week.`);
    }

    // Day-by-day narrative — vary verbs to sound natural
    const verbs = ['focused on', 'centred around', 'worked through', 'continued with', 'covered', 'built into'];
    dayContent.forEach((d, i) => {
      const tops = d.drills.slice(0, 3).map(lower1);
      const list = tops.length === 1 ? tops[0]
        : tops.length === 2 ? `${tops[0]} and ${tops[1]}`
        : `${tops.slice(0, -1).join(', ')}, and ${tops[tops.length - 1]}`;
      const verb = verbs[i % verbs.length];
      if (i === 0) {
        bodyParts.push(`${d.day}'s session ${verb} ${list}.`);
      } else if (i === dayContent.length - 1) {
        bodyParts.push(`${d.day}'s session then ${verb} ${list}, bringing the week together heading into the weekend.`);
      } else {
        bodyParts.push(`On ${d.day} we ${verb} ${list}.`);
      }
    });

    if (dayContent.length === 0) {
      bodyParts.push(`Training continued our skill and conditioning blocks this week.`);
    }

    // Conditions (e.g. wet weather)
    if (cond) {
      bodyParts.push(`${cap1(stripPeriod(cond))}.`);
    }

    // Coach observations / outcomes
    if (outcomes) bodyParts.push(`${stripPeriod(outcomes)}.`);

    // Looking ahead — match next week, or what's coming
    if (ahead) {
      bodyParts.push(`Looking ahead, ${lower1(stripPeriod(ahead))}.`);
    } else if (game && !result) {
      bodyParts.push(`Looking ahead, we have ${stripPeriod(game)} — please make sure boots, mouthguards, and a full water bottle are packed.`);
    }

    // === SIGN OFF ===
    const signoff = coach
      ? `Thanks for your continued support of the girls.\n\n– ${coach}`
      : `Thanks for your continued support of the girls.\n\n– ${teamLabel} Coaching Staff`;

    let body = bodyParts.join(' ');
    const bw = body.split(/\s+/).filter(Boolean);
    if (bw.length > WORD_LIMIT) body = bw.slice(0, WORD_LIMIT - 1).join(' ') + '…';

    return `${headerLine}\n\n${body}\n\n${signoff}`;
  }

  const [text, setText] = useState(buildNewsletter);
  const [copied, setCopied] = useState(false);

  // Word count = everything except the header subject line (first line before the first blank line)
  const wordCount = (() => {
    const parts = text.split(/\n\n/);
    const body = parts.length > 1 ? parts.slice(1).join(' ') : text;
    return body.trim().split(/\s+/).filter(Boolean).length;
  })();
  const overLimit = wordCount > WORD_LIMIT;

  function regenerate() {
    setText(buildNewsletter());
    setCopied(false);
  }
  function copyText() {
    try {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      });
    } catch (e) {
      // Fallback: select textarea
      const ta = document.getElementById('newsletter-textarea');
      if (ta) { ta.select(); document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 1800); }
    }
  }
  function emailIt() {
    const subject = encodeURIComponent(`${teamLabel} — Week ${weekData?.week || selectedWeek} Update`);
    const body = encodeURIComponent(text);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 600, maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
          <div>
            <h3 style={{marginBottom:4}}>Weekly Parent Update</h3>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              A friendly weekly recap to send to <strong style={{color:'var(--accent-light)'}}>{teamLabel}</strong> parents — written in coach-voice, day-by-day. Add any extras below then click <em>Regenerate</em>.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6, display:'inline-flex'}}>
            <Icon name="x" size={18}/>
          </button>
        </div>

        {/* Optional context fields — things the auto-gen can't know */}
        <details style={{marginTop:8, marginBottom:10, padding:'10px 12px', background:'var(--bg-input)', borderRadius:8}}>
          <summary style={{cursor:'pointer', fontSize:12, fontWeight:700, color:'var(--text-primary)', listStyle:'none', userSelect:'none'}}>
            ▸ Add this week's context (match result, weather, what's coming up...)
          </summary>

            ✉ Email
          </button>
          <button className="btn btn-primary" onClick={copyText} style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <Icon name="copy" size={13}/> {copied ? 'Copied!' : 'Copy text'}

        </div>
      </div>
    </div>
  );
}

function GenerateSessionModal({ onClose, onGenerate, startTime }) {
  const allCategories = Object.keys(DRILL_LIBRARY);
  const [selectedCats, setSelectedCats] = useState(['Contact & Defence', 'Core Skills (Drills)']);
  const [preview, setPreview] = useState(null);

  // Pick a random drill from a category (or list of categories)
  function pickDrill(categories) {
    const cats = Array.isArray(categories) ? categories : [categories];
    const available = [];
    for (const cat of cats) {
      if (DRILL_LIBRARY[cat]) {
        available.push(...DRILL_LIBRARY[cat].drills);
      }
    }
    if (available.length === 0) return null;
    return available[Math.floor(Math.random() * available.length)];
  }

  function toggleCat(cat) {
    setSelectedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
  }

  function selectAll() { setSelectedCats([...allCategories]); }
  function clearAll() { setSelectedCats([]); }

  // Category display helpers
  const catIcons = {
    /* catIcons removed — clean text only */
  };

  // Session structure: 60 min total
  function generate() {
    if (selectedCats.length === 0) { setPreview(null); return; }

    // Warm up: prefer Speed & Mobility, else pull from selected
    const warmUpCats = selectedCats.includes('Speed & Mobility') ? ['Speed & Mobility'] : selectedCats;
    const warmUp = pickDrill(warmUpCats);

    // Skill: prefer Core Skills categories if selected, else pull from selected
    const skillCatOptions = selectedCats.filter(c => c.includes('Core Skills'));
    const skillCats = skillCatOptions.length > 0 ? skillCatOptions : selectedCats;
    const skill = pickDrill(skillCats);

    // Main theme blocks: pull from ALL selected categories
    const main1 = pickDrill(selectedCats);
    const main2 = pickDrill(selectedCats);

    // Game situation: prefer game categories if selected, else pull from selected
    const gameCatOptions = selectedCats.filter(c => c.includes('Game') || c.includes('Conditioned'));
    const gameCats = gameCatOptions.length > 0 ? gameCatOptions : selectedCats;
    const game = pickDrill(gameCats);

    // Build focus label from selected categories (shortened)
    const focusLabel = selectedCats.length <= 3
      ? selectedCats.map(c => c.replace(/ — .*/, '').replace(' (Drills)', '')).join(' + ')
      : selectedCats.length + ' categories';

    const session = [
      { activity: warmUp ? warmUp.name : 'Warm Up', duration: '10', staff: '', focus: 'Warm up', notes: warmUp ? warmUp.notes : 'Movement prep' },
      { activity: 'Transition', duration: '2', staff: '', focus: '', notes: 'Instructions for next block' },
      { activity: skill ? skill.name : 'Core Skill Block', duration: '10', staff: '', focus: 'Skill', notes: skill ? skill.notes : 'Core skill work' },
      { activity: 'Transition — Drink Break', duration: '3', staff: '', focus: '', notes: '' },
      { activity: main1 ? main1.name : 'Main Theme Block 1', duration: '12', staff: '', focus: focusLabel, notes: main1 ? main1.notes : '' },
      { activity: main2 ? main2.name : 'Main Theme Block 2', duration: '8', staff: '', focus: focusLabel, notes: main2 ? main2.notes : '' },
      { activity: 'Transition — Drink Break', duration: '2', staff: '', focus: '', notes: '' },
      { activity: game ? game.name : 'Game Situation', duration: '10', staff: '', focus: focusLabel + ' — Game', notes: game ? game.notes : 'Game incorporating theme' },
      { activity: 'Circle Breath — Debrief', duration: '3', staff: 'All', focus: 'Reflection', notes: 'What went well, what to improve, big ups' },
    ];

    setPreview(session);
  }

  // Auto-generate on mount and when categories change
  useEffect(() => { generate(); }, [selectedCats]);

  const totalDrills = selectedCats.reduce((s, c) => s + (DRILL_LIBRARY[c]?.drills?.length || 0), 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 680}}>
        <h3>Generate Session</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:12}}>
          Select the categories you want drills pulled from. Pick as many as you like — we'll build a 60-minute session mixing them all together.
        </p>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <span style={{fontSize:11, color:'var(--text-muted)'}}>
            {selectedCats.length} selected · {totalDrills} drills available
          </span>
          <div style={{display:'flex', gap:6}}>
            <button onClick={selectAll} style={{fontSize:10, color:'var(--accent-light)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Select All</button>
            <button onClick={clearAll} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
          </div>
        </div>

        <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:16, maxHeight:180, overflowY:'auto', padding:'4px 0'}}>
          {allCategories.map(cat => {
            const isSelected = selectedCats.includes(cat);
            const drillCount = DRILL_LIBRARY[cat]?.drills?.length || 0;
            return (
              <button
                key={cat}
                onClick={() => toggleCat(cat)}
                style={{
                  padding:'8px 12px', borderRadius:8,
                  border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                  background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                  cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:6,
                  flexShrink: 0
                }}
              >
                <span style={{fontSize:11, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{cat}</span>
                <span style={{fontSize:9, color:'var(--text-muted)', fontWeight:400}}>({drillCount})</span>
              </button>
            );
          })}
        </div>

        <button className="btn-outline" onClick={generate} style={{marginBottom:12, fontSize:11}} disabled={selectedCats.length === 0}>
          {preview ? 'Re-roll Drills' : 'Generate'}
        </button>

        {selectedCats.length === 0 && (
          <div style={{textAlign:'center', padding:'20px 0', color:'var(--text-muted)', fontSize:12}}>
            Select at least one category to generate a session
          </div>
        )}

        {preview && (
          <div className="parse-preview" style={{maxHeight:240, overflowY:'auto'}}>
            <div className="parse-preview-title">Preview — {preview.length} activities, {preview.reduce((s,a) => s + (parseInt(a.duration)||0), 0)} min</div>
            {preview.map((a, i) => {
              const isTrans = a.activity.toLowerCase().includes('transition');
              return (
                <div key={i} className="parse-row" style={{opacity: isTrans ? 0.5 : 1}}>
                  <span style={{color:'var(--accent-light)', fontWeight:600}}>{a.duration}m</span>
                  <span style={{color:'var(--text-primary)', fontWeight: isTrans ? 400 : 600}}>{a.activity}</span>
                  <span style={{color:'var(--text-muted)', fontSize:10}}>{a.focus}</span>
                </div>
              );
            })}
          </div>
        )}

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => preview && onGenerate(preview)} disabled={!preview || selectedCats.length === 0}>
            Load Session
          </button>
        </div>
      </div>
    </div>
  );
}

function EditActivityModal({ activity, onClose, onSave, onDelete, canBeParallel }) {
  const [name, setName] = useState(activity.activity || '');
  const [duration, setDuration] = useState(activity.duration || '');
  const [staff, setStaff] = useState(activity.staff || '');
  const [focus, setFocus] = useState(activity.focus || '');
  const [notes, setNotes] = useState(activity.notes || '');
  const [parallel, setParallel] = useState(!!activity.parallel);
  const [showDrillPicker, setShowDrillPicker] = useState(false);
  const [drillSearch, setDrillSearch] = useState('');
  const [expandedCat, setExpandedCat] = useState(null);

  function handleSave() {
    onSave({
      ...activity,
      activity: name,
      duration: duration,
      staff: staff,
      focus: focus,
      notes: notes,
      parallel: canBeParallel ? parallel : false,
    });
  }

  function handlePickDrill(drill, cat) {
    setName(drill.name);
    if (drill.notes && !notes.trim()) setNotes(drill.notes);
    setShowDrillPicker(false);
  }

  // Filter the library by search
  const filteredLibrary = useMemo(() => {
    if (!drillSearch.trim()) return DRILL_LIBRARY;
    const q = drillSearch.toLowerCase();
    const result = {};
    for (const [cat, data] of Object.entries(DRILL_LIBRARY)) {
      const matches = data.drills.filter(d => d.name.toLowerCase().includes(q) || (d.notes && d.notes.toLowerCase().includes(q)));
      if (matches.length > 0) result[cat] = { ...data, drills: matches };
    }
    return result;
  }, [drillSearch]);
  const totalResults = Object.values(filteredLibrary).reduce((s, c) => s + c.drills.length, 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:560}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
          <h3 style={{margin:0}}>Edit Activity</h3>
          <button onClick={onDelete} style={{background:'var(--red-bg)', color:'var(--red)', border:'1px solid transparent', borderRadius:6, padding:'6px 12px', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s', display:'inline-flex', alignItems:'center', gap:6}}
            onMouseOver={e => e.currentTarget.style.borderColor = 'var(--red)'}
            onMouseOut={e => e.currentTarget.style.borderColor = 'transparent'}
          ><Icon name="trash" size={12}/> Delete</button>
        </div>

        {/* Drill library picker */}
        <div className="form-group">
          <button onClick={() => setShowDrillPicker(!showDrillPicker)}
            style={{width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid ' + (showDrillPicker ? 'var(--brand-pink)' : 'var(--border)'),
              background: showDrillPicker ? 'var(--accent-glow)' : 'var(--bg-input)',
              color: showDrillPicker ? 'var(--brand-pink)' : 'var(--text-secondary)',
              cursor:'pointer', fontSize:12, fontWeight:600, fontFamily:'inherit',
              display:'flex', justifyContent:'space-between', alignItems:'center', transition:'all 0.15s'}}
          >
            <span style={{display:'inline-flex', alignItems:'center', gap:8}}><Icon name="library" size={14}/> Pick from Drill Library</span>
            <span style={{display:'inline-flex', transform: showDrillPicker ? 'rotate(180deg)' : 'rotate(0)', transition:'transform 0.2s'}}><Icon name="chevronDown" size={14}/></span>
          </button>

          {showDrillPicker && (
            <div style={{marginTop:10, padding:12, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:10, maxHeight:320, overflowY:'auto'}}>
              <div style={{position:'relative', marginBottom:10}}>
                <span style={{position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-muted)', display:'inline-flex'}}><Icon name="search" size={14}/></span>
                <input value={drillSearch} onChange={e => setDrillSearch(e.target.value)} placeholder="Search drills..."
                  style={{width:'100%', padding:'8px 12px 8px 32px', border:'1px solid var(--border)', borderRadius:6, background:'#fff', fontSize:12, fontFamily:'inherit', outline:'none'}} autoFocus />
              </div>
              {drillSearch && <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:8}}>{totalResults} result{totalResults !== 1 ? 's' : ''}</div>}
              {Object.entries(filteredLibrary).map(([cat, data]) => {
                const isOpen = drillSearch ? true : expandedCat === cat;
                return (
                  <div key={cat} style={{marginBottom:6}}>
                    <div onClick={() => setExpandedCat(isOpen ? null : cat)}
                      style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 8px', cursor:'pointer', borderRadius:5, fontSize:12, fontWeight:600, color: data.color || 'var(--text-primary)', background: isOpen ? 'rgba(0,0,0,0.04)' : 'transparent'}}>
                      <span>{cat}</span>
                      <span style={{fontSize:10, color:'var(--text-muted)', fontWeight:500}}>{data.drills.length}</span>
                    </div>
                    {isOpen && (
                      <div style={{paddingLeft:10, marginTop:4}}>
                        {data.drills.map((d, i) => (
                          <div key={i} onClick={() => handlePickDrill(d, cat)}
                            style={{padding:'6px 8px', fontSize:12, color:'var(--text-primary)', cursor:'pointer', borderRadius:4, transition:'all 0.1s'}}
                            onMouseOver={e => { e.currentTarget.style.background = 'var(--accent-glow)'; e.currentTarget.style.color = 'var(--brand-pink)'; }}
                            onMouseOut={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-primary)'; }}
                          >{d.name}</div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              {totalResults === 0 && <div style={{fontSize:12, color:'var(--text-muted)', textAlign:'center', padding:12}}>No drills match "{drillSearch}"</div>}
            </div>
          )}
        </div>

        <div className="form-group">
          <label className="form-label">Activity Name</label>
          <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Positional Craft" />
        </div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div className="form-group">
            <label className="form-label">Duration (min)</label>
            <input className="form-input" type="number" min="1" max="120" value={duration} onChange={e => setDuration(e.target.value)} placeholder="e.g. 15" />
          </div>
          <div className="form-group">
            <label className="form-label">Staff</label>
            <input className="form-input" value={staff} onChange={e => setStaff(e.target.value)} placeholder="e.g. Jackson, Mel" />
          </div>
        </div>
        {canBeParallel && (
          <div className="form-group">
            <label style={{display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background: parallel ? 'var(--accent-glow)' : 'var(--bg-input)', border: '1px solid ' + (parallel ? 'var(--brand-pink)' : 'var(--border)'), borderRadius:8, cursor:'pointer', transition:'all 0.15s'}}>
              <input type="checkbox" checked={parallel} onChange={e => setParallel(e.target.checked)} style={{accentColor:'var(--brand-pink)', cursor:'pointer'}} />
              <div style={{flex:1}}>
                <div style={{fontSize:12, fontWeight:600, color: parallel ? 'var(--brand-pink)' : 'var(--text-primary)', display:'flex', alignItems:'center', gap:6}}>
                  <Icon name="rotate" size={13}/> Run at the same time as previous drill
                </div>
                <div style={{fontSize:10, color:'var(--text-muted)', marginTop:2}}>Use for rotations/stations where multiple groups train simultaneously</div>
              </div>
            </label>
          </div>
        )}
        <div className="form-group">
          <label className="form-label">Focus</label>
          <input className="form-input" value={focus} onChange={e => setFocus(e.target.value)} placeholder="e.g. Warm up, Defence contact" />
        </div>
        <div className="form-group">
          <label className="form-label">Notes</label>
          <textarea className="form-textarea" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Coaching notes, instructions, key points..." />
        </div>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!name.trim()}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

function AddDrillModal({ onClose, onAdd, customDrills }) {
  // Merge built-in + custom drills for the picker
  const mergedLibrary = useMemo(() => {
    const merged = {};
    Object.entries(DRILL_LIBRARY).forEach(([cat, data]) => {
      merged[cat] = { ...data, drills: [...data.drills] };
    });
    Object.entries(customDrills || {}).forEach(([cat, list]) => {
      if (!Array.isArray(list) || list.length === 0) return;
      if (!merged[cat]) merged[cat] = { color: '#8b5cf6', drills: [] };
      merged[cat] = { ...merged[cat], drills: [...merged[cat].drills, ...list] };
    });
    return merged;
  }, [customDrills]);
  const [mode, setMode] = useState('library'); // 'library' | 'custom'
  const [category, setCategory] = useState(Object.keys(mergedLibrary)[0]);
  const [selectedDrill, setSelectedDrill] = useState("");
  const [customName, setCustomName] = useState("");
  const [customFocus, setCustomFocus] = useState("");
  const [time, setTime] = useState("");
  const [duration, setDuration] = useState("");
  const [staff, setStaff] = useState("");
  const [notes, setNotes] = useState("");

  const drills = mergedLibrary[category]?.drills || [];
  const canSubmit = mode === 'library' ? !!selectedDrill : !!customName.trim();

  function handleSubmit() {
    if (!canSubmit) return;
    if (mode === 'library') {
      const drill = drills.find(d => d.name === selectedDrill);
      onAdd({
        time: time || "",
        activity: selectedDrill,
        duration: duration || "",
        notes: notes || (drill?.notes || ""),
        focus: "",
        staff: staff || "",
      });
    } else {
      onAdd({
        time: time || "",
        activity: customName.trim(),
        duration: duration || "",
        notes: notes || "",
        focus: customFocus.trim() || "",
        staff: staff || "",
      });
    }
  }

  const tabBtnStyle = (active) => ({
    flex: 1, padding: '10px 14px', borderRadius: 8, fontSize: 12, fontWeight: 700,
    border: '1px solid ' + (active ? 'var(--accent)' : 'var(--border)'),
    background: active ? 'var(--accent-glow)' : 'var(--bg-input)',
    color: active ? 'var(--accent-light)' : 'var(--text-secondary)',
    cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.15s'
  });

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Add Drill to Session</h3>

        <div style={{display:'flex', gap:8, marginBottom:16}}>
          <button style={tabBtnStyle(mode === 'library')} onClick={() => setMode('library')}>From Drill Library</button>
          <button style={tabBtnStyle(mode === 'custom')} onClick={() => setMode('custom')}>Custom drill</button>
        </div>

        {mode === 'library' ? (
          <>
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-select" value={category} onChange={e => { setCategory(e.target.value); setSelectedDrill(""); }}>
                {Object.keys(mergedLibrary).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Drill</label>
              <select className="form-select" value={selectedDrill} onChange={e => setSelectedDrill(e.target.value)}>
                <option value="">Select a drill...</option>
                {drills.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
              </select>
              {selectedDrill && drills.find(d => d.name === selectedDrill)?.notes && (
                <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
                  {drills.find(d => d.name === selectedDrill).notes}
                </div>
              )}
            </div>
          </>
        ) : (
          <>
            <div className="form-group">
              <label className="form-label">Drill name *</label>
              <input className="form-input" autoFocus placeholder="e.g. 4 v 4 Edge Defence"
                value={customName} onChange={e => setCustomName(e.target.value)} />
              <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
                Type any drill name — it doesn't need to be in the library.
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Focus / Tag (optional)</label>
              <input className="form-input" placeholder="e.g. Defence · Skill · Conditioning"
                value={customFocus} onChange={e => setCustomFocus(e.target.value)} />
            </div>
          </>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
          <div className="form-group">
            <label className="form-label">Time</label>
            <input className="form-input" placeholder="e.g. 5:15" value={time} onChange={e => setTime(e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">Duration (min)</label>
            <input className="form-input" placeholder="e.g. 15" value={duration} onChange={e => setDuration(e.target.value)} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Staff</label>
          <input className="form-input" placeholder="e.g. Jackson, Mel" value={staff} onChange={e => setStaff(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Notes</label>
          <textarea className="form-textarea" placeholder="Coaching notes..." value={notes} onChange={e => setNotes(e.target.value)} />
        </div>
        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={!canSubmit}>Add to Session</button>
        </div>
      </div>
    </div>
  );
}

function SeasonOverview({ setActiveTab, setSelectedWeek, setSelectedDay, seasonWeeks, userWeekOverrides, customActivities, weekDays }) {
  const SEASON_WEEKS = seasonWeeks || DEFAULT_SEASON_WEEKS;
  const overrides = userWeekOverrides || {};
  const acts = customActivities || {};
  const wd = weekDays || {};
  const palette = ['#E95B9E', '#29BAE5', '#d97706', '#16a34a', '#a855f7'];
  const blockColorMap = {};
  const blockOrder = [];
  SEASON_WEEKS.forEach(w => { if (!blockOrder.includes(w.block)) blockOrder.push(w.block); });
  blockOrder.forEach((name, i) => { blockColorMap[name] = palette[i % palette.length]; });

  function getMerged(w) {
    const ov = overrides[w.week] || {};
    return { ...w, focus: ov.focus ?? w.focus, outcomes: ov.outcomes ?? w.outcomes, game: ov.game ?? w.game };
  }
  // Sessions planned for a week (days that have activities)
  function sessionsForWeek(week) {
    const days = wd[week] || ['Tuesday', 'Thursday'];
    return days.filter(d => (acts[`${week}-${d}`] || []).length > 0).map(d => ({ day: d, count: acts[`${week}-${d}`].length }));
  }
  const dayShort = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun' };

  return (
    <div className="card">
      <div className="card-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span>Season Overview</span>
        <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{SEASON_WEEKS.length} weeks · {blockOrder.length} blocks</span>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'70px 130px 180px 1fr 140px', gap:8, padding:'10px 0', borderBottom:'1px solid var(--border)', marginBottom:6}}>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Week</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Dates</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Sessions</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Focus / Outcomes</div>
        <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5}}>Game</div>
      </div>
      {SEASON_WEEKS.map((w, i) => {
        const merged = getMerged(w);
        const prevBlock = i > 0 ? SEASON_WEEKS[i-1].block : null;
        const blockColor = blockColorMap[w.block] || 'var(--text-secondary)';
        const plannedDays = sessionsForWeek(w.week);
        const allDays = (wd[w.week] || ['Tuesday', 'Thursday']);
        return (
          <React.Fragment key={w.week}>
            {w.block !== prevBlock && (
              <div style={{paddingTop: 14, paddingBottom: 6}}>
                <span style={{display:'inline-block', fontSize:10, fontWeight:700, padding:'3px 10px', borderRadius:4, letterSpacing:0.5, textTransform:'uppercase', background: `${blockColor}1A`, color: blockColor}}>{w.block}</span>
              </div>
            )}
            <div
              style={{display:'grid', gridTemplateColumns:'70px 130px 180px 1fr 140px', gap:8, padding:'10px 8px', borderBottom:'1px solid rgba(0,0,0,0.06)', cursor:'pointer', borderRadius:6, transition:'background 0.1s', alignItems:'start'}}
              onMouseOver={e => e.currentTarget.style.background = 'var(--bg-input)'}
              onMouseOut={e => e.currentTarget.style.background = 'transparent'}
              onClick={() => { setSelectedWeek(w.week); setActiveTab('session'); }}
            >
              <div style={{fontSize:13, fontWeight:700, color:'var(--brand-cyan)'}}>Wk {w.week}</div>
              <div style={{fontSize:12, color:'var(--text-muted)'}}>{w.dates || '—'}</div>
              <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                {allDays.map(d => {
                  const planned = plannedDays.find(p => p.day === d);
                  return (
                    <span key={d} onClick={(e) => { e.stopPropagation(); setSelectedWeek(w.week); if (setSelectedDay) setSelectedDay(d); setActiveTab('session'); }}
                      style={{
                        fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:10,
                        background: planned ? 'var(--accent-glow)' : 'var(--bg-input)',
                        color: planned ? 'var(--brand-pink)' : 'var(--text-muted)',
                        border: '1px solid ' + (planned ? 'var(--brand-pink)' : 'var(--border)'),
                        display:'inline-flex', alignItems:'center', gap:3
                      }}
                      title={planned ? `${planned.count} activities on ${d}` : `${d} — no session yet`}
                    >
                      {dayShort[d] || d}{planned ? ` · ${planned.count}` : ''}
                    </span>
                  );
                })}
              </div>
              <div style={{fontSize:12, color:'var(--text-primary)', lineHeight:1.5}}>
                {merged.focus ? <div style={{color:'var(--brand-pink)', fontWeight:600, fontSize:11}}>{merged.focus}</div> : null}
                {merged.outcomes ? <div style={{color:'var(--text-secondary)', marginTop:2}}>{merged.outcomes}</div> : null}
                {!merged.focus && !merged.outcomes && <span style={{color:'var(--text-muted)'}}>—</span>}
              </div>
              <div style={{fontSize:12, fontWeight:600, color: merged.game ? 'var(--orange)' : 'var(--text-muted)'}}>{merged.game || '—'}</div>
            </div>
          </React.Fragment>
        );
      })}
    </div>
  );
}

function DrillLibrary({ search, setSearch, customDrills, setCustomDrills }) {
  const [expandedDrill, setExpandedDrill] = useState(null);
  const [openCats, setOpenCats] = useState({});
  const [showAddDrill, setShowAddDrill] = useState(false);
  const [editingDrill, setEditingDrill] = useState(null); // { category, name } or null

  function toggleCat(cat) {
    setOpenCats(prev => ({ ...prev, [cat]: !prev[cat] }));
  }

  // When searching, auto-open all matching categories
  const isCatOpen = (cat) => search ? true : !!openCats[cat];

  // Merge built-in + custom drills. Custom drills get isCustom: true.
  const mergedLibrary = useMemo(() => {
    const merged = {};
    Object.entries(DRILL_LIBRARY).forEach(([cat, data]) => {
      merged[cat] = { ...data, drills: data.drills.map(d => ({ ...d, isCustom: false })) };
    });
    Object.entries(customDrills || {}).forEach(([cat, drills]) => {
      if (!Array.isArray(drills) || drills.length === 0) return;
      if (!merged[cat]) {
        merged[cat] = { color: '#8b5cf6', drills: [] };
      }
      const custom = drills.map(d => ({ ...d, isCustom: true }));
      merged[cat] = { ...merged[cat], drills: [...merged[cat].drills, ...custom] };
    });
    return merged;
  }, [customDrills]);

  // Edit/remove custom drill
  function saveCustomDrill(originalKey, drill) {
    setCustomDrills(prev => {
      const next = { ...(prev || {}) };
      // If editing, remove the old entry
      if (originalKey) {
        const [oldCat, oldName] = originalKey;
        if (next[oldCat]) {
          next[oldCat] = next[oldCat].filter(d => d.name !== oldName);
          if (next[oldCat].length === 0) delete next[oldCat];
        }
      }
      const { category, ...rest } = drill;
      next[category] = next[category] || [];
      // Replace if same name exists in this cat
      next[category] = next[category].filter(d => d.name !== rest.name);
      next[category].push(rest);
      return next;
    });
  }
  function removeCustomDrill(category, name) {
    if (!window.confirm(`Remove "${name}" from your custom drills?`)) return;
    setCustomDrills(prev => {
      const next = { ...(prev || {}) };
      if (next[category]) {
        next[category] = next[category].filter(d => d.name !== name);
        if (next[category].length === 0) delete next[category];
      }
      return next;
    });
  }

  const filtered = useMemo(() => {
    if (!search) return mergedLibrary;
    const s = search.toLowerCase();
    const result = {};
    Object.entries(mergedLibrary).forEach(([cat, data]) => {
      const matches = data.drills.filter(d => d.name.toLowerCase().includes(s) || (d.notes && d.notes.toLowerCase().includes(s)) || cat.toLowerCase().includes(s));
      if (matches.length > 0) result[cat] = { ...data, drills: matches };
    });
    return result;
  }, [search, mergedLibrary]);

  const totalDrills = Object.values(filtered).reduce((sum, c) => sum + c.drills.length, 0);

  function getPhase(notes) {
    if (!notes) return null;
    const n = notes.toLowerCase();
    if (n.startsWith('attack')) return 'attack';
    if (n.startsWith('defence') || n.startsWith('defense')) return 'defence';
    if (n.startsWith('kicking')) return 'kicking';
    return null;
  }

  function drillKey(cat, name) { return `${cat}::${name}`; }

  function toggleDrill(cat, name) {
    const key = drillKey(cat, name);
    setExpandedDrill(prev => prev === key ? null : key);
  }

  // Find which weeks use a drill (fuzzy match)
  function findUsedInWeeks(drillName) {
    const weeks = [];
    const search = drillName.toLowerCase().replace(/^(fwd|ob|hlf|hkr|core):\s*/i, '');
    Object.entries(SESSION_DETAILS).forEach(([week, days]) => {
      Object.entries(days).forEach(([day, activities]) => {
        if (activities.some(a => a.activity.toLowerCase().includes(search.substring(0, 15)))) {
          const sw = SEASON_WEEKS.find(s => s.week === week);
          const label = sw ? (sw.week === 'GF' ? 'GF' : sw.week.startsWith('PS') ? sw.week : `Wk ${sw.week}`) : week;
          if (!weeks.includes(label)) weeks.push(label);
        }
      });
    });
    return weeks;
  }

  return (
    <div>
      <div className="card">
        <div className="card-title">Drill Library — {totalDrills} drills across {Object.keys(filtered).length} categories</div>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>Click any drill to see full coaching notes, position tags, and which weeks it appears in.</p>
        <div className="search-wrap">
          <span className="search-icon">&#x2315;</span>
          <input className="search-input" placeholder="Search drills by name, category, or notes..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', justifyContent:'space-between'}}>
          <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
            <button className="btn-outline" onClick={() => { const all = {}; Object.keys(filtered).forEach(c => all[c] = true); setOpenCats(all); }}>
              <span className="ico">▼</span> Expand All
            </button>
            <button className="btn-outline" onClick={() => setOpenCats({})}>
              <span className="ico">▶</span> Collapse All
            </button>
          </div>
          <button className="btn btn-primary btn-sm" onClick={() => { setEditingDrill(null); setShowAddDrill(true); }}
            style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <Icon name="plus" size={13}/> Add Drill
          </button>
        </div>
        <div className="drill-categories">
          {Object.entries(filtered).map(([cat, data]) => {
            const isOpen = isCatOpen(cat);
            return (
              <div key={cat} className="drill-cat">
                <div className={`drill-cat-header ${isOpen ? 'open' : ''}`} onClick={() => toggleCat(cat)}>
                  <span style={{color: data.color}}>●</span>
                  {cat}
                  <span className="drill-cat-count">{data.drills.length}</span>
                  <span className="cat-chevron">▶</span>
                </div>
                {isOpen && (
                  <div className="drill-cat-body">
                    {data.drills.map(d => {
                      const key = drillKey(cat, d.name);
                      const isExpanded = expandedDrill === key;
                      const phase = getPhase(d.notes);
                      const usedIn = isExpanded ? findUsedInWeeks(d.name) : [];

                      return (
                        <div key={d.name} className={`drill-item ${isExpanded ? 'expanded' : ''}`} onClick={() => toggleDrill(cat, d.name)}>
                          <div className="drill-name-row">
                            <span>
                              {d.name}
                              {d.position && <span style={{fontSize:10, color:'var(--text-muted)', marginLeft:6}}>({d.position})</span>}
                              {d.isCustom && <span style={{fontSize:9, fontWeight:700, padding:'1px 6px', borderRadius:8, background:'rgba(139,92,246,0.15)', color:'#8b5cf6', marginLeft:6, textTransform:'uppercase', letterSpacing:0.5}}>Custom</span>}
                            </span>
                            <span style={{display:'flex', alignItems:'center', gap:4}}>
                              {d.isCustom && (
                                <>
                                  <span onClick={e => { e.stopPropagation(); setEditingDrill({ category: cat, drill: d }); setShowAddDrill(true); }}
                                    title="Edit custom drill"
                                    style={{padding:3, cursor:'pointer', color:'var(--text-muted)', fontSize:11, borderRadius:3}}
                                    onMouseOver={e => { e.currentTarget.style.color = 'var(--accent-light)'; e.currentTarget.style.background = 'var(--accent-glow)'; }}
                                    onMouseOut={e => { e.currentTarget.style.color = 'var(--text-muted)'; e.currentTarget.style.background = 'transparent'; }}>✎</span>
                                  <span onClick={e => { e.stopPropagation(); removeCustomDrill(cat, d.name); }}
                                    title="Remove custom drill"
                                    style={{padding:3, cursor:'pointer', color:'var(--text-muted)', fontSize:11, borderRadius:3}}
                                    onMouseOver={e => { e.currentTarget.style.color = 'var(--red)'; e.currentTarget.style.background = 'var(--red-bg)'; }}
                                    onMouseOut={e => { e.currentTarget.style.color = 'var(--text-muted)'; e.currentTarget.style.background = 'transparent'; }}>✕</span>
                                </>
                              )}
                              <span className="drill-arrow">▶</span>
                            </span>
                          </div>

                          {isExpanded && (
                            <div className="drill-detail" onClick={e => e.stopPropagation()}>
                              {d.notes && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">Coaching Notes</div>
                                  <div className="drill-detail-value">{d.notes.replace(/^(Attack|Defence|Defense|Kicking)\s*[-—]\s*/i, '')}</div>
                                </div>
                              )}

                              <div className="drill-detail-section">
                                <div className="drill-detail-label">Tags</div>
                                <div>
                                  {d.position && <span className="drill-detail-tag tag-position">{d.position}</span>}
                                  {phase === 'attack' && <span className="drill-detail-tag tag-attack">Attack</span>}
                                  {phase === 'defence' && <span className="drill-detail-tag tag-defence">Defence</span>}
                                  {phase === 'kicking' && <span className="drill-detail-tag tag-kicking">Kicking</span>}
                                  <span className="drill-detail-tag" style={{background:'rgba(233,91,158,0.1)', color: data.color}}>{cat}</span>
                                </div>
                              </div>

                              {d.gps && (d.gps.mpm || d.gps.hsr || d.gps.time) && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">GPS Load Data (avg)</div>
                                  <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                                    {d.gps.time && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(6,182,212,0.1)', color:'#06b6d4', fontWeight:600}}>{d.gps.time} min</span>}
                                    {d.gps.mpm && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(34,197,94,0.1)', color:'#22c55e', fontWeight:600}}>{d.gps.mpm} m/min</span>}
                                    {d.gps.hsr && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(249,115,22,0.1)', color:'#f97316', fontWeight:600}}>{d.gps.hsr} HSR/min</span>}
                                    {d.gps.al && <span style={{fontSize:11, padding:'3px 8px', borderRadius:5, background:'rgba(168,85,247,0.1)', color:'#a855f7', fontWeight:600}}>{d.gps.al} AL/min</span>}
                                  </div>
                                </div>
                              )}

                              {usedIn.length > 0 && (
                                <div className="drill-detail-section">
                                  <div className="drill-detail-label">Used in Weeks</div>
                                  <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
                                    {usedIn.map(w => (
                                      <span key={w} style={{fontSize:10, padding:'2px 8px', borderRadius:4, background:'var(--blue-bg)', color:'var(--blue)', fontWeight:600}}>{w}</span>
                                    ))}
                                  </div>
                                </div>
                              )}

                              {!d.notes && !d.position && (
                                <div style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic'}}>No additional details yet. Add notes when you use this drill.</div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {showAddDrill && (
        <AddCustomDrillModal
          mergedLibrary={mergedLibrary}
          initial={editingDrill}
          onClose={() => { setShowAddDrill(false); setEditingDrill(null); }}
          onSave={(drill) => {
            const originalKey = editingDrill ? [editingDrill.category, editingDrill.drill.name] : null;
            saveCustomDrill(originalKey, drill);
            setShowAddDrill(false);
            setEditingDrill(null);
          }}
        />
      )}
    </div>
  );
}

function AddCustomDrillModal({ mergedLibrary, initial, onClose, onSave }) {
  const existingCats = Object.keys(mergedLibrary || DRILL_LIBRARY).sort();
  const init = initial?.drill || {};
  const initCat = initial?.category || '';
  const [name, setName] = useState(init.name || '');
  const [category, setCategory] = useState(initCat);
  const [newCategory, setNewCategory] = useState('');
  const [position, setPosition] = useState(init.position || '');
  const [notes, setNotes] = useState(init.notes || '');
  const [useNewCat, setUseNewCat] = useState(!initCat);

  const finalCategory = useNewCat ? newCategory.trim() : category;
  const canSave = !!name.trim() && !!finalCategory;

  function handleSave() {
    if (!canSave) return;
    onSave({
      category: finalCategory,
      name: name.trim(),
      position: position.trim(),
      notes: notes.trim(),
    });
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 520, maxWidth:'95vw', maxHeight:'90vh', overflowY:'auto'}}>
        <h3>{initial ? 'Edit custom drill' : 'Add a custom drill'}</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginTop:4, marginBottom:14}}>
          Custom drills sit alongside the built-in library and show up in the Add-to-Session picker.
        </p>

        <div className="form-group">
          <label className="form-label">Drill name *</label>
          <input className="form-input" autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="e.g. 4v4 Edge Defence" />
        </div>

        <div className="form-group">
          <label className="form-label">Category *</label>
          {!useNewCat ? (
            <div style={{display:'flex', gap:8}}>
              <select className="form-select" value={category} onChange={e => setCategory(e.target.value)} style={{flex:1}}>
                <option value="">— Choose a category —</option>
                {existingCats.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <button className="btn btn-ghost btn-sm" onClick={() => { setUseNewCat(true); }}>
                + New
              </button>
            </div>
          ) : (
            <div style={{display:'flex', gap:8}}>
              <input className="form-input" value={newCategory} onChange={e => setNewCategory(e.target.value)} placeholder="New category name" style={{flex:1}} autoFocus />
              <button className="btn btn-ghost btn-sm" onClick={() => { setUseNewCat(false); setNewCategory(''); }}>
                Pick existing
              </button>
            </div>
          )}
        </div>

        <div className="form-group">
          <label className="form-label">Position tag (optional)</label>
          <input className="form-input" value={position} onChange={e => setPosition(e.target.value)} placeholder="e.g. Halves, Middles, All" />
        </div>

        <div className="form-group">
          <label className="form-label">Coaching notes (optional)</label>
          <textarea className="form-textarea" value={notes} onChange={e => setNotes(e.target.value)}
            placeholder="What you're coaching, the setup, key cues..." style={{minHeight:100}} />
        </div>

        <div className="btn-row">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>
            {initial ? 'Save changes' : 'Add to library'}
          </button>
        </div>
      </div>
    </div>
  );
}

    name,
    target: data.target,

  return (
    <div>
      <div className="card">
        <div className="card-title">Pre-Season Training Coverage Targets</div>

      </div>

      <div className="card">
        <div className="card-title">Weekly Training Menu Checklist</div>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:16}}>Are we covering the key skills that are going to make us better footballers each week?</p>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(220px, 1fr))', gap: 12}}>
          <div className="drill-cat">
            <div className="drill-cat-header"><span style={{color:'var(--green)'}}>●</span> Key Habits</div>

          </div>
          <div className="drill-cat">
            <div className="drill-cat-header"><span style={{color:'var(--red)'}}>●</span> Technical — Defence</div>
            {WEEKLY_MENU.technicalDefence.map(h => <div key={h} className="drill-item">{h}</div>)}
          </div>
          <div className="drill-cat">
            <div className="drill-cat-header"><span style={{color:'var(--orange)'}}>●</span> Tactical — Attack</div>
            {WEEKLY_MENU.tacticalAttack.map(h => <div key={h} className="drill-item">{h}</div>)}

      </div>
    </div>
  );
}
