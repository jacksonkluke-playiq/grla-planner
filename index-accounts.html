                            {t.diff != null && (
                              <div style={{marginTop:8, fontSize:11, color:'var(--text-muted)', fontWeight:600}}>

                              </div>
                            )}

              )}
            </div>
          </div>

      {/* LEAVERS CLEANUP MODAL */}
      {showLeavers && (
        <div className="modal-overlay" onClick={() => setShowLeavers(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{width:680, maxWidth:'95vw', maxHeight:'90vh', overflowY:'auto'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12, marginBottom:14, flexWrap:'wrap'}}>
              <div>
                <div style={{fontSize:11, fontWeight:700, color:'var(--brand-pink)', textTransform:'uppercase', letterSpacing:1.5}}>Squad cleanup</div>
                <div style={{fontSize:20, fontWeight:800, marginTop:2}}>Remove leavers</div>
                <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
                  These athletes are in a year-group squad but not in the compiled 2025-2026 testing import — usually because they've left the program. Uncheck anyone you want to keep.
                </div>
              </div>
              <button onClick={() => setShowLeavers(false)} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', fontSize:18, fontWeight:700, padding:'4px 12px', borderRadius:8, fontFamily:'inherit'}}>×</button>
            </div>

            {leaversFlat.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>
                No leavers — every athlete in your squads is in the compiled import. Nothing to clean up.
              </div>
            ) : (
              <>
                <div style={{padding:'8px 12px', background:'var(--bg-input)', borderRadius:8, marginBottom:10, fontSize:11, fontWeight:700, display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:6}}>
                  <span>{leaversToRemoveCount} of {leaversFlat.length} selected for removal</span>
                  <div style={{display:'flex', gap:6}}>
                    <button onClick={() => setLeaversKeep({})} style={{fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text-muted)', cursor:'pointer', fontFamily:'inherit'}}>Select all</button>
                    <button onClick={() => { const k = {}; leaversFlat.forEach(l => { if (l.player._id) k[l.player._id] = true; }); setLeaversKeep(k); }} style={{fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text-muted)', cursor:'pointer', fontFamily:'inherit'}}>Clear all</button>
                  </div>
                </div>
                {['7-8','9-10','11-12'].map(yg => {
                  const list = leaversByYg[yg] || [];
                  if (list.length === 0) return null;
                  return (
                    <div key={yg} style={{marginBottom:14}}>
                      <div style={{fontSize:12, fontWeight:800, color:'var(--text-primary)', marginBottom:6}}>{yg} group <span style={{color:'var(--text-muted)', fontWeight:600, fontSize:11}}>· {list.length}</span></div>
                      <div style={{display:'flex', flexDirection:'column', gap:4}}>
                        {list.map(p => {
                          const keep = !!leaversKeep[p._id];
                          return (
                            <label key={p._id || p.name} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--bg-card)', border:'1px solid ' + (keep ? 'var(--border)' : 'var(--red)'), borderRadius:8, cursor:'pointer'}}>
                              <input
                                type="checkbox"
                                checked={!keep}
                                onChange={() => setLeaversKeep(prev => { const n = { ...prev }; if (n[p._id]) delete n[p._id]; else n[p._id] = true; return n; })}
                                style={{margin:0, accentColor:'var(--red)'}}
                              />
                              <div style={{flex:1}}>
                                <div style={{fontSize:13, fontWeight:700, color: keep ? 'var(--text-muted)' : 'var(--text-primary)', textDecoration: keep ? 'none' : 'line-through'}}>{p.name}</div>
                                <div style={{fontSize:10, color:'var(--text-muted)', marginTop:1}}>
                                  {p.position || '—'}{p.schoolYear ? ` · Year ${p.schoolYear}` : ''}{p.profile?.testHistory && Object.keys(p.profile.testHistory).length > 0 ? ` · has ${Object.keys(p.profile.testHistory).length} test result${Object.keys(p.profile.testHistory).length === 1 ? '' : 's'}` : ''}
                                </div>
                              </div>
                              <div style={{fontSize:10, fontWeight:700, color: keep ? 'var(--green)' : 'var(--red)'}}>
                                {keep ? 'KEEP' : 'REMOVE'}
                              </div>
                            </label>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
                <div style={{display:'flex', gap:8, marginTop:14, justifyContent:'flex-end'}}>
                  <button onClick={() => setShowLeavers(false)} style={{padding:'8px 16px', fontSize:12, fontWeight:700, borderRadius:8, border:'1px solid var(--border)', background:'transparent', color:'var(--text-secondary)', cursor:'pointer', fontFamily:'inherit'}}>Cancel</button>
                  <button
                    onClick={() => {
                      if (leaversToRemoveCount === 0) return;
                      if (!window.confirm(`Remove ${leaversToRemoveCount} athlete${leaversToRemoveCount === 1 ? '' : 's'} from the squad?\n\nThis also clears them from any Cup/Challenge roster and match-day 1-18 list. The page will reload.\n\nProceed?`)) return;
                      doRemoveLeavers();
                    }}
                    disabled={leaversToRemoveCount === 0}
                    style={{padding:'8px 16px', fontSize:12, fontWeight:700, borderRadius:8, border:'1px solid var(--red)', background: leaversToRemoveCount === 0 ? 'var(--bg-input)' : 'var(--red)', color: leaversToRemoveCount === 0 ? 'var(--text-muted)' : 'white', cursor: leaversToRemoveCount === 0 ? 'not-allowed' : 'pointer', fontFamily:'inherit'}}
                  >
                    Remove {leaversToRemoveCount} athlete{leaversToRemoveCount === 1 ? '' : 's'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* GYM GROUPS TAB */}
      {tab === 'gymgroups' && (() => {
        // Reuse the existing valToNumber from this scope (defined above)
        const sy = String(gymGroupYear);
        // Which year levels have any athletes — used to render the year selector
        const yearsPresent = ['7','8','9','10','11','12'].filter(y =>
          allPlayersFlat.some(x => x.schoolYear === y)
        );
        const yearAthletes = allPlayersFlat.filter(x => x.schoolYear === sy);
        // Tests config for THIS year level (per-year list, e.g. Y7-9 use Broad Jump + Med Ball + Max Hang)
        const tests = (typeof TEST_IMPORT_DATA !== 'undefined' && TEST_IMPORT_DATA.tests) ? TEST_IMPORT_DATA.tests : [];
        const gymStrengthTests = gymStrengthTestsByYear[sy] || [];
        // Step 1: extract latest raw value per (athlete, test)
        const latestByAthleteTest = yearAthletes.map(({ player: p, yg }) => {
          const hist = p?.profile?.testHistory || {};
          const breakdown = {};
          for (const t of gymStrengthTests) {
            const arr = (hist[t] || []).filter(e => e && e[1])
              .map(([d, v]) => ({ d, n: valToNumber(normalizeTestValue(t, v)) }))
              .filter(e => e.n != null)
              .sort((a,b) => (a.d||'').localeCompare(b.d||''));
            breakdown[t] = arr.length > 0 ? arr[arr.length - 1].n : null;
          }
          return { player: p, yg, breakdown };
        });
        // Step 2: build per-test cohort distributions for percentile ranking
        const LOWER_BETTER_TESTS = new Set(['Bronco','40m Sprint','20m Sprint','10m Sprint','1.2km Time Trial']);
        const cohortByTest = {};
        for (const t of gymStrengthTests) {
          cohortByTest[t] = latestByAthleteTest.map(x => x.breakdown[t]).filter(n => n != null);
        }
        const percentileOf = (test, value) => {
          const pool = cohortByTest[test] || [];
          if (pool.length === 0 || value == null) return null;
          const lower = LOWER_BETTER_TESTS.has(test);
          let beats = 0;
          for (const v of pool) {
            if (lower ? v > value : v < value) beats++;
            else if (v === value) beats += 0.5;
          }
          return Math.round((beats / pool.length) * 100);
        };
        // Step 3: composite score = average of per-test percentile ranks (0-100, fair across units)
        const scored = latestByAthleteTest.map(({ player, yg, breakdown }) => {
          const pcts = {};
          let sum = 0, count = 0;
          for (const t of gymStrengthTests) {
            if (breakdown[t] != null) {
              const p = percentileOf(t, breakdown[t]);
              pcts[t] = p;
              if (p != null) { sum += p; count++; }
            } else {
              pcts[t] = null;
            }
          }
          const complete = count === gymStrengthTests.length && gymStrengthTests.length > 0;
          const score = count > 0 ? Math.round(sum / count) : null;
          return { player, yg, breakdown, pcts, score, complete };
        });
        // Split into groups: auto-tertile by score (descending). Incomplete → Needs assessment.
        const complete = scored.filter(s => s.complete).sort((a,b) => b.score - a.score);
        const incomplete = scored.filter(s => !s.complete);
        const N = complete.length;
        const aCutoff = Math.ceil(N / 3);

        const autoGroup = (idx) => idx < aCutoff ? 'A' : idx < bCutoff ? 'B' : 'C';

          const override = gymGroupOverrides[entry.player._id];

          if (!entry.complete) return 'C'; // incomplete defaults to C
          return autoGroup(idx);

        const moveTo = (playerId, newGroup) => {

      {/* FEEDBACK TAB */}

          )}

    </div>
  );
}

function SquadTracker({ squad, setSquad, roster, setRoster, matchday18, setMatchday18, currentSub, currentGroup }) {

  const [showBulkAdd, setShowBulkAdd] = useState(false);

  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverPos, setDragOverPos] = useState(null);

  const POSITIONS = ['Fullback', 'Wing', 'Centre', 'Five-Eighth', 'Halfback', 'Hooker', 'Prop', 'Second Row', 'Lock', 'Interchange', 'Utility'];

  const TEAM_POSITIONS = [
    { num: 1,  pos: 'Fullback' },
    { num: 2,  pos: 'Wing' },
    { num: 3,  pos: 'Centre' },
    { num: 4,  pos: 'Centre' },
    { num: 5,  pos: 'Wing' },
    { num: 6,  pos: 'Five-Eighth' },
    { num: 7,  pos: 'Halfback' },
    { num: 8,  pos: 'Prop' },

    { num: 13, pos: 'Lock' },
    { num: 14, pos: 'Interchange' },
    { num: 15, pos: 'Interchange' },

      setSquad(prev => [...prev, player]);
      setNewName('');
    }
  }
  function updatePlayer(i, f, v) {
    const playerId = squad[i] && squad[i]._id;
    setSquad(prev => prev.map((p, idx) => idx === i ? { ...p, [f]: v } : p));
    if (playerId) {
    }
  }
  function deletePlayer(i) {
    const removedId = squad[i] && squad[i]._id;
    setSquad(prev => prev.filter((_, idx) => idx !== i));
    if (removedId) {
      setRoster(prev => (Array.isArray(prev) ? prev.filter(x => x !== removedId) : []));
    }
  }
  function toggleAvailability(i) {
    const playerId = squad[i] && squad[i]._id;
    const newAvail = squad[i]?.available === false;
    setSquad(prev => prev.map((p, idx) => idx === i ? { ...p, available: newAvail } : p));
  }

  function parseBulkText(text) {
    if (!text.trim()) return [];
    return text.split('\n').filter(l => l.trim()).map(line => {
      const trimmed = line.trim();
      let number = '', name = '', position = '';
      const numMatch = trimmed.match(/^#?(\d+)[.\s\-)\t]+/);
      let rest = trimmed;
      if (numMatch) { number = numMatch[1]; rest = trimmed.slice(numMatch[0].length).trim(); }
      const dashSplit = rest.split(/\s*[-–—]\s*/);
      if (dashSplit.length > 1) {
        const lastPart = dashSplit[dashSplit.length - 1].trim();
        const posMatch = POSITIONS.find(p => lastPart.toLowerCase().includes(p.toLowerCase()));
        if (posMatch) { position = posMatch; name = dashSplit.slice(0, -1).join(' - ').trim(); } else name = rest;
      } else {
        const posMatch = POSITIONS.find(p => rest.toLowerCase().endsWith(p.toLowerCase()));
        if (posMatch) { position = posMatch; name = rest.slice(0, rest.length - posMatch.length).trim(); } else name = rest;
      }
      name = name.replace(/^[-–—.\s]+|[-–—.\s]+$/g, '').trim();
      return { _id: genId(), name, number, position, available: true };
    }).filter(p => p.name);
  }
  useEffect(() => { setBulkPreview(parseBulkText(bulkText)); }, [bulkText]);

    if (bulkPreview.length === 0) return;

    if (filterView === 'inTeam') return inRoster(p._id);
    if (filterView === 'notInTeam') return !inRoster(p._id);
    return true;
  });
  // Counts respect the year filter so chip labels feel accurate
  const yearScoped = squad.filter(yearMatch);
  const availableCount = yearScoped.filter(p => p.available !== false).length;
  const unavailableCount = yearScoped.filter(p => p.available === false).length;
  const rosterCount = Array.isArray(roster) ? roster.filter(id => yearScoped.some(p => p._id === id)).length : 0;
  // Per-year counts (always against full squad — used to label the year chips)
  const yearCounts = {};
  groupYears.forEach(y => { yearCounts[y] = squad.filter(p => playerSchoolYear(p) === y).length; });
  const grouped = {};
  for (const pos of ALL_SLOTS) grouped[pos] = [];
  filtered.forEach(p => { const pos = p.position && POSITIONS.includes(p.position) ? p.position : 'Unassigned'; grouped[pos].push(p); });

            title={inTeam ? `Remove from ${currentSub}` : `Add to ${currentSub}`}>

            onClick={e => { e.stopPropagation(); if (window.confirm(`Remove ${p.name} from the squad?`)) deletePlayer(p._idx); }}

  }

  return (
    <div>
      <div className="card">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:12}}>
          <div>
            <div className="card-title" style={{marginBottom:2, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>

            </div>
            <div style={{fontSize:12, color:'var(--text-muted)', display:'flex', gap:12, alignItems:'center', marginTop:4, flexWrap:'wrap'}}>
              <span>{squad.length} player{squad.length !== 1 ? 's' : ''}</span>
              <span style={{color:'var(--green)'}}>● {availableCount} available</span>
              {unavailableCount > 0 && <span style={{color:'var(--red)'}}>● {unavailableCount} unavailable</span>}
              <span style={{display:'inline-flex', alignItems:'center', gap:6, background:teamColorBg, color:teamColor, padding:'3px 10px', borderRadius:12, fontWeight:700}}>
                In {currentSub}: {rosterCount}

          </div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
            <button className="btn-outline" onClick={() => setShowImportTests(true)} style={{fontSize:11, padding:'6px 12px', color:'var(--brand-pink)', borderColor:'var(--brand-pink)'}}

        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          <input className="form-input" value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={handleQuickAdd}
            placeholder="Type player name and press Enter..." style={{flex:1, padding:'10px 14px', fontSize:13}} />
          <button className="btn btn-primary btn-sm" onClick={handleAddClick} style={{padding:'10px 16px', whiteSpace:'nowrap', display:'inline-flex', alignItems:'center', gap:6}}><Icon name="plus" size={13}/> Add</button>
        </div>
        <div style={{fontSize:10, color:'var(--text-muted)', marginTop:6}}>Tip: add players then assign positions using the dropdown on each card, or drag between groups</div>

        {showBulkAdd && (
          <div style={{marginTop:14, padding:16, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:10}}>
            <div style={{fontSize:13, fontWeight:600, marginBottom:8}}>Bulk Add Players</div>
            <textarea className="paste-area" value={bulkText} onChange={e => setBulkText(e.target.value)}
              placeholder={"Sarah Johnson\nMia Williams - Halfback\n3. Emma Brown - Centre"}

            {bulkPreview.length > 0 && (
              <div style={{marginTop:10, display:'flex', justifyContent:'space-between', alignItems:'center'}}>

      {squad.length > 0 && groupYears.length > 1 && (

          <button
            className={`day-tab ${yearFilter === 'all' ? 'active' : ''}`}
            onClick={() => setYearFilter('all')}
            style={{fontSize:11, padding:'6px 14px'}}

            All ({squad.length})
          </button>
          {groupYears.map(y => (
            <button
              key={y}
              className={`day-tab ${yearFilter === y ? 'active' : ''}`}
              onClick={() => setYearFilter(y)}
              style={{fontSize:11, padding:'6px 14px'}}
            >
              Year {y} ({yearCounts[y] || 0})
            </button>
          ))}
        </div>
      )}

      {squad.length > 0 && (
        <div style={{display:'flex', gap:4, marginBottom:12, marginTop:4, flexWrap:'wrap'}}>
          {[
            {id:'all', label:`All (${yearScoped.length})`},
            {id:'inTeam', label:`In ${currentSub} (${rosterCount})`},
            {id:'notInTeam', label:`Not in ${currentSub} (${yearScoped.length - rosterCount})`},
            {id:'available', label:`Available (${availableCount})`},
            {id:'unavailable', label:`Unavailable (${unavailableCount})`}
          ].map(f => (
            <button key={f.id} className={`day-tab ${filterView === f.id ? 'active' : ''}`} onClick={() => setFilterView(f.id)} style={{fontSize:11, padding:'6px 14px'}}>{f.label}</button>

      )}

      {squad.length === 0 ? (
        <div className="card" style={{padding:'40px 0', textAlign:'center'}}>
          <div style={{fontSize:14, color:'var(--text-muted)', marginBottom:8}}>No players added yet</div>
          <div style={{fontSize:12, color:'var(--text-muted)'}}>Type a name above or use Bulk Add to paste a list</div>

      ) : (
        <>
          {/* === MATCH-DAY 1-18 TEAM LIST === */}
          <TeamList18
            squad={squad}
            roster={roster}
            matchday18={matchday18 || []}
            setMatchday18={setMatchday18}
            currentSub={currentSub}
            teamColor={teamColor}
            teamColorBg={teamColorBg}
            TEAM_POSITIONS={TEAM_POSITIONS}
            onOpenProfile={openProfileById}
          />

          <div style={{display:'flex', alignItems:'center', gap:10, margin:'28px 0 14px'}}>
            <div style={{fontSize:15, fontWeight:700, color:'var(--text-primary)', letterSpacing:'-0.2px'}}>Squad by position</div>
            <div style={{flex:1, height:1, background:'var(--border)'}} />
            <div style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{squad.length} player{squad.length === 1 ? '' : 's'}</div>
          </div>
          <div className="squad-grid">
            {ALL_SLOTS.map(pos => {
              const players = grouped[pos] || [];
              const isDropTarget = dragOverPos === pos;
              const dropPos = pos === 'Unassigned' ? '' : pos;
              if (players.length === 0 && dragIdx === null) return null;
              return (
                <div key={pos} className="position-group"
                  onDragOver={e => handleGroupDragOver(e, pos)}
                  onDragLeave={() => setDragOverPos(null)}
                  onDrop={e => handleGroupDrop(e, dropPos)}
                  style={{borderColor: isDropTarget ? 'var(--brand-pink)' : undefined, background: isDropTarget ? 'var(--accent-glow)' : undefined}}>
                  <div className="position-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <span>{pos}</span>
                    <span className="pos-count">{players.length}</span>
                  </div>
                  {players.map(p => <PlayerCard key={p._idx} p={p} />)}
                  {players.length === 0 && <div style={{fontSize:11, color:'var(--text-muted)', padding:'8px 4px', fontStyle:'italic'}}>Drop players here</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {showImportTests && (
        <ImportTestDataModal
          squad={squad}
          setSquad={setSquad}
          onClose={() => setShowImportTests(false)}
        />
      )}

      {profileIdx !== null && squad[profileIdx] && (
        <PlayerProfileModal
          player={squad[profileIdx]}
          playerIdx={profileIdx}
          updatePlayer={updatePlayer}
          deletePlayer={(idx) => { deletePlayer(idx); setProfileIdx(null); }}
          onClose={() => setProfileIdx(null)}
          currentSub={currentSub}
          teamColor={teamColor}
          inRoster={inRoster}
          toggleRoster={toggleRoster}
          POSITIONS={POSITIONS}
          currentGroup={currentGroup}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// SUPABASE — Phase 1 auth wall
// ─────────────────────────────────────────────────────────
// Real accounts (email + password), Postgres-backed. Sign-in is
// required before the planner mounts. Phase 1: auth only — App
// still reads from localStorage. Phase 2 replaces data reads with
// Supabase queries; Phase 3 adds writes + offline queue.
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jriwwvamquenmwmfbnzq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3SGxKb0Z7yyixketh6zJFw_Ihf-BhHy';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false },
});
window.__sb = supabase;  // accessible from DevTools for sanity testing

// ═══════════════════════════════════════════════════════════
// supabaseSync — Phase 2 read layer.
// ─────────────────────────────────────────────────────────
// After sign-in we fetch all shared data (players, drills, testing,
// season configs) from Supabase and hydrate localStorage at the exact
// keys the existing React components expect. The UI keeps reading from
// localStorage unchanged. Supabase is the source of truth; localStorage
// is just the in-memory render cache.
//
// In Phase 3 we'll add writes (mutations go to Supabase, then back-
// propagate to localStorage via realtime). For now reads-only.
// ═══════════════════════════════════════════════════════════
const supabaseSync = (() => {
  // ── Helper: wrap any promise with a timeout so a hanging fetch can't
  // block the planner from mounting. After `ms`, the wrapper rejects
  // with a clear error and the caller can decide how to recover.
  function withTimeout(promise, ms, label) {
    return Promise.race([
      promise,
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error('timeout after ' + ms + 'ms: ' + (label || 'unknown'))), ms)
      ),
    ]);
  }
  const T = 6000;  // per-fetch cap

  // ── Players → playiq_<yg>_squad_v3 ──
  async function fetchPlayers() {
    const { data, error } = await withTimeout(
      supabase.from('grla_players')
        .select('id,year_group,name,number,position,school_year,available,profile,updated_at')
        .order('year_group').order('name'),
      T, 'fetchPlayers'
    );
    if (error) throw new Error('players: ' + error.message);
    const byYg = { '7-8': [], '9-10': [], '11-12': [] };
    for (const p of data || []) {
      if (!byYg[p.year_group]) continue;
      byYg[p.year_group].push({
        _id: p.id,
        name: p.name,
        number: (p.number == null || p.number === '') ? null : String(p.number),
        position: p.position,
        schoolYear: p.school_year,
        available: p.available !== false,
        profile: p.profile || {},
      });
    }
    for (const [yg, squad] of Object.entries(byYg)) {
      localStorage.setItem(`playiq_${yg}_squad_v3`, JSON.stringify(squad));
      localStorage.setItem(`playiq_${yg}_squad_v3__ts`, String(Date.now()));
    }
    return { '7-8': byYg['7-8'].length, '9-10': byYg['9-10'].length, '11-12': byYg['11-12'].length };
  }

  // ── Drill library → playiq_customDrills ──
  async function fetchDrillLibrary() {
    const { data, error } = await withTimeout(
      supabase.from('grla_drill_library').select('drills,custom_drills').eq('id', 1).maybeSingle(),
      T, 'fetchDrillLibrary'
    );
    if (error) throw new Error('drill_library: ' + error.message);
    if (data) {
      localStorage.setItem('playiq_customDrills', JSON.stringify(data.custom_drills || {}));
      localStorage.setItem('playiq_customDrills__ts', String(Date.now()));
    }
    return data ? Object.keys(data.custom_drills || {}).length : 0;
  }

  // ── Testing metadata → playiq_* keys (per row) ──
  const TESTING_KEY_MAP = {
    'test_import_v10':            'playiq_test_import_v10',
    'test_import_v11':            'playiq_test_import_v11',
    'gym_strength_tests_by_year': 'playiq_gymStrengthTestsByYear',
    'gym_group_overrides':        'playiq_gymGroupOverrides',
  };
  async function fetchTestingMetadata() {
    const { data, error } = await withTimeout(
      supabase.from('grla_testing_metadata').select('key,value'),
      T, 'fetchTestingMetadata'
    );
    if (error) throw new Error('testing_metadata: ' + error.message);
    let applied = 0;
    for (const row of data || []) {
      const target = TESTING_KEY_MAP[row.key];
      if (!target) continue;
      localStorage.setItem(target, JSON.stringify(row.value));
      localStorage.setItem(target + '__ts', String(Date.now()));
      applied++;
    }
    return applied;
  }

  // ── Season configs → playiq_<team>_* (per team) ──
  async function fetchSeasonConfigs() {
    const { data, error } = await withTimeout(
      supabase.from('grla_season_configs').select('team_id,season_config,session_start_times,week_days,blueprint_loaded'),
      T, 'fetchSeasonConfigs'
    );
    if (error) throw new Error('season_configs: ' + error.message);
    let applied = 0;
    for (const row of data || []) {
      const tid = row.team_id;
      if (row.season_config != null) {
        localStorage.setItem(`playiq_${tid}_seasonConfig`, JSON.stringify(row.season_config));
        localStorage.setItem(`playiq_${tid}_seasonConfig__ts`, String(Date.now()));
      }
      if (row.session_start_times != null) {
        localStorage.setItem(`playiq_${tid}_sessionStartTimes`, JSON.stringify(row.session_start_times));
        localStorage.setItem(`playiq_${tid}_sessionStartTimes__ts`, String(Date.now()));
      }
      if (row.week_days != null) {
        localStorage.setItem(`playiq_${tid}_weekDays`, JSON.stringify(row.week_days));
        localStorage.setItem(`playiq_${tid}_weekDays__ts`, String(Date.now()));
      }
      if (row.blueprint_loaded) {
        localStorage.setItem(`playiq_${tid}_blueprintLoaded`, row.blueprint_loaded);
        localStorage.setItem(`playiq_${tid}_blueprintLoaded__ts`, String(Date.now()));
      }
      applied++;
    }
    return applied;
  }

  // ── Current coach (auth.uid → grla_coaches row) ──
  // Hardcoded admin emails — kept in sync with grla.handle_new_user() trigger.
  // Used as a client-side fallback so the badge can still show ADMIN status
  // even when the grla_coaches lookup fails (stale session / RLS hiccup).
  const ADMIN_EMAILS = new Set(['jacksonkluke@gmail.com', 'jluke44@eq.edu.au']);

  async function fetchCurrentCoach() {
    // refreshSession is non-blocking — if it hangs we don't care, getUser()
    // still works against the cached JWT.
    supabase.auth.refreshSession().catch(() => {});
    let u;
    try {
      const res = await withTimeout(supabase.auth.getUser(), T, 'auth.getUser');
      u = res?.data;
    } catch(e) { console.warn('[supabaseSync] getUser timed out:', e.message); return null; }
    if (!u?.user) return null;

    // Try the coaches view (canonical source) — bounded by timeout
    let row = null;
    try {
      const { data, error } = await withTimeout(
        supabase.from('grla_coaches').select('id,email,display_name,is_admin').eq('id', u.user.id).maybeSingle(),
        T, 'grla_coaches lookup'
      );
      if (error) console.warn('[supabaseSync] grla_coaches lookup error:', error.message);
      else if (data) row = data;
    } catch(e) { console.warn('[supabaseSync] grla_coaches threw:', e.message); }

    // Fallback: build the row from auth data so the UI still renders.
    if (!row) {
      const email = u.user.email || '';
      row = {
        id: u.user.id,
        email,
        display_name: u.user.user_metadata?.display_name
                    || u.user.user_metadata?.name
                    || email.split('@')[0]
                    || 'Coach',
        is_admin: ADMIN_EMAILS.has(email),
        _fallback: true,  // tag so we know this wasn't from the DB
      };
      console.warn('[supabaseSync] using auth-user fallback for coach:', row);
    }

    window.__currentCoach = row;
    return row;
  }

  // ── Hydrate everything in parallel. Runs after sign-in, before App mounts. ──
  async function bootstrap() {
    const t0 = Date.now();
    const out = { players: null, drills: null, testing: null, seasons: null, coach: null, sessionPlans: null, errors: [] };
    // First resolve the coach so we know whose session plans to pull.
    try {
      out.coach = await fetchCurrentCoach();
    } catch(e) { out.errors.push('coach: ' + (e.message || e)); }
    // ⚠️ View-as awareness: if we're in view-as mode (restored from
    // sessionStorage on module load), the session plans we want are the
    // TARGET coach's, not the current user's. Otherwise reload-into-view
    // would re-hydrate our own plans on top and we'd see our own profile
    // even though we just clicked "view <other coach>".
    const sessionPlansCoachId = window.__viewAsCoachId || (out.coach && out.coach.id);
    const tasks = [
      ['players',  fetchPlayers()],
      ['drills',   fetchDrillLibrary()],
      ['testing',  fetchTestingMetadata()],
      ['seasons',  fetchSeasonConfigs()],
      ['sessionPlans', fetchCoachSessionPlans(sessionPlansCoachId)],
    ];
    const results = await Promise.allSettled(tasks.map(t => t[1]));
    results.forEach((r, i) => {
      const name = tasks[i][0];
      if (r.status === 'fulfilled') out[name] = r.value;
      else out.errors.push(name + ': ' + (r.reason?.message || r.reason));
    });
    // Install the write mirror so subsequent edits flow to Supabase.
    installWriteMirror();
    // Subscribe to Supabase Realtime so external edits (other coaches,
    // other devices, admin pushes) propagate without a manual reload.
    try { startRealtime(); } catch(e) { console.warn('[supabaseSync] realtime start failed:', e); }
    console.log(`[supabaseSync] bootstrap done in ${Date.now()-t0}ms`, out);
    return out;
  }

  // ── View-as: hydrate ANOTHER coach's session plans into localStorage and
  // flag the planner as read-only. Snapshots the current user's plans first
  // so leaving view-as can restore them. ──
  async function enterViewAs(targetCoachId, targetDisplayName) {
    const cur = window.__currentCoach;
    if (!cur) throw new Error('not signed in');
    if (cur.id === targetCoachId) throw new Error('that\'s your own planner');
    if (window.__viewAsCoachId) throw new Error('already viewing as another coach; leave first');
    // 1. Snapshot my current per-coach data into a sessionStorage backup
    const backup = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (parsePerCoachKey(k)) backup[k] = localStorage.getItem(k);
    }
    sessionStorage.setItem('__viewAsBackup', JSON.stringify(backup));
    // 2. Wipe my per-coach keys
    for (const k of Object.keys(backup)) {
      try { localStorage.removeItem(k); } catch(e) {}
      try { localStorage.removeItem(k + '__ts'); } catch(e) {}
    }
    // 3. Set the viewAs flag BEFORE fetching so queuePush sees we're in view mode
    window.__viewAsCoachId   = targetCoachId;
    window.__viewAsCoachName = targetDisplayName;
    sessionStorage.setItem('__viewAsCoachId', targetCoachId);
    sessionStorage.setItem('__viewAsCoachName', targetDisplayName);
    // 4. Fetch target coach's plans into localStorage
    await fetchCoachSessionPlans(targetCoachId);
    // 5. Reload so React re-reads everything
    window.location.reload();
  }
  function leaveViewAs() {
    // Wipe target coach's plans
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && parsePerCoachKey(k)) keysToRemove.push(k);
    }
    for (const k of keysToRemove) {
      try { localStorage.removeItem(k); } catch(e) {}
      try { localStorage.removeItem(k + '__ts'); } catch(e) {}
    }
    // Restore my backup
    try {
      const backupRaw = sessionStorage.getItem('__viewAsBackup');
      if (backupRaw) {
        const backup = JSON.parse(backupRaw);
        for (const [k, v] of Object.entries(backup)) {
          try { localStorage.setItem(k, v); } catch(e) {}
        }
      }
    } catch(e) {}
    sessionStorage.removeItem('__viewAsBackup');
    sessionStorage.removeItem('__viewAsCoachId');
    sessionStorage.removeItem('__viewAsCoachName');
    delete window.__viewAsCoachId;
    delete window.__viewAsCoachName;
    window.location.reload();
  }
  // Restore viewAs flag from sessionStorage across reloads
  try {
    const vid = sessionStorage.getItem('__viewAsCoachId');
    const vname = sessionStorage.getItem('__viewAsCoachName');
    if (vid) { window.__viewAsCoachId = vid; window.__viewAsCoachName = vname; }
  } catch(e) {}

  async function signOut() {
    try { stopRealtime(); } catch(e){}
    // Clear any view-as state so the next sign-in starts fresh — otherwise
    // the next user (or me re-signing in) would inherit the previous
    // session's view-as target and bootstrap would try to load someone
    // else's session plans.
    try {
      sessionStorage.removeItem('__viewAsCoachId');
      sessionStorage.removeItem('__viewAsCoachName');
      sessionStorage.removeItem('__viewAsBackup');
      delete window.__viewAsCoachId;
      delete window.__viewAsCoachName;
    } catch(e) {}
    try { await supabase.auth.signOut(); } catch(e){}
    window.location.reload();
  }

  // ═══════════════════════════════════════════════════════════
  // PHASE 3 — coach_session_plans (per-coach private data in Supabase)
  // ─────────────────────────────────────────────────────────
  // Keys that are PER-COACH and now live in grla_coach_session_plans:
  //   playiq_<team>_customActivities, _weekDays, _weekOverrides,
  //   _weeklyGoals, _plannerNotes, _sessionReviews, _coverageData,
  //   _roster, _matchday18
  //
  // Storage shape in DB: one row per (coach_id, team_id, key).
  // ═══════════════════════════════════════════════════════════
  const PER_COACH_SUFFIXES = [
    '_customActivities', '_weekDays', '_weekOverrides', '_weeklyGoals',
    '_plannerNotes', '_sessionReviews', '_coverageData', '_roster', '_matchday18',
  ];
  // Parse "playiq_<team>_<key>" → { team_id, key }
  function parsePerCoachKey(localKey) {
    if (!localKey || typeof localKey !== 'string') return null;
    if (!localKey.startsWith('playiq_')) return null;
    if (localKey.endsWith('__ts')) return null;
    const suffix = PER_COACH_SUFFIXES.find(s => localKey.endsWith(s));
    if (!suffix) return null;
    const team_id = localKey.slice('playiq_'.length, localKey.length - suffix.length);
    if (!team_id) return null;
    return { team_id, key: suffix.slice(1) /* drop leading underscore */ };
  }
  function buildLocalKey(team_id, key) {
    return 'playiq_' + team_id + '_' + key;
  }

  // ── Pull current coach's session plans into localStorage ──
  async function fetchCoachSessionPlans(coachId) {
    if (!coachId) {
      const cur = window.__currentCoach;
      coachId = cur && cur.id;
    }
    if (!coachId) return 0;
    const { data, error } = await withTimeout(
      supabase.from('grla_coach_session_plans')
        .select('team_id,key,value,updated_at')
        .eq('coach_id', coachId),
      T, 'fetchCoachSessionPlans'
    );
    if (error) { console.warn('[supabaseSync] fetchCoachSessionPlans:', error.message); return 0; }
    let applied = 0;
    for (const row of data || []) {
      const localKey = buildLocalKey(row.team_id, row.key);
      try {
        // value is jsonb in DB; serialize back to string for localStorage
        localStorage.setItem(localKey, JSON.stringify(row.value));
        localStorage.setItem(localKey + '__ts', String(new Date(row.updated_at).getTime() || Date.now()));
        applied++;
      } catch(e) {}
    }
    return applied;
  }

  // ── Mirror a per-coach localStorage write to Supabase ──
  // Debounced per-key so rapid edits to the same key collapse into one upsert.
  const __pushQueue = new Map();
  function queuePush(localKey) {
    // Don't mirror if we're "viewing as" another coach (read-only mode)
    if (window.__viewAsCoachId) return;
    const parsed = parsePerCoachKey(localKey);
    if (!parsed) return;
    const cur = window.__currentCoach;
    if (!cur || !cur.id) return;
    const id = parsed.team_id + ':' + parsed.key;
    if (__pushQueue.has(id)) clearTimeout(__pushQueue.get(id));
    __pushQueue.set(id, setTimeout(() => {
      __pushQueue.delete(id);
      pushOne(cur.id, parsed.team_id, parsed.key).catch(e => console.warn('[supabaseSync] push failed:', e.message));
    }, 1200));  // 1.2s debounce per key
  }
  async function pushOne(coachId, team_id, key) {
    const localKey = buildLocalKey(team_id, key);
    const raw = localStorage.getItem(localKey);
    let value;
    try { value = raw == null ? null : JSON.parse(raw); }
    catch(e) { value = raw; }  // fall back to raw string for non-JSON values
    const { error } = await withTimeout(
      supabase.from('grla_coach_session_plans').upsert({
        coach_id: coachId, team_id, key, value, updated_at: new Date().toISOString(),
      }, { onConflict: 'coach_id,team_id,key' }),
      T, 'pushOne'
    );
    if (error) console.warn('[supabaseSync] upsert error:', error.message);
  }

  // ── Install the localStorage hook (call once on bootstrap) ──
  let __hooked = false;
  function installWriteMirror() {
    if (__hooked) return;
    __hooked = true;
    const origSet    = Storage.prototype.setItem;
    const origRemove = Storage.prototype.removeItem;
    Storage.prototype.setItem = function(key, value) {
      const r = origSet.call(this, key, value);
      try { _noteLocalWrite(key); } catch(e) {}
      try { queuePush(key); } catch(e) {}
      return r;
    };
    Storage.prototype.removeItem = function(key) {
      const r = origRemove.call(this, key);
      try { _noteLocalWrite(key); } catch(e) {}
      try { queuePush(key); } catch(e) {}
      return r;
    };
  }

  // ═══════════════════════════════════════════════════════════
  // REALTIME — Phase 4. Subscribes to Postgres logical replication
  // changes via Supabase Realtime so coaches see each other's edits
  // within ~200ms across all open browsers.
  // ─────────────────────────────────────────────────────────
  // Strategy (v1, intentionally simple):
  //   • Subscribe to all 5 grla.* tables.
  //   • On any non-self change, schedule a debounced full-page reload
  //     (1.5s window so multiple bursty changes collapse into one).
  //   • Echo suppression: localStorage writes from THIS tab are tracked
  //     per-key with a timestamp. Realtime events for keys we just wrote
  //     within ECHO_SUPPRESS_MS are ignored — that's the round-trip from
  //     our own setItem → Supabase → broadcast back to us.
  //   • View-as mode: only react to changes for the coach being viewed,
  //     so the admin doesn't get reloaded when another coach edits.
  //
  // Why full reload instead of surgical state updates?
  //   • The planner has dozens of useState hooks reading from localStorage
  //     at mount. Re-hydrating them mid-flight would mean wiring change
  //     events into every component. A reload is one line and never wrong.
  //   • Coaches edit infrequently enough (a few times per session) that a
  //     1.5s debounced reload is acceptable UX.
  //   • Phase 5 (if needed) can swap reload for targeted state patches.
  // ═══════════════════════════════════════════════════════════
  const ECHO_SUPPRESS_MS = 4000;
  const REALTIME_DEBOUNCE_MS = 1500;
  let _channel = null;
  let _channelStatus = { state: 'disabled', detail: '' };
  const _channelListeners = new Set();
  const _lastLocalWrite = new Map();  // localStorage key → ms timestamp
  let _reloadTimer = null;

  function _noteLocalWrite(key) {
    _lastLocalWrite.set(key, Date.now());
    // Trim very old entries so the map doesn't grow forever
    if (_lastLocalWrite.size > 200) {
      const cutoff = Date.now() - ECHO_SUPPRESS_MS * 2;
      for (const [k, t] of _lastLocalWrite) {
        if (t < cutoff) _lastLocalWrite.delete(k);
      }
    }
  }

  function _isOwnEcho(localKey) {
    const t = _lastLocalWrite.get(localKey);
    return !!t && (Date.now() - t < ECHO_SUPPRESS_MS);
  }

  function _setRealtimeStatus(state, detail) {
    _channelStatus = { state, detail: detail || '' };
    for (const fn of _channelListeners) {
      try { fn(_channelStatus); } catch(e) {}
    }
  }

  function subscribeRealtimeStatus(fn) {
    _channelListeners.add(fn);
    try { fn(_channelStatus); } catch(e) {}
    return () => _channelListeners.delete(fn);
  }

  function getRealtimeStatus() { return _channelStatus; }

  function _scheduleReload(source) {
    if (_reloadTimer) clearTimeout(_reloadTimer);
    _reloadTimer = setTimeout(() => {
      console.log('[realtime] reloading — ' + source);
      window.location.reload();
    }, REALTIME_DEBOUNCE_MS);
  }

  function _handleCoachPlansChange(payload) {
    const row = payload.new || payload.old;
    if (!row) return;
    const myId = window.__currentCoach && window.__currentCoach.id;
    if (!myId) return;
    const viewedCoachId = window.__viewAsCoachId || myId;
    // Only care about the coach we're currently viewing
    if (row.coach_id !== viewedCoachId) return;
    // Echo suppression: if WE just wrote this key locally, skip
    const localKey = buildLocalKey(row.team_id, row.key);
    if (_isOwnEcho(localKey)) {
      // Common case: my own write echoing back from Supabase. Silent skip.
      return;
    }
    // Multi-device sync for own plans is opt-in (off in v1) — without echo
    // suppression we'd reload-loop, with it we'd miss cross-device edits.
    // For now, only reload when in view-as mode OR a different coach's
    // row arrives for us via some path we didn't predict.
    if (!window.__viewAsCoachId && row.coach_id === myId) {
      // Could be a genuine cross-device edit but more likely an echo we
      // missed. Safer to ignore in v1.
      return;
    }
    _scheduleReload('coach plans: ' + row.team_id + '/' + row.key);
  }

  function _handleSharedTableChange(label) {
    return function(payload) {
      // Shared tables (players/drills/testing/seasons) — admin-only writes
      // and currently no in-app UI writes to them, so echo suppression is
      // mostly a no-op. Schedule a reload either way.
      _scheduleReload(label);
    };
  }

  function startRealtime() {
    if (_channel) return;
    if (!window.__currentCoach || !window.__currentCoach.id) return;
    _setRealtimeStatus('connecting', 'Subscribing…');
    try {
      _channel = supabase
        .channel('grla-realtime')
        .on('postgres_changes', { event: '*', schema: 'grla', table: 'players' },           _handleSharedTableChange('players'))
        .on('postgres_changes', { event: '*', schema: 'grla', table: 'drill_library' },     _handleSharedTableChange('drills'))
        .on('postgres_changes', { event: '*', schema: 'grla', table: 'testing_metadata' },  _handleSharedTableChange('testing metadata'))
        .on('postgres_changes', { event: '*', schema: 'grla', table: 'season_configs' },    _handleSharedTableChange('season configs'))
        .on('postgres_changes', { event: '*', schema: 'grla', table: 'coach_session_plans' }, _handleCoachPlansChange)
        .subscribe((status, err) => {
          if (status === 'SUBSCRIBED')       _setRealtimeStatus('live', 'Live');
          else if (status === 'CHANNEL_ERROR') _setRealtimeStatus('error', err ? String(err.message || err) : 'Channel error');
          else if (status === 'TIMED_OUT')    _setRealtimeStatus('error', 'Subscription timed out');
          else if (status === 'CLOSED')       _setRealtimeStatus('disabled', 'Channel closed');
          else                                _setRealtimeStatus('connecting', String(status));
        });
    } catch(e) {
      console.warn('[realtime] subscribe failed:', e);
      _setRealtimeStatus('error', e.message || String(e));
    }
  }

  function stopRealtime() {
    if (_channel) {
      try { supabase.removeChannel(_channel); } catch(e) {}
      _channel = null;
    }
    if (_reloadTimer) { clearTimeout(_reloadTimer); _reloadTimer = null; }
    _lastLocalWrite.clear();
    _setRealtimeStatus('disabled', '');
  }

  // ── Copy another coach's planner into the current coach's account ──
  // Fetches every coach_session_plans row for the source coach, then upserts
  // each one under the current coach_id. Overwrites any matching (team,key)
  // rows the current coach already had; other rows are left alone.
  //
  // Optional opts:
  //   teamIds: array of team_ids to limit the copy to (default: all teams)
  async function copyPlannerFrom(sourceCoachId, opts = {}) {
    const cur = window.__currentCoach;
    if (!cur || !cur.id) throw new Error('not signed in');
    if (sourceCoachId === cur.id) throw new Error('that\'s already your planner');

    // 1. Fetch source coach's plans
    const { data: rows, error } = await withTimeout(
      supabase.from('grla_coach_session_plans')
        .select('team_id,key,value')
        .eq('coach_id', sourceCoachId),
      T, 'copyPlannerFrom-fetch'
    );
    if (error) throw new Error('fetch failed: ' + error.message);
    if (!rows || rows.length === 0) throw new Error('that coach has no session plans yet — nothing to copy');

    // 2. Optionally filter by team
    let toCopy = rows;
    if (opts.teamIds && Array.isArray(opts.teamIds) && opts.teamIds.length > 0) {
      const allowed = new Set(opts.teamIds);
      toCopy = rows.filter(r => allowed.has(r.team_id));
      if (toCopy.length === 0) throw new Error('nothing matched the chosen teams');
    }

    // 3. Upsert into current coach's plans (replaces matching team+key rows)
    const upserts = toCopy.map(r => ({
      coach_id: cur.id,
      team_id:  r.team_id,
      key:      r.key,
      value:    r.value,
      updated_at: new Date().toISOString(),
    }));
    const { error: upErr } = await withTimeout(
      supabase.from('grla_coach_session_plans').upsert(upserts, { onConflict: 'coach_id,team_id,key' }),
      T, 'copyPlannerFrom-upsert'
    );
    if (upErr) throw new Error('upsert failed: ' + upErr.message);
    return toCopy.length;
  }

  // Convenience: copy + exit view-as mode + reload (clears the sessionStorage
  // backup so the reload pulls the freshly-copied state from Supabase).
  async function copyPlannerFromAndExit(sourceCoachId) {
    const count = await copyPlannerFrom(sourceCoachId);
    sessionStorage.removeItem('__viewAsBackup');
    sessionStorage.removeItem('__viewAsCoachId');
    sessionStorage.removeItem('__viewAsCoachName');
    delete window.__viewAsCoachId;
    delete window.__viewAsCoachName;
    window.location.reload();
    return count;
  }

  // ── List all coaches (admin uses this for the directory) ──
  async function listCoaches() {
    const { data, error } = await withTimeout(
      supabase.from('grla_coaches').select('id,email,display_name,is_admin,created_at,updated_at').order('created_at', { ascending: false }),
      T, 'listCoaches'
    );
    if (error) { console.warn('[supabaseSync] listCoaches:', error.message); return []; }
    return data || [];
  }

  return { bootstrap, signOut, fetchPlayers, fetchDrillLibrary, fetchTestingMetadata, fetchSeasonConfigs,
            fetchCurrentCoach, listCoaches, fetchCoachSessionPlans, enterViewAs, leaveViewAs,
            copyPlannerFrom, copyPlannerFromAndExit,
            startRealtime, stopRealtime, getRealtimeStatus, subscribeRealtimeStatus };
})();
window.__supabaseSync = supabaseSync;

function AuthScreen({ onSignedIn }) {
  const [mode, setMode]         = useState('signin');  // 'signin' | 'signup' | 'forgot'
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [name, setName]         = useState('');
  const [busy, setBusy]         = useState(false);
  const [msg,  setMsg]          = useState('');
  const [err,  setErr]          = useState('');

  const handleSignIn = async (e) => {
    e.preventDefault(); setBusy(true); setErr(''); setMsg('');
    try {
      const { error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
      if (error) throw error;
      onSignedIn();
    } catch(e2) { setErr(e2.message || String(e2)); }
    setBusy(false);
  };

  const handleSignUp = async (e) => {
    e.preventDefault(); setBusy(true); setErr(''); setMsg('');
    try {
      const { data, error } = await supabase.auth.signUp({
        email: email.trim(), password,
        options: { data: { display_name: name.trim() || email.split('@')[0] } },
      });
      if (error) throw error;
      // With "Confirm email" disabled in Supabase Auth, signUp returns a
      // session immediately — go straight in.
      if (data?.session) {
        onSignedIn();
        return;
      }
      // Fallback for the edge case where session isn't returned (e.g. if
      // confirmation gets re-enabled later): try a direct sign-in with the
      // same credentials so the coach isn't stuck on a "check your email"
      // dead end that doesn't apply anymore.
      const { error: signInErr } = await supabase.auth.signInWithPassword({
        email: email.trim(), password,
      });
      if (signInErr) {
        // Genuinely couldn't sign in — surface a neutral message
        setMsg('Account created. Sign in below to continue.');
        setMode('signin');
      } else {
        onSignedIn();
      }
    } catch(e2) { setErr(e2.message || String(e2)); }
    setBusy(false);
  };

  const handleForgot = async (e) => {
    e.preventDefault(); setBusy(true); setErr(''); setMsg('');
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email.trim());
      if (error) throw error;
      setMsg('Password reset email sent. Check your inbox.');
    } catch(e2) { setErr(e2.message || String(e2)); }
    setBusy(false);
  };

  const inputStyle = { width:'100%', padding:'12px 14px', fontSize:14, marginTop:8, marginBottom:4,
                        fontFamily:'inherit', border:'2px solid #e5e7eb', borderRadius:10, outline:'none', boxSizing:'border-box' };
  const buttonStyle = { width:'100%', padding:'14px', fontSize:15, fontWeight:800, marginTop:14,
                         background:busy ? '#d1d5db' : '#E95B9E', color:'white',
                         border:'none', borderRadius:10, cursor: busy ? 'wait' : 'pointer',
                         fontFamily:'inherit', letterSpacing:0.3 };

  return (
    <div style={{position:'fixed', inset:0, background:'linear-gradient(135deg,#E95B9E,#29BAE5)',
                  display:'flex', alignItems:'center', justifyContent:'center', padding:20, zIndex:99999}}>
      <div style={{background:'white', borderRadius:18, padding:'32px 28px', maxWidth:460, width:'100%',
                    boxShadow:'0 24px 60px rgba(0,0,0,0.3)'}}>
        <div style={{fontSize:11, fontWeight:800, color:'#E95B9E', textTransform:'uppercase', letterSpacing:2}}>
          KEEBRA PARK GRLA · SESSION PLANNER
        </div>
        <h1 style={{fontSize:24, fontWeight:900, marginTop:6, color:'#1a1a2e', lineHeight:1.15}}>
          {mode === 'signin' ? 'Sign in' : mode === 'signup' ? 'Create your coach account' : 'Reset password'}
        </h1>
        <p style={{fontSize:12, color:'#5e6278', marginTop:6, lineHeight:1.55}}>
          {mode === 'signin'
            ? 'Your work is saved to your account. Sign in from any browser, any computer.'
            : mode === 'signup'
              ? 'Pick an email + password. You\'ll be signed in straight away.'
              : 'Enter the email you signed up with — we\'ll email a reset link.'}
        </p>

        <form onSubmit={mode === 'signin' ? handleSignIn : mode === 'signup' ? handleSignUp : handleForgot}>
          {mode === 'signup' && (
            <input type="text" placeholder="Display name (e.g. Jacko)" value={name}
                   onChange={e => setName(e.target.value)}
                   style={inputStyle} />
          )}
          <input type="email" required autoFocus placeholder="email@example.com" value={email}
                 onChange={e => setEmail(e.target.value)} style={inputStyle} />
          {mode !== 'forgot' && (
            <input type="password" required minLength={6} placeholder="Password (min 6 chars)"
                   value={password} onChange={e => setPassword(e.target.value)} style={inputStyle} />
          )}
          {err && <div style={{padding:'10px 12px', background:'#fef2f2', border:'1px solid #ef4444', borderRadius:8,
                                color:'#b91c1c', fontSize:12, fontWeight:700, marginTop:10}}>{err}</div>}
          {msg && <div style={{padding:'10px 12px', background:'#d1fae5', border:'1px solid #10b981', borderRadius:8,
                                color:'#047857', fontSize:12, fontWeight:700, marginTop:10}}>{msg}</div>}
          <button type="submit" disabled={busy} style={buttonStyle}>
            {busy ? 'Working…'
                  : mode === 'signin' ? 'Sign in'
                  : mode === 'signup' ? 'Create account'
                  : 'Send reset email'}
          </button>
        </form>

        <div style={{marginTop:18, paddingTop:14, borderTop:'1px solid #e5e7eb', fontSize:12, color:'#6b7280', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:8}}>
          {mode === 'signin' ? (
            <>
              <button onClick={() => { setMode('forgot'); setErr(''); setMsg(''); }}
                      style={{background:'none', border:'none', color:'#29BAE5', cursor:'pointer', fontSize:12, fontWeight:700, fontFamily:'inherit'}}>
                Forgot password?
              </button>
              <button onClick={() => { setMode('signup'); setErr(''); setMsg(''); }}
                      style={{background:'none', border:'none', color:'#E95B9E', cursor:'pointer', fontSize:12, fontWeight:700, fontFamily:'inherit'}}>
                Create an account →
              </button>
            </>
          ) : (
            <button onClick={() => { setMode('signin'); setErr(''); setMsg(''); }}
                    style={{background:'none', border:'none', color:'#29BAE5', cursor:'pointer', fontSize:12, fontWeight:700, fontFamily:'inherit'}}>
              ← Back to sign in
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function AuthGate() {
  const [stage,   setStage]   = useState('checking');  // checking | unauthed | hydrating | ready
  const [session, setSession] = useState(null);
  const [error,   setError]   = useState('');

  useEffect(() => {
    let alive = true;
    // Track whether we've already hydrated for this session so we don't
    // re-bootstrap on every TOKEN_REFRESHED / spurious SIGNED_IN event
    // (Supabase fires those silently every hour and sometimes seconds after
    // page load — without this guard each one flips the UI back to the
    // "Loading…" screen, which looks like a refresh-loop glitch).
    let hasBootstrapped = false;

    (async () => {
      const { data } = await supabase.auth.getSession();
      const sess = data?.session || null;
      if (!alive) return;
      setSession(sess);
      if (!sess) { setStage('unauthed'); return; }
      setStage('hydrating');
      // Hard ceiling — if hydration hangs for any reason, mount App anyway
      // with whatever localStorage has cached. The Refresh button in the
      // Account badge can be used to re-pull manually.
      const hardCeiling = new Promise(resolve => setTimeout(() => resolve({ timedOut: true, errors: ['hydration timed out (10s)'] }), 10000));
      const out = await Promise.race([supabaseSync.bootstrap(), hardCeiling]);
      if (!alive) return;
      if (out.timedOut) {
        console.warn('[AuthGate] hydration hit 10s ceiling — mounting App with cached state');
        setError('Cloud sync timed out — using cached data. Click your name → Refresh to retry.');
      } else if (out.errors && out.errors.length > 0) {
        console.warn('[AuthGate] hydration partial:', out.errors);
        setError(out.errors.join(' · '));
      }
      hasBootstrapped = true;
      setStage('ready');
    })();

    const { data: sub } = supabase.auth.onAuthStateChange(async (event, sess) => {
      setSession(sess);
      if (!sess) {
        hasBootstrapped = false;
        setStage('unauthed');
        return;
      }
      // Only re-hydrate on a GENUINE sign-in transition (e.g. user just
      // entered email+password on the AuthScreen). Skip:
      //   - INITIAL_SESSION (handled by getSession above)
      //   - TOKEN_REFRESHED (silent background refresh, no user change)
      //   - SIGNED_IN events that arrive after we've already bootstrapped
      //     (Supabase sometimes re-fires this on tab focus)
      if (event === 'SIGNED_IN' && !hasBootstrapped) {
        setStage('hydrating');
        try {
          await supabaseSync.bootstrap();
        } catch(e) {
          console.warn('[AuthGate] re-bootstrap failed:', e);
        }
        hasBootstrapped = true;
        setStage('ready');
      }
      // TOKEN_REFRESHED / repeat SIGNED_IN: silently update session, leave
      // the UI in 'ready'. The new access token is automatically used by
      // subsequent supabase-js calls — no flicker, no reload.
    });
    return () => { alive = false; sub.subscription.unsubscribe(); };
  }, []);

  if (stage === 'checking' || stage === 'hydrating') {
    const label = stage === 'checking' ? 'Loading…' : 'Loading your data from the cloud…';
    return (
      <div style={{position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
                    flexDirection:'column', gap:14, background:'linear-gradient(135deg,#E95B9E,#29BAE5)', color:'white'}}>
        <div style={{fontSize:11, fontWeight:800, color:'white', textTransform:'uppercase', letterSpacing:2}}>
          KEEBRA PARK GRLA · SESSION PLANNER
        </div>
        <div style={{fontSize:18, fontWeight:700}}>{label}</div>
        {error && <div style={{fontSize:11, opacity:0.85}}>(some data unavailable: {error})</div>}
      </div>
    );
  }
  if (stage === 'unauthed') {
    return <AuthScreen onSignedIn={() => { /* listener picks it up */ }} />;
  }
  return (
    <>
      <ViewAsBanner />
      <App />
    </>
  );
}

// Shown at the very top of the page when an admin is viewing as another
// coach. Click "Leave view-as mode" to restore their own planner.
function ViewAsBanner() {
  const [active, setActive] = useState(!!window.__viewAsCoachId);
  const [name, setName]     = useState(window.__viewAsCoachName || '');
  useEffect(() => {
    // Cheap poll in case the state was set after mount
    const t = setInterval(() => {
      const has = !!window.__viewAsCoachId;
      if (has !== active) { setActive(has); setName(window.__viewAsCoachName || ''); }
    }, 800);
    return () => clearInterval(t);
  }, [active]);
  if (!active) return null;
  return (
    <div style={{position:'fixed', top:0, left:0, right:0, zIndex:9999, padding:'10px 18px',
                  background:'linear-gradient(90deg, #E95B9E, #29BAE5)', color:'white',
                  display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
                  fontFamily:'inherit', boxShadow:'0 2px 12px rgba(0,0,0,0.15)', flexWrap:'wrap'}}>
      <div style={{fontSize:12, fontWeight:800, letterSpacing:0.5, textTransform:'capitalize'}}>
        👁 Viewing as <strong>{name}</strong> — read-only. Edits will not be saved.
      </div>
      <div style={{display:'flex', gap:8, alignItems:'center'}}>
        <button onClick={async () => {
          if (!window.confirm(
            `Copy ${name}'s planner into YOUR account?\n\n` +
            `Every team where ${name} has session plans / weekly goals / notes ` +
            `will overwrite the matching teams on your account.\n\n` +
            `After copy, you'll leave view-as mode and see the planner as yourself ` +
            `with the copied data.\n\n` +
            `Continue?`
          )) return;
          try {
            const count = await supabaseSync.copyPlannerFromAndExit(window.__viewAsCoachId);
            // page reloads from inside the call; this won't run
          } catch(e) {
            alert('Copy failed: ' + e.message);
          }
        }}
                style={{padding:'6px 14px', fontSize:11, fontWeight:800, borderRadius:14,
                         background:'white', color:'#29BAE5', border:'none', cursor:'pointer',
                         fontFamily:'inherit', letterSpacing:0.3, whiteSpace:'nowrap'}}>
          📥 Copy to my planner
        </button>
        <button onClick={() => { if (window.confirm('Leave view-as mode? Your planner will be restored.')) supabaseSync.leaveViewAs(); }}
                style={{padding:'6px 14px', fontSize:11, fontWeight:800, borderRadius:14,
                         background:'rgba(255,255,255,0.18)', color:'white', border:'1px solid white', cursor:'pointer',
                         fontFamily:'inherit', letterSpacing:0.3, whiteSpace:'nowrap'}}>
          ↩ Leave view-as mode
        </button>
      </div>
    </div>
  );
}

// Bootstrap: mount the auth gate. Supabase hydration runs inside AuthGate
// once the coach is signed in (see supabaseSync.bootstrap).
ReactDOM.render(<AuthGate />, document.getElementById('root'));
</script>
</body>
</html>
