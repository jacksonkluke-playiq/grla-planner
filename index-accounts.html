// ═══════════════════════════════════════════════════════════
// SEASON SETUP MODAL
// ═══════════════════════════════════════════════════════════
function SeasonSetupModal({ onComplete, onClose, existing }) {
  const [totalWeeks, setTotalWeeks] = useState(existing?.totalWeeks || 10);
  const [startDate, setStartDate] = useState(existing?.startDate || '');
  const [blockCount, setBlockCount] = useState(existing?.blockNames?.length || 4);
  const [blockNames, setBlockNames] = useState(existing?.blockNames || [...DEFAULT_BLOCK_NAMES]);

  function handleBlockCountChange(count) {
    setBlockCount(count);
    const names = [...blockNames];
    while (names.length < count) names.push(`Block ${names.length + 1}`);
    setBlockNames(names.slice(0, count));
  }
  function handleSave() {
    onComplete({ totalWeeks: parseInt(totalWeeks) || 10, startDate: startDate || null, blockNames: blockNames.slice(0, blockCount) });
  }
  const weeksPerBlock = Math.max(1, Math.floor(totalWeeks / blockCount));
  return (
    <div className="modal-overlay">
      <div className="modal-content" style={{maxWidth:540}}>
        <div className="modal-title">Set Up Your Season</div>
        <div className="modal-subtitle">Customise the number of weeks, blocks, and start date for this team's season.</div>
        <div className="form-group">
          <label className="form-label">Total weeks</label>
          <input type="number" min="1" max="52" className="form-input" value={totalWeeks} onChange={e => setTotalWeeks(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Start date (optional)</label>
          <input type="date" className="form-input" value={startDate} onChange={e => setStartDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label className="form-label">Number of blocks</label>
          <select className="form-select" value={blockCount} onChange={e => handleBlockCountChange(parseInt(e.target.value))}>
            {[2,3,4,5].map(n => <option key={n} value={n}>{n} blocks (~{Math.max(1, Math.floor(totalWeeks/n))} weeks each)</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Block names</label>
          {blockNames.slice(0, blockCount).map((name, i) => (
            <input key={i} className="form-input" value={name}
              onChange={e => { const n = [...blockNames]; n[i] = e.target.value; setBlockNames(n); }}
              style={{marginBottom:6}} />
          ))}
        </div>
        <div className="modal-buttons">
          {onClose && <button className="modal-btn modal-btn-secondary" onClick={onClose}>Cancel</button>}
          <button className="modal-btn modal-btn-primary" onClick={handleSave}>Save Season</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// DAILY PLANNER
// ═══════════════════════════════════════════════════════════
function DailyPlanner({ customActivities, setActiveTab, setSelectedWeek, setSelectedDay, userWeekOverrides, setUserWeekOverrides, seasonWeeks, weekDays, currentTeam, sessionStartTimes, getSessionStartTime, seasonConfig }) {
  const today = new Date();
  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][today.getDay()];
  // Consistent date format across the app: long → "Friday 19 June 2026", short → "19 Jun"
  const dateStr = today.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Auto-detect "current week" from season start date when available
  const autoWeekIdx = useMemo(() => {
    if (!seasonConfig || !seasonConfig.startDate) return 0;
    const start = new Date(seasonConfig.startDate);
    if (isNaN(start.getTime())) return 0;
    const diffMs = today - start;
    if (diffMs < 0) return 0;
    const wk = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 7));
    return Math.max(0, Math.min(seasonWeeks.length - 1, wk));
  }, [seasonConfig, seasonWeeks.length]);
  const [homeWeekIdx, setHomeWeekIdx] = useState(autoWeekIdx);
  useEffect(() => { setHomeWeekIdx(autoWeekIdx); }, [autoWeekIdx]);

  const currentWeek = seasonWeeks[homeWeekIdx] || seasonWeeks[0];
  const activeDays = (weekDays && weekDays[currentWeek?.week]) || ['Tuesday', 'Thursday'];
  // Day-of-week resolution for the "Today's Session" card.
  //  • If today IS a training day → show today's plan, labelled "Today's Session"
  //  • Otherwise → find the NEXT upcoming training day this week (Mon→Sat order)
  //    and show that. If we're past all of this week's training days, fall back
  //    to the first one (it'll re-appear correctly when the auto-week-advance
  //    kicks in next week).
  const DAYS_ORDER = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const sessionDayIsToday = activeDays.includes(dayName);
  const sessionDay = (() => {
    if (sessionDayIsToday) return dayName;
    const todayIdx = today.getDay();
    // Search forward through the remaining days of this week
    for (let i = 1; i <= 6; i++) {
      const checkIdx = (todayIdx + i) % 7;
      const checkName = DAYS_ORDER[checkIdx];
      if (activeDays.includes(checkName)) return checkName;
    }
    return activeDays[0] || 'Tuesday';
  })();
  const customKey = `${currentWeek?.week}-${sessionDay}`;
  const todaysActivities = recalcTimes(customActivities[customKey] || [], getSessionStartTime ? getSessionStartTime(currentWeek?.week, sessionDay) : '16:00');
  const sessionsThisWeek = activeDays.filter(d => (customActivities[`${currentWeek?.week}-${d}`] || []).length > 0).length;

  const weekOverride = currentWeek ? (userWeekOverrides[currentWeek.week] || {}) : {};
  const weekFocus = weekOverride.focus || currentWeek?.focus || '';
  const weekOutcomes = weekOverride.outcomes || currentWeek?.outcomes || '';
  function updateWeekField(field, value) {
    if (!currentWeek) return;
    setUserWeekOverrides(prev => ({ ...prev, [currentWeek.week]: { ...(prev[currentWeek.week] || {}), [field]: value } }));
  }
  function openSession() {
    setSelectedWeek(currentWeek?.week || '1');
    setSelectedDay(sessionDay);
    setActiveTab('session');
  }

  return (
    <div>
      <div className="card" style={{background: 'linear-gradient(135deg, rgba(233,91,158,0.08), rgba(41,186,229,0.08))', border:'1px solid var(--border)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', flexWrap:'wrap', gap:12}}>
          <div>
            <div style={{fontSize:11, fontWeight:700, color:'var(--brand-pink)', textTransform:'uppercase', letterSpacing:1.5}}>Today</div>
            <div style={{fontSize:22, fontWeight:800, color:'var(--text-primary)', marginTop:2}}>{dateStr}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1}}>Week</div>
            <div style={{fontSize:24, fontWeight:800, color:'var(--brand-cyan)'}}>{currentWeek?.week || '—'}</div>
          </div>
        </div>
        <div style={{marginTop:14}}>
          <label style={{fontSize:11, fontWeight:700, color:'var(--brand-cyan)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:4, display:'block'}}>Session Objective</label>
          <div contentEditable suppressContentEditableWarning style={{fontSize:14, fontWeight:600, color:'var(--text-primary)', padding:'4px 0', borderBottom:'1px dashed transparent', outline:'none', minHeight:22, cursor:'text'}}
            onFocus={e => { e.currentTarget.style.borderBottomColor = 'var(--border)'; }}
            onBlur={e => { e.currentTarget.style.borderBottomColor = 'transparent'; updateWeekField('focus', e.currentTarget.textContent); }}
            dangerouslySetInnerHTML={{__html: weekFocus || '<span style="color:#8f95a8;font-weight:400">What's the focus today?</span>'}}
          />
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginTop:4}}>
        <div className="card">
          <div className="card-title" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span>{sessionDayIsToday ? "Today's Session" : `Next Session — ${sessionDay}`}</span>
            {todaysActivities.length > 0 && <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{todaysActivities.length} activities</span>}
          </div>
          {todaysActivities.length > 0 ? (
            <>
              <div style={{marginBottom:10}}>
                {todaysActivities.map((a, i) => {
                  const isTrans = isTransition(a.activity || '');
                  const color = activityColor(a.activity || '');
                  return (
                    <div key={i} style={{display:'flex', gap:10, padding:'8px 10px', marginBottom:4, borderRadius:8, borderLeft: isTrans ? 'none' : `3px solid ${color.border}`, background: isTrans ? 'transparent' : 'var(--bg-input)'}}>
                      <div style={{fontSize:11, fontWeight:700, color: color.border, minWidth:40}}>{a.time || '—'}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13, color:'var(--text-primary)', fontWeight:500}}>{a.activity || 'Unnamed'}
                          {!isTrans && color.label && <span style={{fontSize:9, fontWeight:700, textTransform:'uppercase', color: color.border, marginLeft:6, opacity:0.7}}>{color.label}</span>}
                        </div>
                        {a.duration && <div style={{fontSize:11, color:'var(--text-muted)', marginTop:2}}>{a.duration} min{a.focus ? ' · ' + a.focus : ''}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <button className="btn btn-primary btn-sm" onClick={openSession} style={{width:'100%'}}>Open Session Builder</button>
            </>
          ) : (
            <div style={{textAlign:'center', padding:'32px 0'}}>
              <div style={{fontSize:13, color:'var(--text-muted)', marginBottom:10}}>No session planned for {sessionDay}</div>
              <button className="btn btn-primary btn-sm" onClick={openSession}>Build a Session</button>
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-title">Weekly Focus</div>
          <label className="form-label" style={{color:'var(--brand-cyan)'}}>Focus</label>
          <input className="form-input" value={weekFocus} onChange={e => updateWeekField('focus', e.target.value)} placeholder="In a few words — what's this week about?" style={{marginBottom:10}} />
          <label className="form-label" style={{color:'var(--brand-pink)'}}>Desired outcomes</label>
          <textarea className="form-textarea" value={weekOutcomes} onChange={e => updateWeekField('outcomes', e.target.value)} placeholder="What will the team know or do by Friday that they couldn't on Monday?" style={{minHeight:80}} />
        </div>
      </div>

      {/* === WEEKLY VIEW — all training days for the selected week === */}
      <div className="card" style={{marginTop:16}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10, marginBottom:14}}>
          <div>
            <div className="card-title" style={{marginBottom:2}}>This Week's Sessions</div>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              Week {currentWeek?.week}{currentWeek?.dates ? ' · ' + currentWeek.dates : ''}{currentWeek?.blockName ? ' · ' + currentWeek.blockName : ''}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <button className="btn-outline" onClick={() => setHomeWeekIdx(i => Math.max(0, i - 1))}
              disabled={homeWeekIdx === 0}
              style={{padding:'6px 10px', fontSize:11, opacity: homeWeekIdx === 0 ? 0.4 : 1}}>‹ Prev</button>
            <select value={homeWeekIdx} onChange={e => setHomeWeekIdx(parseInt(e.target.value, 10))}
              style={{padding:'6px 10px', fontSize:12, fontWeight:600, fontFamily:'inherit', border:'1px solid var(--border)', borderRadius:6, background:'var(--bg-card)', color:'var(--text-primary)', cursor:'pointer'}}>
              {seasonWeeks.map((w, i) => (
                <option key={w.week} value={i}>Week {w.week}{w.dates ? ' · ' + w.dates : ''}</option>
              ))}
            </select>
            <button className="btn-outline" onClick={() => setHomeWeekIdx(i => Math.min(seasonWeeks.length - 1, i + 1))}
              disabled={homeWeekIdx >= seasonWeeks.length - 1}
              style={{padding:'6px 10px', fontSize:11, opacity: homeWeekIdx >= seasonWeeks.length - 1 ? 0.4 : 1}}>Next ›</button>
          </div>
        </div>

        <div style={{display:'grid', gridTemplateColumns:`repeat(auto-fit, minmax(200px, 1fr))`, gap:10}}>
          {activeDays.map(day => {
            const key = `${currentWeek?.week}-${day}`;
            const startTime = getSessionStartTime ? getSessionStartTime(currentWeek?.week, day) : '16:00';
            const acts = recalcTimes(customActivities[key] || [], startTime);
            const drills = acts.filter(a => !isTransition(a.activity || ''));
            const totalDuration = acts.reduce((sum, a) => sum + (parseInt(a.duration) || 0), 0);
            const isToday = day === dayName && homeWeekIdx === autoWeekIdx;
            const accent = isToday ? 'var(--brand-pink)' : 'var(--brand-cyan)';
            return (
              <div key={day}
                onClick={() => { setSelectedWeek(currentWeek?.week); setSelectedDay(day); setActiveTab('session'); }}
                style={{
                  padding: 12,
                  borderRadius: 10,
                  background: isToday ? 'rgba(233,91,158,0.06)' : 'var(--bg-card)',
                  border: `1px solid ${isToday ? 'var(--brand-pink)' : 'var(--border)'}`,
                  borderTop: `3px solid ${accent}`,
                  cursor: 'pointer',
                  transition: 'transform 0.1s, box-shadow 0.1s'
                }}
                onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)'; }}
                onMouseLeave={e => { e.currentTarget.style.boxShadow = 'none'; }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8}}>
                  <div style={{fontSize:14, fontWeight:700, color: isToday ? 'var(--brand-pink)' : 'var(--text-primary)'}}>
                    {day}{isToday ? ' · today' : ''}
                  </div>
                  <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)'}}>{startTime}</div>
                </div>
                {acts.length === 0 ? (
                  <div style={{fontSize:11, color:'var(--text-muted)', fontStyle:'italic', padding:'14px 0', textAlign:'center'}}>No session planned</div>
                ) : (
                  <>
                    <div style={{fontSize:10, fontWeight:600, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5, marginBottom:6}}>
                      {drills.length} drill{drills.length === 1 ? '' : 's'} · {totalDuration} min
                    </div>
                    {acts.slice(0, 6).map((a, i) => {
                      const isTrans = isTransition(a.activity || '');
                      const color = activityColor(a.activity || '');
                      return (
                        <div key={i} style={{
                          display:'flex', gap:6, alignItems:'center',
                          padding:'3px 0', fontSize:11,
                          opacity: isTrans ? 0.55 : 1
                        }}>
                          <span style={{minWidth:36, fontWeight:700, color: isTrans ? 'var(--text-muted)' : color.border}}>{a.time || '—'}</span>
                          <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color: isTrans ? 'var(--text-muted)' : 'var(--text-primary)'}}>{a.activity}</span>
                        </div>
                      );
                    })}
                    {acts.length > 6 && (
                      <div style={{fontSize:10, color:'var(--text-muted)', marginTop:4, fontStyle:'italic'}}>+ {acts.length - 6} more</div>
                    )}
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{marginTop:4}}>
        <div className="card-title" style={{display:'flex', justifyContent:'space-between'}}>
          <span>Season Progress</span>
          <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:500}}>{sessionsThisWeek} sessions planned this week</span>
        </div>
        <div style={{height:12, background:'var(--bg-input)', borderRadius:6, overflow:'hidden', marginTop:8}}>
          <div style={{height:'100%', width:`${Math.min(100, (1/seasonWeeks.length)*100)}%`, background:'var(--brand-pink)', borderRadius:6}} />
        </div>
        <div style={{fontSize:11, color:'var(--text-muted)', marginTop:6}}>Week 1 of {seasonWeeks.length}</div>
      </div>

    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TEAM LIST 1-18 — match-day team selection
// ═══════════════════════════════════════════════════════════
function TeamList18({ squad, roster, matchday18, setMatchday18, currentSub, teamColor, teamColorBg, TEAM_POSITIONS, onOpenProfile }) {
  // Build a map of squad players by id for quick lookup
  const playerById = useMemo(() => {
    const m = {};
    (squad || []).forEach(p => { if (p._id) m[p._id] = p; });
    return m;
  }, [squad]);

  // Players eligible for selection: those tagged for this team (in roster).
  // Sort by name for the picker.
  const eligible = useMemo(() => {
    const ids = Array.isArray(roster) ? roster : [];
    return ids
      .map(id => playerById[id])
      .filter(Boolean)
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  }, [roster, playerById]);

  // Ensure matchday18 has length 18 (pad with empty strings)
  const slots = useMemo(() => {
    const out = Array.isArray(matchday18) ? matchday18.slice(0, 18) : [];
    while (out.length < 18) out.push('');
    return out;
  }, [matchday18]);

  function setSlot(idx, playerId) {
    setMatchday18(prev => {
      const arr = (Array.isArray(prev) ? prev.slice(0, 18) : []);
      while (arr.length < 18) arr.push('');
      arr[idx] = playerId || '';
      return arr;
    });
  }
  function clearAll() {
    if (window.confirm('Clear all 18 positions?')) setMatchday18(Array(18).fill(''));
  }
  function autoFill() {
    // Auto-assign players to first available slot, in name order, skipping slots already filled
    const used = new Set(slots.filter(Boolean));
    const remaining = eligible.filter(p => !used.has(p._id));
    setMatchday18(prev => {
      const arr = (Array.isArray(prev) ? prev.slice(0, 18) : []);
      while (arr.length < 18) arr.push('');
      let r = 0;
      for (let i = 0; i < 18 && r < remaining.length; i++) {
        if (!arr[i]) { arr[i] = remaining[r]._id; r++; }
      }
      return arr;
    });
  }

  const filledCount = slots.filter(Boolean).length;
  // Detect duplicates (same player assigned to multiple slots)
  const counts = {};
  slots.forEach(id => { if (id) counts[id] = (counts[id] || 0) + 1; });
  const duplicates = Object.keys(counts).filter(id => counts[id] > 1);

  return (
    <div className="card" style={{borderTop:`4px solid ${teamColor}`, marginTop:0}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:12}}>
        <div>
          <div className="card-title" style={{marginBottom:2, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <span>Match-day Team — {currentSub}</span>
            <span style={{display:'inline-flex', alignItems:'center', gap:6, background:teamColorBg, color:teamColor, padding:'2px 10px', borderRadius:12, fontSize:11, fontWeight:700}}>
              {filledCount} / 18
            </span>
          </div>
          <div style={{fontSize:12, color:'var(--text-muted)', marginTop:4}}>
            Pick from {eligible.length} player{eligible.length === 1 ? '' : 's'} tagged for {currentSub}.
            {eligible.length === 0 && ' Tag players using the + ' + currentSub.toUpperCase() + ' button below.'}
          </div>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button className="btn-outline" onClick={autoFill} disabled={eligible.length === 0}
            style={{fontSize:11, padding:'6px 12px', opacity: eligible.length === 0 ? 0.5 : 1}}>
            Auto-fill empty slots
          </button>
          <button className="btn-outline" onClick={clearAll} disabled={filledCount === 0}
            style={{fontSize:11, padding:'6px 12px', opacity: filledCount === 0 ? 0.5 : 1}}>
            Clear all
          </button>
        </div>
      </div>

      {duplicates.length > 0 && (
        <div style={{fontSize:11, color:'var(--red)', background:'var(--red-bg)', padding:'6px 10px', borderRadius:6, marginBottom:10}}>
          ⚠ {duplicates.length} player{duplicates.length === 1 ? '' : 's'} assigned to more than one position.
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:8}}>
        {TEAM_POSITIONS.map((tp, idx) => {
          const playerId = slots[idx];
          const player = playerId ? playerById[playerId] : null;
          const isDuplicate = playerId && counts[playerId] > 1;
          const isBench = tp.num >= 14;
          return (
            <div key={tp.num} style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'8px 10px', background:'var(--bg-card)',
              border:`1px solid ${isDuplicate ? 'var(--red)' : (player ? teamColor : 'var(--border)')}`,
              borderRadius:8,
              opacity: isBench ? 0.95 : 1,
              borderLeft: `4px solid ${isBench ? 'var(--text-muted)' : teamColor}`
            }}>
              <div style={{
                width:28, height:28, flexShrink:0,
                background: player ? teamColor : 'var(--bg-input)',
                color: player ? 'white' : 'var(--text-muted)',
                borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center',
                fontWeight:800, fontSize:12
              }}>{tp.num}</div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:10, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:0.5, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span>{tp.pos}</span>
                  {player && onOpenProfile && (
                    <span onClick={() => onOpenProfile(player._id)} title="Open profile"
                      style={{cursor:'pointer', color:teamColor, fontSize:9, fontWeight:700, textTransform:'none', letterSpacing:0}}>
                      profile ›
                    </span>
                  )}
                </div>
                <select value={playerId || ''} onChange={e => setSlot(idx, e.target.value)}
                  style={{
                    width:'100%', padding:'4px 6px', fontSize:13, fontWeight: player ? 600 : 400,
                    color: player ? 'var(--text-primary)' : 'var(--text-muted)',
                    background:'transparent', border:'1px solid transparent',
                    borderRadius:5, cursor:'pointer', fontFamily:'inherit', outline:'none'
                  }}
                  onFocus={e => e.target.style.borderColor='var(--border)'}
                  onBlur={e => e.target.style.borderColor='transparent'}>
                  <option value="">— empty —</option>
                  {eligible.map(p => (
                    <option key={p._id} value={p._id}>
                      {p.name}{p.position ? ' (' + p.position + ')' : ''}
                    </option>
                  ))}
                </select>
              </div>
              {player && (
                <button onClick={() => setSlot(idx, '')} title="Clear position"
                  style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4, display:'inline-flex', flexShrink:0}}>
                  <Icon name="x" size={12}/>
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// BULK IMPORT TEST DATA — paste spreadsheet rows, fuzzy match, assign
// ═══════════════════════════════════════════════════════════
function ImportTestDataModal({ squad, setSquad, onClose }) {
  const [rawText, setRawText] = useState('');
  const [importDate, setImportDate] = useState(() => {
    // Default to 1 Aug of last year — typical pre-season testing date
    const d = new Date(); d.setFullYear(d.getFullYear() - 1, 7, 1);
    return d.toISOString().slice(0, 10);
  });
  const [seasonTag, setSeasonTag] = useState(() => String(new Date().getFullYear() - 1));
  const [step, setStep] = useState('paste'); // paste | review | done
  const [overrideMap, setOverrideMap] = useState({}); // { rowIdx: playerId }
  const [skipMap, setSkipMap] = useState({}); // { rowIdx: true }

  const normalize = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '');

  // === Parse rawText into headers + rows ===
  const parsed = useMemo(() => {
    if (!rawText.trim()) return { headers: [], rows: [] };
    const lines = rawText.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return { headers: [], rows: [] };
    const split = (line) => {
      // Tab-separated preferred (spreadsheet paste), fall back to comma
      if (line.indexOf('\t') >= 0) return line.split('\t').map(c => c.trim());
      return line.split(',').map(c => c.trim());
    };
    const headers = split(lines[0]);
    const dataRows = lines.slice(1).map(l => split(l));
    return { headers, rows: dataRows };
  }, [rawText]);

  // === Match each row to a squad player ===
  const matched = useMemo(() => {
    return parsed.rows.map((row, idx) => {
      const importedName = row[0] || '';
      let player = null;
      const overrideId = overrideMap[idx];
      if (overrideId) {
        player = squad.find(p => p._id === overrideId) || null;
      } else if (importedName) {
        const norm = normalize(importedName);
        // Exact normalized match
        player = squad.find(p => normalize(p.name) === norm) || null;
        if (!player) {
          // Last name match (last token)
          const tokens = importedName.toLowerCase().split(/[\s,]+/).filter(Boolean);
          const last = tokens[tokens.length - 1] || '';
          const first = tokens[0] || '';
          if (last) {
            const candidates = squad.filter(p => {
              const n = p.name.toLowerCase();
              return n.includes(last) || n.includes(first);
            });
            if (candidates.length === 1) player = candidates[0];
            else if (candidates.length > 1 && first) {
              player = candidates.find(p => p.name.toLowerCase().includes(first)) || null;
            }
          }
        }
      }
      // Pull test columns (skip first col = name). Skip cols with blank header (separator cols).
      const tests = [];
      for (let c = 1; c < parsed.headers.length; c++) {
        const value = (row[c] || '').trim();
        const test = (parsed.headers[c] || '').trim();
        if (!test) continue; // separator column between term blocks
        if (!value || value === '·' || value === '-' || value === '—') continue;
        tests.push({ test, value });
      }
      return { idx, importedName, player, tests };
    });
  }, [parsed, squad, overrideMap]);

  const matchedCount = matched.filter(m => m.player && !skipMap[m.idx]).length;
  const unmatchedCount = matched.filter(m => !m.player && !skipMap[m.idx]).length;
  const totalTestsToImport = matched.reduce((sum, m) => {
    if (!m.player || skipMap[m.idx]) return sum;
    return sum + m.tests.length;
  }, 0);

  function doImport() {
    // Sprint values from Excel can come through as "0:0:3:50" — normalise to "3.50"
    const cleanSprint = (v) => {
      if (typeof v !== 'string') return v;
      const m = v.match(/^0:0:(\d+):(\d{1,2})$/);
      if (m) return `${m[1]}.${m[2].padStart(2,'0')}`;
      return v;
    };

    setSquad(prev => prev.map(p => {
      const myRows = matched.filter(m => m.player && m.player._id === p._id && !skipMap[m.idx]);
      if (myRows.length === 0) return p;

      const prof = { ...(p.profile || {}) };
      // Compact format that drives the progression charts
      prof.testHistory = { ...(prof.testHistory && typeof prof.testHistory === 'object' ? prof.testHistory : {}) };

      for (const m of myRows) {
        for (const t of m.tests) {
          const testName = t.test;
          let val = (t.value == null ? '' : String(t.value)).trim();
          if (!val) continue;
          if (testName === '20m Sprint' || testName === '40m Sprint' || testName === '10m Sprint') {
            val = cleanSprint(val);
          }
          prof.testHistory[testName] = (prof.testHistory[testName] || []).slice();
          // Replace any existing entry for the same date so re-importing doesn't double up
          prof.testHistory[testName] = prof.testHistory[testName].filter(([d]) => d !== importDate);
          prof.testHistory[testName].push([importDate, val]);
        }
      }

      // Sort each test's entries chronologically (so trend & sparkline make sense)
      Object.keys(prof.testHistory).forEach(tn => {
        prof.testHistory[tn].sort((a, b) => (a[0] || '').localeCompare(b[0] || ''));
      });

      return { ...p, profile: prof };
    }));
    setStep('done');
  }

  const exampleText = "Name\t40m Sprint\tYo-Yo Test\tBench Press (1RM)\tSquat (1RM)\nHalo Clarke-Telka\t5.82\t1850\t30kg\t55kg\nAva Nia\t5.55\t2100\t35kg\t65kg";

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 760, maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
          <div>
            <h3 style={{marginBottom:4}}>Import Test Data</h3>
            <div style={{fontSize:12, color:'var(--text-muted)'}}>
              Paste rows from a spreadsheet. Names get auto-matched to your squad — review and confirm before importing.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:6, display:'inline-flex'}}>
            <Icon name="x" size={18}/>
          </button>
        </div>

        {step === 'paste' && (
          <>
            <div className="format-hint" style={{marginBottom:12}}>
              <div className="format-hint-title">Expected format (paste from Excel / Google Sheets)</div>
              <pre style={{fontSize:11, color:'var(--text-secondary)', whiteSpace:'pre-wrap', margin:0}}>{`Name        40m Sprint   Yo-Yo Test   Bench Press   Squat
Halo Clarke    5.82       1850          30kg          55kg
Ava Nia        5.55       2100          35kg          65kg`}</pre>
              <div style={{fontSize:11, color:'var(--text-muted)', marginTop:6}}>
                First column = player name. Other columns = test names. Tab or comma separated. Header row required.
              </div>
            </div>

            <textarea className="paste-area" value={rawText} onChange={e => setRawText(e.target.value)}
              placeholder="Paste your test data here..."
              style={{minHeight: 200}} />

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:14}}>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Date for these results</label>
                <input type="date" className="form-input" value={importDate} onChange={e => setImportDate(e.target.value)} />
              </div>
              <div className="form-group" style={{margin:0}}>
                <label className="form-label">Season tag (added to notes)</label>
                <input className="form-input" value={seasonTag} onChange={e => setSeasonTag(e.target.value)}
                  placeholder="e.g. 2024 pre-season" />
              </div>
            </div>

            <div className="btn-row" style={{marginTop:16}}>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn btn-ghost" onClick={() => setRawText(exampleText)}>Use example</button>
              <button className="btn btn-primary" onClick={() => setStep('review')}
                disabled={parsed.rows.length === 0}>
                Continue → Review {parsed.rows.length} row{parsed.rows.length === 1 ? '' : 's'}
              </button>
            </div>
          </>
        )}

        {step === 'review' && (
          <>
            <div style={{padding:12, background:'var(--bg-input)', borderRadius:8, marginBottom:12, fontSize:12, display:'flex', gap:16, flexWrap:'wrap'}}>
              <div><span style={{color:'var(--text-muted)'}}>Matched:</span> <strong style={{color:'var(--green)'}}>{matchedCount}</strong></div>
              <div><span style={{color:'var(--text-muted)'}}>Unmatched:</span> <strong style={{color: unmatchedCount > 0 ? 'var(--red)' : 'var(--text-muted)'}}>{unmatchedCount}</strong></div>
              <div><span style={{color:'var(--text-muted)'}}>Tests to import:</span> <strong style={{color:'var(--brand-pink)'}}>{totalTestsToImport}</strong></div>
              <div style={{marginLeft:'auto'}}><span style={{color:'var(--text-muted)'}}>Date:</span> <strong>{importDate}</strong></div>
            </div>

            <div style={{maxHeight:340, overflowY:'auto', border:'1px solid var(--border)', borderRadius:8}}>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
                <thead>
                  <tr style={{position:'sticky', top:0, background:'var(--bg-input)', zIndex:1}}>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>From sheet</th>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Assign to player</th>
                    <th style={{textAlign:'left', padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Tests</th>
                    <th style={{padding:'8px 10px', fontWeight:700, color:'var(--text-secondary)', fontSize:11, textTransform:'uppercase', letterSpacing:0.5}}>Skip</th>
                  </tr>
                </thead>
                <tbody>
                  {matched.map(m => {
                    const skipped = !!skipMap[m.idx];
                    return (
                      <tr key={m.idx} style={{borderTop:'1px solid var(--border)', background: skipped ? 'var(--bg-input)' : 'transparent', opacity: skipped ? 0.5 : 1}}>
                        <td style={{padding:'8px 10px', fontWeight:600}}>{m.importedName || '(blank)'}</td>
                        <td style={{padding:'8px 10px'}}>
                          <select value={m.player ? m.player._id : ''}
                            onChange={e => setOverrideMap(prev => ({...prev, [m.idx]: e.target.value}))}
                            style={{width:'100%', padding:'4px 6px', fontSize:12, fontFamily:'inherit',
                              background: m.player ? 'var(--green-bg)' : 'var(--red-bg)',
                              color: m.player ? 'var(--green)' : 'var(--red)', fontWeight:600,
                              border:`1px solid ${m.player ? 'var(--green)' : 'var(--red)'}`, borderRadius:5}}>
                            <option value="">— No match —</option>
                            {squad.map(p => <option key={p._id} value={p._id} style={{color:'var(--text-primary)', background:'#fff'}}>{p.name}</option>)}
                          </select>
                        </td>
                        <td style={{padding:'8px 10px', color:'var(--text-secondary)'}}>
                          {m.tests.length > 0 ? m.tests.map(t => `${t.test}: ${t.value}`).join(', ') : <span style={{color:'var(--text-muted)'}}>—</span>}
                        </td>
                        <td style={{padding:'8px 10px', textAlign:'center'}}>
                          <input type="checkbox" checked={skipped} onChange={e => setSkipMap(prev => ({...prev, [m.idx]: e.target.checked}))} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="btn-row" style={{marginTop:16}}>
              <button className="btn btn-ghost" onClick={() => setStep('paste')}>← Back</button>
              <button className="btn btn-primary" onClick={doImport} disabled={matchedCount === 0}>
                Import {totalTestsToImport} test{totalTestsToImport === 1 ? '' : 's'} into {matchedCount} player{matchedCount === 1 ? '' : 's'}
              </button>
            </div>
          </>
        )}

        {step === 'done' && (
          <div style={{textAlign:'center', padding:'30px 20px'}}>
            <div style={{fontSize:48, marginBottom:12}}>✓</div>
            <div style={{fontSize:16, fontWeight:700, marginBottom:6}}>Import complete</div>
            <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:20}}>
              Added {totalTestsToImport} test result{totalTestsToImport === 1 ? '' : 's'} across {matchedCount} player{matchedCount === 1 ? '' : 's'}.
              <br/>Open any player's profile → Performance Profile tab to see the data.
            </div>
            <button className="btn btn-primary" onClick={onClose}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// PLAYER PROFILE — gym tests, goals, feedback, skill grades
// ═══════════════════════════════════════════════════════════
const DEFAULT_SKILLS = [
  'Catch & Pass', 'Tackle Technique', 'Ball Carries', 'Defensive Line',
  'Kicking', 'Communication', 'Game Awareness', 'Decision Making',
  'Speed', 'Strength & Power'
];
const DEFAULT_GYM_TESTS = [
  '40m Sprint', '20m Sprint', '10m Sprint', 'Yo-Yo Test', '1.2km Time Trial',
  'Bench Press (1RM)', 'Squat (1RM)', 'Chin-ups (max reps)', 'Push-ups (max reps)',
  'Vertical Jump'
];

function PlayerProfileModal({ player, playerIdx, updatePlayer, deletePlayer, onClose, currentSub, teamColor, inRoster, toggleRoster, POSITIONS, currentGroup }) {
  const [tab, setTab] = useState('overview');
  const profile = player.profile || {};

  function patchProfile(patch) {
    updatePlayer(playerIdx, 'profile', { ...profile, ...patch });
  }
  const updField = (f, v) => updatePlayer(playerIdx, f, v);

  const gymTests = Array.isArray(profile.gymTests) ? profile.gymTests : [];
  const testHistory = (profile.testHistory && typeof profile.testHistory === 'object') ? profile.testHistory : {};
  // For each test where lower value is better
  const LOWER_IS_BETTER = new Set(['Bronco', '40m Sprint', '20m Sprint', '10m Sprint', '1.2km Time Trial']);
  // For tests measured in time format MM:SS, lower is better
  const isTimeFormat = (v) => typeof v === 'string' && /^\d+:\d{2}$/.test(v);
  const valToNumber = (v) => {
    if (v == null) return null;
    const s = String(v).trim();
    if (isTimeFormat(s)) {
      const [m, sec] = s.split(':').map(Number);
      return m * 60 + sec;
    }
    const n = parseFloat(s.replace(/[^\d.\-]/g, ''));
    return isNaN(n) ? null : n;
  };

  const goals = Array.isArray(profile.goals) ? profile.goals : [];
  const feedback = Array.isArray(profile.feedback) ? profile.feedback : [];
  const skills = profile.skills && typeof profile.skills === 'object' ? profile.skills : {};

  // === FEEDBACK REPORT ===
  const feedbackReport = (profile.feedbackReport && typeof profile.feedbackReport === 'object') ? profile.feedbackReport : {};
  // feedbackReport shape: { positionGroup, date, coach, ratings: { skill: 'Green – Exceeds' }, customComments: { skill: '...' }, reflectionDefence, reflectionAttack }
  const autoPositionGroup = getFeedbackPositionGroup(currentGroup?.id || '7-8', player.position);
  const activePositionGroup = feedbackReport.positionGroup || autoPositionGroup;
  const reportTemplate = FEEDBACK_TEMPLATES[activePositionGroup] || [];
  function patchReport(patch) {
    patchProfile({ feedbackReport: { ...feedbackReport, ...patch } });
  }
  function setReportRating(skill, rating) {
    const ratings = { ...(feedbackReport.ratings || {}), [skill]: rating };
    patchReport({ ratings });
  }
  function setReportCustomComment(skill, comment) {
    const cc = { ...(feedbackReport.customComments || {}) };
    if (comment && comment.trim()) cc[skill] = comment;
    else delete cc[skill];
    patchReport({ customComments: cc });
  }
  function getCommentFor(skill) {
    const cc = feedbackReport.customComments || {};
    if (cc[skill] != null) return cc[skill];
    const rating = normalizeRating((feedbackReport.ratings || {})[skill]);
    if (!rating) return '';
    const tpl = reportTemplate.find(t => t.skill === skill);
    return (tpl?.comments?.[rating]) || '';
  }
  // Rating language updated per GRLA Feedback brief: Leading / Developing / Learning.
  // Old data stored under Green/Yellow/Red keys is migrated via normalizeRating()
  // so existing feedback reports keep their rating after the rename.
  const RATING_COLORS = {
    'Leading':    { fg: 'var(--green)',  bg: 'var(--green-bg)',  border: 'var(--green)' },
    'Developing': { fg: 'var(--orange)', bg: 'var(--orange-bg)', border: 'var(--orange)' },
    'Learning':   { fg: 'var(--red)',    bg: 'var(--red-bg)',    border: 'var(--red)' },
  };
  const RATING_KEYS = ['Leading', 'Developing', 'Learning'];
  function normalizeRating(r) {
    if (!r) return r;
    if (r === 'Green – Exceeds')     return 'Leading';
    if (r === 'Yellow – Developing') return 'Developing';
    if (r === 'Red – Needs Work')    return 'Learning';
    return r;
  }

  // Comprehensive "send-to-parents" player report: branded multi-section PDF
  function exportFullPlayerReport() {
    const logoSrc = (() => { try { return document.querySelector('.logo-icon img')?.src || ''; } catch(e) { return ''; } })();
    const teamLabel = currentGroup ? `${currentGroup.label} ${currentSub || ''}`.trim() : '';
    const fmtShortDate = (s) => {
      if (!s) return '';
      const [y, m, d] = s.split('-');
      if (!y || !m || !d) return s;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} '${y.slice(2)}`;
    };
    const today = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
    const escape = (s) => (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    // === SPIDER / RADAR CHART DATA ===
    // Per-test percentile rank within same-school-year cohort (current squad + historical archive).
    // Mirrors the in-app Performance Profile spider chart so the PDF tells the same story.
    const buildSpiderAxes = () => {
      const schoolYear = String(player.schoolYear || effectiveSchoolYear(player, currentGroup?.id || '7-8'));
      const tests = (typeof TEST_IMPORT_DATA !== 'undefined' && TEST_IMPORT_DATA.tests) ? TEST_IMPORT_DATA.tests : ['Bronco','Broad Jump','Vertical Jump','Max Hang','Push Up','20m Sprint','Med Ball Push'];
      const LOWER = new Set(['Bronco','40m Sprint','20m Sprint','10m Sprint','1.2km Time Trial']);
      const toN = (test, vStr) => {
        if (!vStr && vStr !== 0) return null;
        const s = String(vStr).trim();
        if (test === 'Bronco' || test === '1.2km Time Trial') {
          const m = s.match(/^(\d+):(\d{1,2})$/); if (m) return +m[1]*60 + +m[2];
        }
        const f = parseFloat(s.replace(/[^0-9.\-]/g,'')); return isNaN(f) ? null : f;
      };
      const archive = (typeof ARCHIVE_TEST_DATA !== 'undefined' ? ARCHIVE_TEST_DATA[schoolYear] : null) || {};
      const cohort = [];
      ['7-8','9-10','11-12'].forEach(yg => {
        try {
          const sq = JSON.parse(localStorage.getItem(`playiq_${yg}_squad_v3`) || '[]');
          sq.forEach(p => { if (p && String(p.schoolYear || '') === schoolYear) cohort.push(p); });
        } catch(e) {}
      });
      const axes = [];
      for (const test of tests) {
        const lower = LOWER.has(test);
        const hist = (player?.profile?.testHistory?.[test] || [])
          .filter(e => e && e[1])
          .map(([d, v]) => ({ d, n: toN(test, normalizeTestValue(test, v)) }))
          .filter(e => e.n != null)
          .sort((a,b) => (a.d||'').localeCompare(b.d||''));
        if (hist.length === 0) continue;
        const myValue = hist[hist.length - 1].n;
        const cohortVals = [];
        cohort.forEach(p => {
          const ph = (p?.profile?.testHistory?.[test] || [])
            .filter(e => e && e[1])
            .map(([d, v]) => ({ d, n: toN(test, normalizeTestValue(test, v)) }))
            .filter(e => e.n != null)
            .sort((a,b) => (a.d||'').localeCompare(b.d||''));
          if (ph.length > 0) cohortVals.push(ph[ph.length - 1].n);
        });
        const archiveVals = (archive[test] || []).map(v => toN(test, v)).filter(n => n != null);
        const pool = [...cohortVals, ...archiveVals];
        if (pool.length < 3) continue;
        let better = 0;
        for (const v of pool) { if (lower ? v > myValue : v < myValue) better++; else if (v === myValue) better += 0.5; }
        axes.push({ test, value: myValue, pct: Math.round((better / pool.length) * 100), poolSize: pool.length });
      }
      return { axes, schoolYear };
    };

    const spiderData = buildSpiderAxes();
    let spiderSvg = '';
    if (spiderData.axes.length >= 3) {
      const { axes } = spiderData;
      const size = 320, cx = size/2, cy = size/2 - 4, maxR = 95, n = axes.length;
      const angleFor = (i) => (i / n) * Math.PI * 2 - Math.PI / 2;
      const rings = [0.25, 0.5, 0.75, 1.0];
      const athletePts = axes.map((a, i) => {
        const r = (a.pct/100)*maxR, ang = angleFor(i);
        return [cx + Math.cos(ang)*r, cy + Math.sin(ang)*r];
      });
      const avgPts = axes.map((_, i) => {
        const ang = angleFor(i); return [cx + Math.cos(ang)*(0.5*maxR), cy + Math.sin(ang)*(0.5*maxR)];
      });
      const path = (pts) => pts.map(([x,y],i) => (i===0?`M ${x.toFixed(1)} ${y.toFixed(1)}`:`L ${x.toFixed(1)} ${y.toFixed(1)}`)).join(' ') + ' Z';
      spiderSvg = `
        <svg viewBox="0 0 ${size} ${size}" style="display:block; width:100%; max-width:380px; height:auto; margin:0 auto;">
          ${rings.map(r => `<circle cx="${cx}" cy="${cy}" r="${(r*maxR).toFixed(1)}" fill="none" stroke="#e5e7eb" stroke-width="${r === 0.5 ? 1 : 0.5}" stroke-dasharray="${r === 0.5 ? '0' : '3 3'}" />`).join('')}
          ${axes.map((_, i) => { const ang = angleFor(i); return `<line x1="${cx}" y1="${cy}" x2="${(cx + Math.cos(ang)*maxR).toFixed(1)}" y2="${(cy + Math.sin(ang)*maxR).toFixed(1)}" stroke="#e5e7eb" stroke-width="0.5" />`; }).join('')}
          <path d="${path(avgPts)}" fill="rgba(41,186,229,0.10)" stroke="#29BAE5" stroke-width="1.2" stroke-dasharray="4 3" />
          <path d="${path(athletePts)}" fill="rgba(233,91,158,0.35)" stroke="#E95B9E" stroke-width="2" />
          ${athletePts.map(([x,y]) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="#E95B9E" stroke="white" stroke-width="1"/>`).join('')}
          ${axes.map((a, i) => {
            const ang = angleFor(i), lx = cx + Math.cos(ang)*(maxR + 22), ly = cy + Math.sin(ang)*(maxR + 22);
            const cosA = Math.cos(ang); const anchor = Math.abs(cosA) < 0.15 ? 'middle' : (cosA > 0 ? 'start' : 'end');
            return `<g><text x="${lx.toFixed(1)}" y="${(ly - 4).toFixed(1)}" font-size="9" font-weight="700" fill="#1a1a2e" text-anchor="${anchor}" dominant-baseline="middle">${escape(a.test)}</text><text x="${lx.toFixed(1)}" y="${(ly + 6).toFixed(1)}" font-size="8" font-weight="700" fill="${a.pct >= 50 ? '#16a34a' : '#dc2626'}" text-anchor="${anchor}" dominant-baseline="middle">${a.pct}th</text></g>`;
          }).join('')}
        </svg>
      `;
    }

    // === KEY HIGHLIGHTS row (top 3 stats / latest values) ===
    const testNamesAvailable = Object.keys(testHistory).sort();
    const highlightTests = [];
    // Prioritise: Bronco, Broad Jump, Bench (kg), Squat (kg), 20m Sprint, Med Ball Push (and others with data)
    const PRIORITY = ['Bronco','Broad Jump','Bench (kg)','Squat (kg)','20m Sprint','Med Ball Push','Vertical Jump','Max Hang','Push Up','Beep Test'];
    for (const t of PRIORITY) {
      if (highlightTests.length >= 4) break;
      const arr = (testHistory[t] || []).filter(e => e && e[1]);
      if (arr.length === 0) continue;
      const sorted = arr.slice().sort((a,b) => (a[0]||'').localeCompare(b[0]||''));
      highlightTests.push({ name: t, value: sorted[sorted.length - 1][1], date: sorted[sorted.length - 1][0] });
    }
    const highlightsHtml = highlightTests.length === 0 ? '' : `
      <div class="highlights">
        ${highlightTests.map(h => `
          <div class="highlight-card">
            <div class="highlight-label">${escape(h.name)}</div>
            <div class="highlight-value">${escape(h.value)}</div>
            <div class="highlight-date">${fmtShortDate(h.date)}</div>
          </div>
        `).join('')}
      </div>
    `;

    // === SECTION: Snapshot ===
    const heightWeight = [
      profile.height ? `Height: ${escape(profile.height)}` : '',
      profile.weight ? `Weight: ${escape(profile.weight)}` : '',
      profile.dob ? `DOB: ${escape(profile.dob)}` : '',
    ].filter(Boolean).join(' · ');
    const snapshotHtml = `
      <div class="meta-row">
        <div class="meta-item"><span class="meta-label">Position</span><span class="meta-value">${escape(player.position || '—')}</span></div>
        ${player.number ? `<div class="meta-item"><span class="meta-label">Jersey</span><span class="meta-value">#${escape(player.number)}</span></div>` : ''}
        <div class="meta-item"><span class="meta-label">Year Group</span><span class="meta-value">${escape(currentGroup?.label || '')}</span></div>
        <div class="meta-item"><span class="meta-label">Team</span><span class="meta-value">${escape(teamLabel)}</span></div>
        <div class="meta-item"><span class="meta-label">Report Date</span><span class="meta-value">${today}</span></div>
      </div>
      ${heightWeight || profile.notes ? `
        <div class="snapshot">
          ${heightWeight ? `<div class="hw">${heightWeight}</div>` : ''}
          ${profile.notes ? `<div class="bio">${escape(profile.notes).replace(/\n/g,'<br/>')}</div>` : ''}
        </div>
      ` : ''}
    `;

    // === SECTION: Skill Grades (visual bars) ===
    const allSkillKeys = [...DEFAULT_SKILLS];
    Object.keys(skills).forEach(k => { if (!allSkillKeys.includes(k)) allSkillKeys.push(k); });
    const gradedSkills = allSkillKeys.filter(k => skills[k] > 0);
    const strengths = gradedSkills.filter(k => skills[k] >= 4);
    const growthAreas = gradedSkills.filter(k => skills[k] <= 2);
    const skillsHtml = gradedSkills.length === 0 ? '' : `
      <section class="report-section">
        <div class="section-header"><div class="section-bar"></div><h2>Skill Profile</h2></div>
        <div class="skills-grid">
          ${gradedSkills.map(name => {
            const grade = skills[name];
            return `
              <div class="skill-row">
                <div class="skill-name">${escape(name)}</div>
                <div class="skill-bars">
                  ${[1,2,3,4,5].map(n => `<div class="skill-seg ${grade >= n ? 'on' : ''}"></div>`).join('')}
                </div>
                <div class="skill-grade">${grade}/5</div>
              </div>
            `;
          }).join('')}
        </div>
        ${(strengths.length || growthAreas.length) ? `
          <div class="strength-growth">
            ${strengths.length ? `
              <div class="sg-card sg-strength">
                <div class="sg-title">★ Strengths</div>
                <ul>${strengths.map(s => `<li>${escape(s)}</li>`).join('')}</ul>
              </div>` : ''}
            ${growthAreas.length ? `
              <div class="sg-card sg-growth">
                <div class="sg-title">↗ Growth areas</div>
                <ul>${growthAreas.map(s => `<li>${escape(s)}</li>`).join('')}</ul>
              </div>` : ''}
          </div>
        ` : ''}
      </section>
    `;

    // === SECTION: Performance Profile (spider chart) ===
    const spiderHtml = spiderSvg ? `
      <section class="report-section spider-section">
        <div class="section-header"><div class="section-bar"></div><h2>Performance Profile</h2></div>
        <div class="spider-wrap">
          <div class="spider-chart">${spiderSvg}</div>
          <div class="spider-legend">
            <div class="spider-lead">Where ${escape(player.name.split(',').reverse().join(' ').trim() || player.name)} sits against the rest of Year ${spiderData.schoolYear}.</div>
            <div class="legend-row"><span class="legend-dot legend-pink"></span><span class="legend-text"><b>${escape(player.name.split(',').reverse().join(' ').trim().split(' ')[0] || player.name)}'s</b> latest result on each test — % of cohort beaten.</span></div>
            <div class="legend-row"><span class="legend-dot legend-cyan"></span><span class="legend-text"><b>Year ${spiderData.schoolYear} average</b> sits at the 50% ring. The further outside it, the better.</span></div>
            <div class="spider-pool-note">Comparison pool: current Year ${spiderData.schoolYear} athletes + archived seasons (${spiderData.axes.length ? Math.min(...spiderData.axes.map(a=>a.poolSize)) : 0}–${spiderData.axes.length ? Math.max(...spiderData.axes.map(a=>a.poolSize)) : 0} per test).</div>
          </div>
        </div>
      </section>
    ` : '';

    // === SECTION: Performance Testing — inline sparklines ===
    const testNames = Object.keys(testHistory).sort();
    const testingHtml = testNames.length === 0 ? '' : `
      <section class="report-section">
        <div class="section-header"><div class="section-bar"></div><h2>Performance Testing</h2></div>
        <div class="tests-grid">
          ${testNames.map(testName => {
            const entries = (testHistory[testName] || []).slice().sort((a,b) => (a[0]||'').localeCompare(b[0]||''));
            const lowerBetter = LOWER_IS_BETTER.has(testName);
            const valid = entries.filter(e => e[1] && valToNumber(e[1]) != null)
              .map(e => ({ date: e[0], raw: e[1], n: valToNumber(e[1]) }));
            if (valid.length === 0) return '';
            const latest = valid[valid.length - 1];
            const first = valid[0];
            const sampleVal = valid.find(v => v.raw)?.raw || '';
            const isTimeFmt = isTimeFormat(sampleVal);
            let trendBadge = '';
            if (valid.length >= 2) {
              const diff = latest.n - first.n;
              const better = lowerBetter ? diff < 0 : diff > 0;
              if (diff !== 0) {
                trendBadge = `<span class="trend-badge ${better ? 'trend-better' : 'trend-worse'}">${better ? '▲ improved' : '▼ regressed'}</span>`;
              }
            }
            const fmtDelta = (d) => {
              if (isTimeFmt) {
                const abs = Math.abs(d);
                const m = Math.floor(abs / 60), s = Math.round(abs % 60);
                const sign = d < 0 ? '−' : (d > 0 ? '+' : '');
                return `${sign}${m > 0 ? m + ':' + String(s).padStart(2,'0') : s + 's'}`;
              }
              const r = Math.round(d * 100) / 100;
              if (r === 0) return '0';
              return (r > 0 ? '+' : '') + (Number.isInteger(r) ? r : r.toFixed(2));
            };

            // Build sparkline SVG
            let sparkSvg = '';
            if (valid.length >= 2) {
              const W = 280, H = 60, PADX = 10, PADY = 12;
              const ns = valid.map(v => v.n);
              const min = Math.min(...ns), max = Math.max(...ns);
              const range = (max - min) || 1;
              const x = (i) => PADX + (W - 2*PADX) * (i / (valid.length - 1));
              const y = (n) => {
                const norm = (n - min) / range;
                const visualPos = lowerBetter ? norm : (1 - norm);
                return PADY + (H - 2*PADY) * visualPos;
              };
              const linePath = valid.map((p, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(p.n).toFixed(1)}`).join(' ');
              const areaPath = linePath + ` L ${x(valid.length-1).toFixed(1)} ${H-PADY} L ${x(0).toFixed(1)} ${H-PADY} Z`;
              sparkSvg = `
                <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">
                  <path d="${areaPath}" fill="#E95B9E" opacity="0.12" />
                  <path d="${linePath}" stroke="#E95B9E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                  ${valid.map((p, i) => `<circle cx="${x(i)}" cy="${y(p.n)}" r="4" fill="white" stroke="#E95B9E" stroke-width="2"/>${(i === 0 || i === valid.length - 1) ? `<text x="${x(i)}" y="${y(p.n) - 8}" text-anchor="middle" font-size="9" font-weight="700" fill="#E95B9E">${escape(p.raw)}</text>` : ''}`).join('')}
                </svg>
              `;
            }

            return `
              <div class="test-card">
                <div class="test-name-row">
                  <div class="test-name">${escape(testName)}</div>
                  ${trendBadge}
                </div>
                <div class="test-stats">
                  <div class="ts-block">
                    <div class="ts-label">Latest</div>
                    <div class="ts-val">${escape(latest.raw)}</div>
                    <div class="ts-date">${fmtShortDate(latest.date)}</div>
                  </div>
                  ${valid.length >= 2 ? `
                    <div class="ts-block">
                      <div class="ts-label">Change</div>
                      <div class="ts-val ts-delta">${fmtDelta(latest.n - first.n)}</div>
                      <div class="ts-date">vs ${fmtShortDate(first.date)}</div>
                    </div>` : ''}
                </div>
                ${sparkSvg}
              </div>
            `;
          }).join('')}
        </div>
      </section>
    `;

    // === SECTION: Feedback Report ===
    // Only show skills that have been rated — keeps the report clean when a
    // coach has only filled in some of the position-group skills (the previous
    // version showed lots of empty rows which looked unfinished).
    const ratedSkills = reportTemplate.filter(t => (feedbackReport.ratings || {})[t.skill]);
    // Per GRLA Feedback brief: feedback lives on its own page, with rating chips
    // showing just the rating name (Leading / Developing / Learning) in full colour.
    const feedbackHtml = !ratedSkills.length ? '' : `
      <section class="report-section feedback-page">
        <div class="section-header"><div class="section-bar"></div><h2>Coach Feedback — ${escape(activePositionGroup)}</h2></div>
        ${feedbackReport.date || feedbackReport.coach ? `
          <div class="feedback-meta">
            ${feedbackReport.date ? `<span><strong>Date:</strong> ${escape(feedbackReport.date)}</span>` : ''}
            ${feedbackReport.coach ? `<span><strong>Coach:</strong> ${escape(feedbackReport.coach)}</span>` : ''}
          </div>
        ` : ''}
        <table class="feedback-table">
          <thead><tr><th>Skill</th><th>Rating</th><th>Coach Comments</th></tr></thead>
          <tbody>
            ${ratedSkills.map(t => {
              const rating = normalizeRating((feedbackReport.ratings || {})[t.skill] || '');
              const comment = getCommentFor(t.skill);
              const palette = RATING_COLORS[rating] || { fg: '#888', bg: '#f5f5f5', border: '#ddd' };
              return `
                <tr>
                  <td class="ft-skill">
                    <div class="ft-skill-area">${escape(t.area)}</div>
                    <div class="ft-skill-name">${escape(t.skill)}</div>
                    ${t.desc ? `<div class="ft-skill-desc">${escape(t.desc)}</div>` : ''}
                  </td>
                  <td class="ft-rating">
                    <span class="ft-pill ft-pill-${rating.toLowerCase()}" style="color:${palette.fg};background:${palette.bg};border-color:${palette.border};">${escape(rating)}</span>
                  </td>
                  <td class="ft-comment">${escape(comment) || '<span class="ft-empty">—</span>'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
        ${ratedSkills.length < reportTemplate.length ? `
          <div class="feedback-note">Showing ${ratedSkills.length} of ${reportTemplate.length} ${escape(activePositionGroup)} skills with coach feedback this round.</div>
        ` : ''}
      </section>
    `;

    // === SECTION: Coach Reflections (removed per GRLA Feedback brief) ===
    // Reflection data is no longer rendered in the parent-facing PDF. The
    // value stays in localStorage for legacy reports but the section is
    // always empty so downstream layout calls still work.
    const reflectionsHtml = '';

    // === SECTION: Goals ===
    const activeGoals = goals.filter(g => g.text && g.status !== 'done');
    const doneGoals = goals.filter(g => g.text && g.status === 'done');
    const goalsHtml = (activeGoals.length + doneGoals.length === 0) ? '' : `
      <section class="report-section">
        <div class="section-header"><div class="section-bar"></div><h2>Goals & Development Plan</h2></div>
        ${activeGoals.length ? `
          <div class="goals-block">
            <div class="goals-title">Working on</div>
            <ul class="goals-list">
              ${activeGoals.map(g => `<li>${escape(g.text)}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
        ${doneGoals.length ? `
          <div class="goals-block goals-done-block">
            <div class="goals-title">Achieved</div>
            <ul class="goals-list">
              ${doneGoals.map(g => `<li>${escape(g.text)}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
      </section>
    `;

    // === HTML DOCUMENT ===
    const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8" />

  const today = () => new Date().toISOString().slice(0, 10);

  // === GYM TESTS ===

    patchProfile({ gymTests: [...gymTests, { id: 'gt_' + Date.now(), date: today(), test: DEFAULT_GYM_TESTS[0], value: '', notes: '' }] });

  function updateTestHistory(testName, entries) {
    const next = { ...testHistory };
    if (!entries || entries.length === 0) delete next[testName];
    else next[testName] = entries.sort((a, b) => (a[0] || '').localeCompare(b[0] || ''));
    patchProfile({ testHistory: next });
  }
  function addHistoryEntry(testName) {
    const cur = testHistory[testName] || [];
    updateTestHistory(testName, [...cur, [today(), '']]);
  }
  function updateHistoryEntry(testName, idx, field, value) {
    const cur = (testHistory[testName] || []).slice();
    if (!cur[idx]) return;
    cur[idx] = field === 'date' ? [value, cur[idx][1]] : [cur[idx][0], value];
    updateTestHistory(testName, cur);
  }
  function removeHistoryEntry(testName, idx) {
    const cur = (testHistory[testName] || []).filter((_, i) => i !== idx);
    updateTestHistory(testName, cur);

    if (idx >= 0) cur[idx] = [date, value];
    else cur.push([date, value]);
    cur.sort((a, b) => (a[0]||'').localeCompare(b[0]||''));
    updateTestHistory(testName, cur);
