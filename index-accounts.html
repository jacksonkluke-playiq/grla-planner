function VersionHistoryModal({ onClose }) {
  const [snaps, setSnaps] = useState(() => versionHistory.list());
  useEffect(() => versionHistory.subscribe(setSnaps), []);
  const fmtRelative = (iso) => {
    const ms = Date.now() - new Date(iso).getTime();
    const m = Math.floor(ms / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h / 24);
    return `${d}d ago`;
  };
  const fmtBytes = (b) => {
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/1024/1024).toFixed(2) + ' MB';
  };
  const triggerMeta = {
    'auto':              { label: 'Auto-saved',         color: 'var(--green)',     bg: 'var(--green-bg)' },
    'manual':            { label: 'Manual snapshot',    color: 'var(--brand-pink)', bg: 'var(--accent-glow)' },
    'pre-migration':     { label: 'Before test reimport', color: 'var(--orange)',  bg: 'var(--orange-bg)' },
    'pre-resync':        { label: 'Before re-sync',       color: 'var(--orange)',  bg: 'var(--orange-bg)' },
    'pre-restore':       { label: 'Pre-restore backup',   color: 'var(--blue)',    bg: 'var(--blue-bg)' },
    'pre-forcepull':     { label: 'Before force-pull',    color: 'var(--orange)',  bg: 'var(--orange-bg)' },
    'pre-removeleavers': { label: 'Before remove leavers',color: 'var(--orange)',  bg: 'var(--orange-bg)' },
  };
  const sorted = [...snaps].sort((a,b) => (b.at || '').localeCompare(a.at || ''));
  // Inspect a snapshot's payload and produce a human summary like
  // "Y7-8: 28 · Y9-10: 35 · Y11-12: 0 · sessions: 14 · drills: 12"
  // so coaches can spot which snapshots actually have squad/session data
  // (vs. snapshots taken after a wipe that captured empty state).
  const inspectSnap = (snap) => {
    const data = (snap && snap.data) || {};
    const tryParse = (s, def) => { try { const p = JSON.parse(s || 'null'); return p == null ? def : p; } catch(e) { return def; } };
    const len = (s) => { const p = tryParse(s, []); return Array.isArray(p) ? p.length : 0; };
    const objLen = (s) => { const p = tryParse(s, {}); return p && typeof p === 'object' ? Object.keys(p).length : 0; };
    const parts = {
      '7-8': len(data['playiq_7-8_squad_v3']),
      '9-10': len(data['playiq_9-10_squad_v3']),
      '11-12': len(data['playiq_11-12_squad_v3']),
    };
    const teams = ['7-8-cup','7-8-challenge','9-10-cup','9-10-challenge','11-12-cup','11-12-challenge'];
    let totalSessions = 0; let totalCoverage = 0;
    teams.forEach(t => {
      totalSessions += objLen(data[`playiq_${t}_customActivities`]);
      totalCoverage += objLen(data[`playiq_${t}_coverageData`]);
    });
    const drills = objLen(data['playiq_customDrills']);
    const totalPlayers = parts['7-8'] + parts['9-10'] + parts['11-12'];
    const isEmpty = totalPlayers === 0 && totalSessions === 0 && drills === 0;
    return { parts, totalPlayers, totalSessions, totalCoverage, drills, isEmpty };
  };
  const handleSnapshot = () => {
    const reason = window.prompt('Optional label for this snapshot:', '');
    if (reason === null) return; // cancelled
    versionHistory.snapshot('manual', reason || 'Manual snapshot', true);
  };
  const handleRestore = (snap) => {
    const niceTime = new Date(snap.at).toLocaleString();
    const info = inspectSnap(snap);
    if (info.isEmpty) {
      if (!window.confirm(`⚠️ This snapshot looks EMPTY (no players, no sessions, no drills).\n\nRestoring it would wipe your current data with empty data. This is probably not what you want — pick a snapshot from earlier with actual content.\n\nDo you still want to restore?`)) return;
    } else if (!window.confirm(`Restore to ${niceTime}?\n\nThis snapshot contains:\n• Year 7-8 squad: ${info.parts['7-8']} players\n• Year 9-10 squad: ${info.parts['9-10']} players\n• Year 11-12 squad: ${info.parts['11-12']} players\n• Custom sessions: ${info.totalSessions}\n• Custom drills: ${info.drills}\n\nIt will replace your current data. The current state is auto-backed up first.\n\nPage will reload. Other coaches will see the restored state on their next sync.`)) return;
    const result = versionHistory.restore(snap.id);
    if (!result.ok) { alert('Restore failed: ' + result.error); return; }
    // Force a flush of any pending push BEFORE the reload, so the restored
    // data definitely lands on the cloud bin and survives the reload's pull.
    setTimeout(() => window.location.reload(), 1800);
  };
  const handleDelete = (snap) => {
    if (!window.confirm('Delete this snapshot? This cannot be undone.')) return;
    versionHistory.deleteSnapshot(snap.id);
  };
  const handleExport = () => {
    try {
      const r = exportFullSnapshot();
      console.log('[backup] exported', r.keyCount, 'keys');
    } catch(e) {
      alert('Export failed: ' + (e && e.message));
    }
  };
  const fileInputRef = React.useRef(null);
  const handleImportClick = () => { if (fileInputRef.current) fileInputRef.current.click(); };
  const handleImportFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    e.target.value = ''; // allow re-picking same file
    if (!window.confirm(`Restore from "${file.name}"?\n\nThis will replace ALL planner data on this device with the contents of the backup file.\n\nThe current state is auto-backed up to Version History first, so this can be undone.\n\nPage will reload after restore.`)) return;
    try {
      const result = await importFullSnapshot(file);
      alert(`✓ Restored ${result.applied} keys${result.exportedAt ? '\n\nBackup was taken: ' + new Date(result.exportedAt).toLocaleString() : ''}${result.exportedBy ? '\nBy: ' + result.exportedBy : ''}\n\nReloading...`);
      setTimeout(() => window.location.reload(), 800);
    } catch(err) {
      alert('Import failed: ' + (err && err.message));
    }
  };
  const totalSize = snaps.reduce((s, x) => s + (x.size || 0), 0);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width:780, maxWidth:'95vw', maxHeight:'92vh', overflowY:'auto'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12, marginBottom:14, flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:11, fontWeight:700, color:'var(--brand-pink)', textTransform:'uppercase', letterSpacing:1.5}}>Safety net</div>
            <div style={{fontSize:20, fontWeight:800, marginTop:2}}>Version history</div>
            <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>
              Restore to a previous state if data is lost or overwritten. Auto-snapshots happen every 10 min of activity and before any destructive operation. The last {HISTORY_MAX_SNAPSHOTS} snapshots are kept.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'1px solid var(--border)', color:'var(--text-muted)', cursor:'pointer', fontSize:18, fontWeight:700, padding:'4px 12px', borderRadius:8, fontFamily:'inherit'}}>×</button>
        </div>

        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 12px', background:'var(--bg-input)', borderRadius:8, marginBottom:10, flexWrap:'wrap', gap:8}}>
          <div style={{fontSize:11, color:'var(--text-muted)', fontWeight:600}}>
            {snaps.length} snapshot{snaps.length === 1 ? '' : 's'} · {fmtBytes(totalSize)} total
          </div>
          <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
            <button onClick={handleExport} title="Download a JSON backup of all planner data on this device. Email it, drop it in Drive, or hand it to another coach — they can restore it any time." style={{padding:'5px 12px', fontSize:11, fontWeight:700, borderRadius:6, border:'1px solid var(--brand-cyan)', background:'transparent', color:'var(--brand-cyan)', cursor:'pointer', fontFamily:'inherit'}}>
              ⬇ Download backup
            </button>
            <button onClick={handleImportClick} title="Restore from a backup file shared by another coach (or one you saved earlier). Current state is auto-backed up first." style={{padding:'5px 12px', fontSize:11, fontWeight:700, borderRadius:6, border:'1px solid var(--brand-cyan)', background:'transparent', color:'var(--brand-cyan)', cursor:'pointer', fontFamily:'inherit'}}>
              ⬆ Restore from file
            </button>
            <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleImportFile} style={{display:'none'}} />
            <button onClick={handleSnapshot} style={{padding:'5px 12px', fontSize:11, fontWeight:700, borderRadius:6, border:'1px solid var(--brand-pink)', background:'var(--brand-pink)', color:'white', cursor:'pointer', fontFamily:'inherit'}}>
              + Save snapshot now
            </button>
          </div>
        </div>

        {sorted.length === 0 ? (
          <div style={{padding:24, textAlign:'center', color:'var(--text-muted)', fontSize:13}}>
            No snapshots yet. The first auto-save will happen after the next cloud sync, or click "Save snapshot now" to create one immediately.
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {sorted.map((snap, idx) => {
              const meta = triggerMeta[snap.trigger] || { label: snap.trigger || 'Snapshot', color: 'var(--text-muted)', bg: 'var(--bg-input)' };
              const isLatest = idx === 0;
              const niceTime = new Date(snap.at).toLocaleString('en-AU', { day:'numeric', month:'short', hour:'numeric', minute:'2-digit' });
              const info = inspectSnap(snap);
              const summary = info.isEmpty
                ? '⚠ Empty — no players, sessions or drills'
                : `${info.totalPlayers} players (Y7-8 ${info.parts['7-8']} · Y9-10 ${info.parts['9-10']} · Y11-12 ${info.parts['11-12']}) · ${info.totalSessions} sessions · ${info.drills} drills`;
              return (
                <div key={snap.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:info.isEmpty ? 'var(--red-bg)' : 'var(--bg-card)', border:'1px solid ' + (info.isEmpty ? 'var(--red)' : 'var(--border)'), borderRadius:8, borderLeft:`4px solid ${info.isEmpty ? 'var(--red)' : meta.color}`}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:'flex', alignItems:'baseline', gap:8, flexWrap:'wrap'}}>
                      <span style={{fontSize:13, fontWeight:800, color:'var(--text-primary)'}}>{niceTime}</span>
                      <span style={{fontSize:11, color:'var(--text-muted)'}}>{fmtRelative(snap.at)}</span>
                      {isLatest && <span style={{fontSize:9, fontWeight:700, color:'var(--green)', background:'var(--green-bg)', padding:'2px 6px', borderRadius:10}}>LATEST</span>}
                    </div>
                    <div style={{display:'flex', alignItems:'center', gap:8, marginTop:3, fontSize:11, color:'var(--text-muted)', flexWrap:'wrap'}}>
                      <span style={{fontWeight:700, color:meta.color, background:meta.bg, padding:'2px 8px', borderRadius:10, fontSize:10}}>{meta.label}</span>
                      {snap.reason && <span style={{fontStyle:'italic'}}>{snap.reason}</span>}
                    </div>
                    <div style={{marginTop:5, fontSize:11, color: info.isEmpty ? 'var(--red)' : 'var(--text-primary)', fontWeight: info.isEmpty ? 700 : 600}}>
                      {summary}
                    </div>
                    <div style={{marginTop:2, fontSize:10, color:'var(--text-muted)'}}>{snap.keys} keys · {fmtBytes(snap.size)}</div>
                  </div>
                  <button
                    onClick={() => handleRestore(snap)}
                    style={{padding:'6px 12px', fontSize:11, fontWeight:700, borderRadius:6, border:'1px solid ' + (info.isEmpty ? 'var(--text-muted)' : 'var(--brand-cyan)'), background:'transparent', color: info.isEmpty ? 'var(--text-muted)' : 'var(--brand-cyan)', cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap'}}
                  >
                    Restore
                  </button>
                  <button
                    onClick={() => handleDelete(snap)}
                    title="Delete this snapshot"
                    style={{padding:'6px 8px', fontSize:11, fontWeight:700, borderRadius:6, border:'1px solid var(--border)', background:'transparent', color:'var(--text-muted)', cursor:'pointer', fontFamily:'inherit'}}
                  >
                    ×
                  </button>
                </div>
              );
            })}
          </div>
        )}

        <div style={{marginTop:14, padding:10, background:'var(--bg-input)', borderRadius:8, fontSize:10, color:'var(--text-muted)', lineHeight:1.5}}>
          <strong>How this works:</strong> Snapshots are saved on this browser only (localStorage). Restoring overwrites all planner data on this device, then pushes to the cloud so other coaches will adopt the restored state on their next sync (within ~30 sec). The current state is always backed up before restore.
          <br/><br/>
          <strong>Sharing safely:</strong> Use <em>Download backup</em> to save a JSON file of your current state — email it, drop it in Drive, or hand it to another coach. They can use <em>Restore from file</em> to load it, no sync required. Their current state is auto-backed up first so they can undo. This is the safest way to push out a known-good copy without risking the cloud state.
        </div>
      </div>
    </div>
  );
}

// Compute which season week today falls in, given a team's seasonConfig.
// Returns a week string ("1".."N"); falls back to "1" if no config or today is before/after the season.
function computeCurrentWeek(seasonConfig) {
  if (!seasonConfig || !seasonConfig.startDate || !seasonConfig.totalWeeks) return "1";
  const start = new Date(seasonConfig.startDate);
  if (isNaN(start.getTime())) return "1";
  const today = new Date();
  // Normalize both to midnight to avoid off-by-one near midnight
  start.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return "1"; // season hasn't started yet
  const wk = Math.floor(diffDays / 7) + 1;
  const total = Number(seasonConfig.totalWeeks) || 10;
  if (wk > total) return String(total); // past the end — pin to last week
  return String(wk);
}

function App() {
  const [activeTab, setActiveTab] = useState("planner");
  // Tab-switch progress bar: a 2px pink bar that flashes left→right across the
  // top of the page for ~600ms whenever the user changes tabs. Just enough to
  // acknowledge the click — no actual "loading" happens (tab content is in-app).
  const [tabSwitchLoading, setTabSwitchLoading] = useState(false);
  useEffect(() => {
    setTabSwitchLoading(true);
    const t = setTimeout(() => setTabSwitchLoading(false), 600);
    return () => clearTimeout(t);
  }, [activeTab]);
  // selectedWeek defaults to whichever week today falls in for the *current team's* season.
  // Read seasonConfig out of localStorage here so this fires synchronously before first render.
  const [selectedWeek, setSelectedWeek] = useState(() => {
    try {
      const team = localStorage.getItem('playiq_currentTeam') || '9-10-cup';
      const cfg = JSON.parse(localStorage.getItem(`playiq_${team}_seasonConfig`) || 'null');
      return computeCurrentWeek(cfg);
    } catch(e) { return "1"; }
  });
  // Teams — each team has its own scoped data (squad, sessions, notes, etc.)
  const AGE_GROUPS = [
    { id: '7-8',   label: 'Years 7/8',   short: '7/8'   },
    { id: '9-10',  label: 'Years 9/10',  short: '9/10'  },
    { id: '11-12', label: 'Years 11/12', short: '11/12' }
  ];
  const SUB_TEAMS = ['Cup', 'Challenge'];
  const TEAMS = AGE_GROUPS.flatMap(g => SUB_TEAMS.map(s => ({ id: `${g.id}-${s.toLowerCase()}`, label: `${g.label} ${s}`, short: g.short, sub: s, group: g.id })));
  const [currentTeam, setCurrentTeam] = useState(() => localStorage.getItem('playiq_currentTeam') || '9-10-cup');
  const currentGroup = AGE_GROUPS.find(g => currentTeam.startsWith(g.id)) || AGE_GROUPS[1];
  const currentSub = currentTeam.endsWith('-challenge') ? 'Challenge' : 'Cup';
  const teamKey = (k) => `playiq_${currentTeam}_${k}`;

  // One-time migration: move legacy un-scoped data into the default team (9-10)
  useEffect(() => {
    if (localStorage.getItem('playiq_migrated_v1')) return;
    const legacyKeys = ['customActivities', 'coverageData', 'weekOverrides', 'blueprintLoaded',
                        'squad', 'sessionReviews', 'seasonConfig', 'weekDays',
                        'plannerNotes', 'weeklyGoals'];
    for (const k of legacyKeys) {
      const legacy = localStorage.getItem(`playiq_${k}`);
      if (legacy !== null && legacy !== undefined) {
        const scoped = `playiq_9-10_${k}`;
        if (!localStorage.getItem(scoped)) localStorage.setItem(scoped, legacy);
      }
    }
    localStorage.setItem('playiq_migrated_v1', 'true');
  }, []);

  // Migration v2: copy old team-scoped data (e.g. playiq_9-10_X) into Cup sub-team (playiq_9-10-cup_X)
  useEffect(() => {
    if (localStorage.getItem('playiq_migrated_v2')) return;
    const dataKeys = ['customActivities', 'coverageData', 'weekOverrides', 'blueprintLoaded',
                      'squad', 'sessionReviews', 'seasonConfig', 'weekDays',
                      'plannerNotes', 'weeklyGoals', 'sessionStartTime'];
    ['7-8', '9-10', '11-12'].forEach(gid => {
      for (const k of dataKeys) {
        const old = localStorage.getItem(`playiq_${gid}_${k}`);
        if (old !== null) {
          const cupKey = `playiq_${gid}-cup_${k}`;
          if (!localStorage.getItem(cupKey)) localStorage.setItem(cupKey, old);
        }
      }
    });
    localStorage.setItem('playiq_migrated_v2', 'true');
  }, []);

  // Migration v3: squad becomes shared at year-group level; per-team rosters track Cup/Challenge 18s
  useEffect(() => {
    if (localStorage.getItem('playiq_migrated_v3')) return;
    const genId = () => 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    ['7-8', '9-10', '11-12'].forEach(gid => {
      const groupSquadKey = `playiq_${gid}_squad_v3`;
      if (localStorage.getItem(groupSquadKey)) return; // already migrated
      const cupSquad = (() => { try { return JSON.parse(localStorage.getItem(`playiq_${gid}-cup_squad`) || '[]'); } catch(e) { return []; } })();
      const chalSquad = (() => { try { return JSON.parse(localStorage.getItem(`playiq_${gid}-challenge_squad`) || '[]'); } catch(e) { return []; } })();
      // Merge: dedupe by lowercased name, assign stable _id, preserve fields from first occurrence
      const merged = [];
      const byName = new Map();
      const addOne = (p) => {
        const key = (p.name || '').trim().toLowerCase();
        if (!key) return null;
        if (byName.has(key)) return byName.get(key);
        const _id = p._id || genId();
        const player = { _id, name: p.name, number: p.number || '', position: p.position || '', available: p.available !== false };
        byName.set(key, _id);
        merged.push(player);
        return _id;
      };
      const cupIds = cupSquad.map(addOne).filter(Boolean);
      const chalIds = chalSquad.map(addOne).filter(Boolean);
      localStorage.setItem(groupSquadKey, JSON.stringify(merged));
      // Seed rosters with whoever was previously in each team's squad
      if (cupIds.length && !localStorage.getItem(`playiq_${gid}-cup_roster`)) {
        localStorage.setItem(`playiq_${gid}-cup_roster`, JSON.stringify(cupIds));
      }
      if (chalIds.length && !localStorage.getItem(`playiq_${gid}-challenge_roster`)) {
        localStorage.setItem(`playiq_${gid}-challenge_roster`, JSON.stringify(chalIds));
      }
    });
    localStorage.setItem('playiq_migrated_v3', 'true');
    // Reload current view from migrated keys
    try { setSquad(JSON.parse(localStorage.getItem(`playiq_${currentGroup.id}_squad_v3`) || '[]')); } catch(e) {}
    try { setRoster(JSON.parse(localStorage.getItem(`playiq_${currentTeam}_roster`) || '[]')); } catch(e) {}
  }, []);

  // (Phase 4 hook: when Supabase Realtime is wired up, re-hydrate React state
  // from the just-written localStorage values here so other coaches' edits
  // appear without a page reload. For now, reload-on-refresh is the model.)

  // Migration: move old `profile.gymTests` array entries (from earlier bulk imports
  // and manual one-off rows) into the `profile.testHistory` map so they appear in the
  // progression charts. Runs once per browser, then never again.
  useEffect(() => {
    if (localStorage.getItem('playiq_gymtests_migrated_v1')) return;
    const cleanSprint = (v) => {
      if (typeof v !== 'string') return v;
      const m = v.match(/^0:0:(\d+):(\d{1,2})$/);
      if (m) return `${m[1]}.${m[2].padStart(2,'0')}`;
      return v;
    };
    let migrated = 0;
    for (const yg of ['7-8','9-10','11-12']) {
      const key = `playiq_${yg}_squad_v3`;
      let squad;
      try { squad = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { continue; }
      let groupChanged = false;
      squad = squad.map(p => {
        if (!p || !p.profile || !Array.isArray(p.profile.gymTests) || p.profile.gymTests.length === 0) return p;
        const profile = { ...p.profile };
        profile.testHistory = (profile.testHistory && typeof profile.testHistory === 'object')
          ? { ...profile.testHistory } : {};
        const remaining = [];
        for (const t of profile.gymTests) {
          if (!t || typeof t !== 'object' || !t.test || !t.date || t.value == null || t.value === '') {
            if (t) remaining.push(t);
            continue;
          }
          const testName = t.test;
          let val = String(t.value).trim();
          if (!val) { remaining.push(t); continue; }
          if (['10m Sprint','20m Sprint','40m Sprint'].includes(testName)) val = cleanSprint(val);
          profile.testHistory[testName] = (profile.testHistory[testName] || []).slice();
          if (!profile.testHistory[testName].some(([d]) => d === t.date)) {
            profile.testHistory[testName].push([t.date, val]);
            migrated++;
          }
        }
        Object.keys(profile.testHistory).forEach(tn => {
          profile.testHistory[tn].sort((a,b) => (a[0]||'').localeCompare(b[0]||''));
        });
        profile.gymTests = remaining;
        groupChanged = true;
        return { ...p, profile };
      });
      if (groupChanged) localStorage.setItem(key, JSON.stringify(squad));
    }
    localStorage.setItem('playiq_gymtests_migrated_v1', JSON.stringify({ when: new Date().toISOString(), migrated }));
    try { setSquad(JSON.parse(localStorage.getItem(`playiq_${currentGroup.id}_squad_v3`) || '[]')); } catch(e){}
    console.log('[Keebra] gymTests → testHistory migration:', migrated, 'entries moved');
  }, []);

  // Historical test data import (2025-2026 testing, 4-term compiled v2) — cross-year matching.
  // v11: WIPE-AND-REPLACE — refreshed Excel + corrected term test dates.
  //   T3 2025: 2025-07-16  (was 2025-08-01)
  //   T4 2025: 2025-10-23  (was 2025-11-01)
  //   T1 2026: 2026-02-10  (was 2026-02-01)
  //   T2 2026: 2026-05-18  (was 2026-05-01)
  // Bumped v10 → v11 to refresh every browser with the real testing dates.
  // Wipes testHistory and gymTests, auto-adds any missing athletes
  // (Y7/Y8 → 7-8, Y9/Y10 → 9-10), then attaches the compiled test data
  // — applying normalizeTestValue on every entry.
  // Runs once per browser (gated by playiq_test_import_v11). Self-healing fallback:
  // if the flag is set but no history exists anywhere, re-run.
  useEffect(() => {
    if (typeof TEST_IMPORT_DATA === 'undefined' || !TEST_IMPORT_DATA.data) return;
    const FLAG = 'playiq_test_import_v11';
    const ALL_YGS = ['7-8', '9-10', '11-12'];
    const flagSet = !!localStorage.getItem(FLAG);
    if (flagSet) {
      // Self-heal: if any player has history, we've successfully seeded — skip.
      const hasAnyHistory = ALL_YGS.some(yg => {
        try {
          const sq = JSON.parse(localStorage.getItem(`playiq_${yg}_squad_v3`) || '[]');
          return sq.some(p => p?.profile?.testHistory && Object.keys(p.profile.testHistory).length > 0);
        } catch(e) { return false; }
      });
      if (hasAnyHistory) return;
      // Otherwise (flag set but no history anywhere) — fall through and re-run.
    }

    const flipName = (n) => {
      if (!n) return n;
      if (n.includes(',')) { const p = n.split(',').map(x=>x.trim()); if (p.length===2 && p[0] && p[1]) return p[1]+' '+p[0]; }
      return n;
    };
    const norm = (n) => flipName(n||'').toLowerCase().replace(/[^a-z0-9]/g,'');
    const cleanSprint = (v) => {
      if (typeof v !== 'string') return v;
      const m = v.match(/^0:0:(\d+):(\d{1,2})$/);
      if (m) return `${m[1]}.${m[2].padStart(2,'0')}`;
      return v;
    };

    // Load squads
    const squads = {};
    for (const yg of ALL_YGS) {
      try { squads[yg] = JSON.parse(localStorage.getItem(`playiq_${yg}_squad_v3`) || '[]'); }
      catch(e) { squads[yg] = []; }
    }

    // Layer 1 safety net: snapshot the current state BEFORE we wipe so coaches
    // can restore in-app imports or any data this migration is about to replace.
    try { versionHistory.snapshot('pre-migration', 'Before v11 test data wipe + reimport', true); } catch(e) {}

    // STEP 1 (v9): WIPE existing testHistory AND legacy gymTests on every player.
    // Per user instruction, the embedded v2 Excel is the sole source of truth on the
    // live site — any prior stored test data is replaced.
    let wiped = 0;
    for (const yg of ALL_YGS) {
      squads[yg] = squads[yg].map(p => {
        if (!p || !p.profile) return p;
        const hasHist = p.profile.testHistory && Object.keys(p.profile.testHistory).length > 0;
        const hasGym = Array.isArray(p.profile.gymTests) && p.profile.gymTests.length > 0;
        if (!hasHist && !hasGym) return p;
        if (hasHist || hasGym) wiped++;
        return { ...p, profile: { ...p.profile, testHistory: {}, gymTests: [] } };
      });
    }

    // STEP 2: Build global index across ALL year groups (players may have aged up)
    const globalIdx = new Map(); // normKey -> { yg, playerIdx }
    for (const yg of ALL_YGS) {
      squads[yg].forEach((p, i) => { if (p && p.name) globalIdx.set(norm(p.name), { yg, playerIdx: i }); });
    }
    const findFuzzy = (importedName) => {
      const flipped = flipName(importedName);
      const tokens = flipped.toLowerCase().split(/[\s,\-']+/).filter(Boolean);
      const first = tokens[0], last = tokens[tokens.length - 1];
      if (!first || !last || first === last) return null;
      const matches = [];
      for (const yg of ALL_YGS) {
        squads[yg].forEach((p, i) => {
          if (!p || !p.name) return;
          const pn = p.name.toLowerCase();
          if (pn.includes(last) && pn.includes(first)) matches.push({ yg, playerIdx: i });
        });
      }
      return matches.length === 1 ? matches[0] : null;
    };

    const tests = TEST_IMPORT_DATA.tests;
    const summary = { wiped, matched: 0, crossYear: 0, fuzzy: 0, added: 0, addedNames: [], entriesAdded: 0, schoolYearSet: 0 };

    // Helpers for adding new athletes
    const genId = () => 'p_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    const targetYgForSchoolYear = (sy) => {
      const n = parseInt(sy, 10);
      if (n === 7 || n === 8) return '7-8';
      if (n === 9 || n === 10) return '9-10';
      if (n === 11 || n === 12) return '11-12';
      return null;
    };

    // STEP 3: Import — new format: data[yg][name] = { schoolYear, terms: [[date, [vals]], ...] }
    for (const sheetYg of Object.keys(TEST_IMPORT_DATA.data)) {
      const sheetPlayers = TEST_IMPORT_DATA.data[sheetYg] || {};
      for (const [importedName, playerData] of Object.entries(sheetPlayers)) {
        if (!playerData) continue;
        let match = globalIdx.get(norm(importedName));
        if (!match) {
          match = findFuzzy(importedName);
          if (match) summary.fuzzy++;
        }
        if (!match) {
          // No existing player — auto-add to the proper year group based on schoolYear,
          // falling back to the sheet's year group.
          const targetYg = targetYgForSchoolYear(playerData.schoolYear) || sheetYg;
          if (!ALL_YGS.includes(targetYg)) {
            summary.added++; summary.addedNames.push(`${importedName} (no target yg)`);
            continue;
          }
          const newPlayer = {
            _id: genId(),
            name: flipName(importedName), // "Last, First" -> "First Last"
            number: '',
            position: '',
            available: true,
            schoolYear: playerData.schoolYear || undefined,
            profile: { testHistory: {} },
          };
          squads[targetYg].push(newPlayer);
          const newIdx = squads[targetYg].length - 1;
          // Register in the global index so subsequent lookups find them
          globalIdx.set(norm(newPlayer.name), { yg: targetYg, playerIdx: newIdx });
          match = { yg: targetYg, playerIdx: newIdx };
          summary.added++;
          summary.addedNames.push(`${newPlayer.name} → ${targetYg}`);
        } else {
          if (match.yg !== sheetYg) summary.crossYear++;
          summary.matched++;
        }
        const player = squads[match.yg][match.playerIdx];
        player.profile = player.profile || {};
        player.profile.testHistory = (player.profile.testHistory && typeof player.profile.testHistory === 'object') ? player.profile.testHistory : {};
        // Set schoolYear on the player from the imported data (if missing or different)
        if (playerData.schoolYear && player.schoolYear !== playerData.schoolYear) {
          player.schoolYear = playerData.schoolYear;
          summary.schoolYearSet++;
        }
        const terms = Array.isArray(playerData.terms) ? playerData.terms : [];
        for (const block of terms) {
          if (!Array.isArray(block) || block.length < 2) continue;
          const date = block[0];
          const vals = block[1];
          if (!Array.isArray(vals)) continue;
          for (let i = 0; i < tests.length; i++) {
            const tn = tests[i];
            let val = normalizeTestValue(tn, vals[i]);
            if (val == null || String(val).trim() === '') continue;
            player.profile.testHistory[tn] = player.profile.testHistory[tn] || [];
            if (!player.profile.testHistory[tn].some(([d]) => d === date)) {
              player.profile.testHistory[tn].push([date, val]);
              summary.entriesAdded++;
            }
          }
        }
        Object.keys(player.profile.testHistory).forEach(tn => {
          player.profile.testHistory[tn].sort((a,b) => a[0].localeCompare(b[0]));
        });
      }
    }
    // STEP 4: Final normalization sweep across every player's testHistory.
    // Catches any leftover legacy values (decimal Bronco, H:MM:SS Max Hang, etc.) that
    // may have escaped the wipe via cloud-sync timing.
    let normalized = 0;
    for (const yg of ALL_YGS) {
      squads[yg].forEach(p => {
        const hist = p?.profile?.testHistory;
        if (!hist || typeof hist !== 'object') return;
        Object.keys(hist).forEach(tn => {
          const arr = hist[tn] || [];
          for (let i = 0; i < arr.length; i++) {
            const entry = arr[i];
            if (!Array.isArray(entry) || entry.length < 2) continue;
            const before = entry[1];
            const after = normalizeTestValue(tn, before);
            if (after !== before) { arr[i] = [entry[0], after]; normalized++; }
          }
        });
      });
    }
    summary.normalized = normalized;
    for (const yg of ALL_YGS) {
      localStorage.setItem(`playiq_${yg}_squad_v3`, JSON.stringify(squads[yg]));
    }
    localStorage.setItem(FLAG, JSON.stringify({ when: new Date().toISOString(), summary }));
    try { setSquad(JSON.parse(localStorage.getItem(`playiq_${currentGroup.id}_squad_v3`) || '[]')); } catch(e) {}
    console.log('[Keebra] 2025-2026 test data import (v11 wipe + replace, real term dates):', summary);
  }, []);

        if (data.coverageData) setCoverageData(data.coverageData);
        if (data.blueprintLoaded !== undefined) setBlueprintLoaded(data.blueprintLoaded);

        if (data.squad) setSquad(data.squad);
        if (data.roster) setRoster(data.roster);
        if (data.sessionReviews) setSessionReviews(data.sessionReviews);
        if (data.seasonConfig) setSeasonConfig(data.seasonConfig);
        if (data.weekDays) setWeekDays(data.weekDays);
        if (data.plannerNotes) setPlannerNotes(data.plannerNotes);
        if (data.weeklyGoals) setWeeklyGoals(data.weeklyGoals);
        if (data.sessionStartTimes) setSessionStartTimes(data.sessionStartTimes);

        triggerSaveIndicator();
      } catch (err) {
        alert('Failed to import data: ' + err.message);

    reader.readAsText(file);

function SessionBuilder({ selectedWeek, setSelectedWeek, selectedDay, setSelectedDay, showAddModal, setShowAddModal, showCopyModal, setShowCopyModal, showPasteModal, setShowPasteModal, customActivities, setCustomActivities, coverageData, setCoverageData, userWeekOverrides, setUserWeekOverrides, seasonWeeks, sessionReviews, setSessionReviews, weekDays, setWeekDays, sessionStartTime, setSessionStartTime, currentTeam, currentGroup, currentSub, customDrills }) {
  const SEASON_WEEKS = seasonWeeks || DEFAULT_SEASON_WEEKS;
  const [draggedIndex, setDraggedIndex] = useState(null);
  const [editingWeekInfo, setEditingWeekInfo] = useState(false);
  const [showNewsletterModal, setShowNewsletterModal] = useState(false);
  const [editingIndex, setEditingIndex] = useState(null);
  const [showGenerateModal, setShowGenerateModal] = useState(false);
  const [showBlockModal, setShowBlockModal] = useState(false);

  const baseWeekData = SEASON_WEEKS.find(w => w.week === selectedWeek);
  // Merge blueprint with user overrides
  const weekData = baseWeekData ? { ...baseWeekData, ...(userWeekOverrides[selectedWeek] || {}) } : null;

  function updateWeekField(field, value) {
    setUserWeekOverrides(prev => ({
      ...prev,
      [selectedWeek]: { ...(prev[selectedWeek] || {}), [field]: value }
    }));
  }
  const sessionDetail = SESSION_DETAILS[selectedWeek];
  const ALL_DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
  // Days for this week come from: weekDays[selectedWeek] if set, otherwise default Tuesday/Thursday
  const days = (weekDays && weekDays[selectedWeek]) || (sessionDetail ? Object.keys(sessionDetail) : ["Tuesday", "Thursday"]);
  const blueprintActivities = sessionDetail ? sessionDetail[selectedDay] || [] : [];
  const customKey = `${selectedWeek}-${selectedDay}`;
  const [showAddDayMenu, setShowAddDayMenu] = useState(false);

  function addWeekDay(day) {
    setWeekDays(prev => {
      const current = prev[selectedWeek] || [...days];
      if (current.includes(day)) return prev;
      // Keep Mon-Sun order
      const updated = ALL_DAYS.filter(d => current.includes(d) || d === day);
      return { ...prev, [selectedWeek]: updated };
    });
    setSelectedDay(day);
    setShowAddDayMenu(false);
  }
  function removeWeekDay(day) {
    setWeekDays(prev => {
      const current = prev[selectedWeek] || [...days];
      const updated = current.filter(d => d !== day);
      if (updated.length === 0) return prev; // keep at least one day
      return { ...prev, [selectedWeek]: updated };
    });
    if (selectedDay === day) {
      const remaining = days.filter(d => d !== day);
      setSelectedDay(remaining[0] || 'Tuesday');
    }
  }
  const defaultDaysForWeek = sessionDetail ? Object.keys(sessionDetail) : ['Tuesday', 'Thursday'];

  // Unified activity list: use custom if exists, otherwise seed from blueprint
  const allActivities = useMemo(() => {
    if (customActivities[customKey]) {
      return customActivities[customKey];
    }
    // Seed from blueprint with default durations
    return blueprintActivities.map(a => ({
      ...a,
      duration: a.duration || 5
    }));
  }, [customActivities[customKey], customKey, blueprintActivities]);

  // recalcTimes is now a top-level function

  // Get activities with recalculated times
  const allActivitiesWithTimes = useMemo(() => {
    return recalcTimes(allActivities, sessionStartTime);
  }, [allActivities, sessionStartTime]);

  // Helper to get the current working list (custom if exists, else blueprint copy)
  function getWorkingList(prev) {
    if (prev[customKey]) return [...prev[customKey]];
    return blueprintActivities.map(a => ({...a, duration: a.duration || 5}));
  }

  function handleAddDrill(drill) {
    const newActivity = {
      ...drill,
      duration: drill.duration || "10"
    };

    setCustomActivities(prev => {
      const current = getWorkingList(prev);
      return {
        ...prev,
        [customKey]: [...current, newActivity]
      };
    });

    // Track coverage based on drill name/category
    const drillName = drill.name || drill.activity || '';
    const matchTargets = (name) => {
      const lowerName = name.toLowerCase();
      if (lowerName.includes('positional') || lowerName.includes('craft')) return 'Positional Skill';
      if (lowerName.includes('skill') || lowerName.includes('passing') || lowerName.includes('carry')) return 'Core Skills';
      if (lowerName.includes('contact') || lowerName.includes('mirroring') || lowerName.includes('tackle')) return 'Contact';
      if (lowerName.includes('game') || lowerName.includes('awareness') || lowerName.includes('decision')) return 'Game Awareness';
      if (lowerName.includes('small sided') || lowerName.includes('ss') || lowerName.includes('con game')) return 'Small Sided Games';
      if (lowerName.includes('gym')) return 'Gym';
      if (lowerName.includes('speed')) return 'Speed';
      if (lowerName.includes('scenario')) return 'Scenarios';
      if (lowerName.includes('pressure')) return 'Pressure';
      if (lowerName.includes('connection') || lowerName.includes('team building')) return 'Connection';
      if (lowerName.includes('standard') || lowerName.includes('expectation')) return 'Expectations';
      return null;
    };

    const target = matchTargets(drillName);
    if (target) {
      setCoverageData(prev => ({
        ...prev,
        [target]: (prev[target] || 0) + 1
      }));
    }

    setShowAddModal(false);
  }

  function handleDeleteActivity(index) {
    setCustomActivities(prev => {
      const current = getWorkingList(prev);
      current.splice(index, 1);
      return { ...prev, [customKey]: current };
    });
  }

  function handleReorder(fromIndex, toIndex) {
    if (fromIndex === toIndex) return;
    setCustomActivities(prev => {
      const newList = getWorkingList(prev);
      const [removed] = newList.splice(fromIndex, 1);
      const adjustedTo = fromIndex < toIndex ? toIndex - 1 : toIndex;
      newList.splice(adjustedTo, 0, removed);
      return { ...prev, [customKey]: newList };
    });
  }

  function handleDurationChange(index, newDuration) {
    setCustomActivities(prev => {
      const newList = getWorkingList(prev);
      newList[index] = { ...newList[index], duration: newDuration };
      return { ...prev, [customKey]: newList };
    });
  }

  function handleActivityFieldChange(index, field, value) {
    setCustomActivities(prev => {

      if (field === null) {

        newList[index] = value;
      } else {
        newList[index] = { ...newList[index], [field]: value };
      }
      return { ...prev, [customKey]: newList };

          <div style={{position:'relative'}}>
            <button className="day-tab" onClick={() => setShowAddDayMenu(!showAddDayMenu)}
              style={{display:'inline-flex', alignItems:'center', gap:6, color:'var(--brand-pink)', borderStyle:'dashed'}}
              title="Add another session day">
              <Icon name="plus" size={13}/> Add day
            </button>
            {showAddDayMenu && (
              <div style={{position:'absolute', top:'100%', right:0, marginTop:6, background:'#fff', border:'1px solid var(--border)', borderRadius:8, boxShadow:'0 4px 16px rgba(0,0,0,0.08)', zIndex:50, minWidth:160, overflow:'hidden'}}>
                {ALL_DAYS.filter(d => !days.includes(d)).map(d => (
                  <div key={d} onClick={() => addWeekDay(d)}
                    style={{padding:'8px 14px', fontSize:13, cursor:'pointer', color:'var(--text-primary)', transition:'background 0.1s'}}
                    onMouseOver={e => e.currentTarget.style.background = 'var(--accent-glow)'}
                    onMouseOut={e => e.currentTarget.style.background = 'transparent'}
                  >{d}</div>
                ))}
                {ALL_DAYS.filter(d => !days.includes(d)).length === 0 && (
                  <div style={{padding:'8px 14px', fontSize:12, color:'var(--text-muted)'}}>All days already added</div>
                )}
              </div>
            )}
          </div>
        </div>

        {allActivities.length > 0 && (
          <div className="session-start-time-wrap">
            <label style={{fontSize:'12px', fontWeight:600, color:'var(--text-secondary)'}}>{selectedDay} start time:</label>
            <input
              type="time"
              className="session-start-time"
              value={sessionStartTime}
              onChange={(e) => setSessionStartTime(e.target.value)}
            />
          </div>
        )}

        {allActivities.length > 0 ? (
          <div className="timeline">
            {allActivitiesWithTimes.map((a, i) => {
              const color = activityColor(a.activity);
              const isTrans = isTransition(a.activity);
              const isParallel = !!a.parallel && i > 0;
              const nextIsParallel = i < allActivitiesWithTimes.length - 1 && !!allActivitiesWithTimes[i+1].parallel;
              const isGroupStart = !isParallel && nextIsParallel;
              const isInRotation = isParallel || nextIsParallel;
              return (
              <div
                key={i}
                className={`timeline-item ${isTrans ? 'transition' : ''} ${draggedIndex === i ? 'dragging' : ''}`}
                style={isTrans ? {} : {
                  border: `1.5px solid ${color.border}`,
                  background: 'var(--bg-input)',
                  marginLeft: isInRotation ? 20 : 0,
                  marginTop: isGroupStart ? 14 : undefined,
                  marginBottom: isParallel && !nextIsParallel ? undefined : (isInRotation ? 6 : undefined)
                }}
                draggable
                onDragStart={() => setDraggedIndex(i)}
                onDragOver={(e) => {
                  e.preventDefault();
                  if (draggedIndex !== null && draggedIndex !== i) {
                    e.currentTarget.classList.add('drag-over');
                  }
                }}
                onDragLeave={(e) => {
                  e.currentTarget.classList.remove('drag-over');
                }}
                onDrop={(e) => {
                  e.preventDefault();
                  e.currentTarget.classList.remove('drag-over');
                  if (draggedIndex !== null && draggedIndex !== i) {
                    handleReorder(draggedIndex, i);
                    setDraggedIndex(null);
                  }
                }}
                onDragEnd={() => {
                  setDraggedIndex(null);
                  document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('drag-over'));
                }}
              >
                <div className="timeline-dot" style={isTrans ? {} : {background: color.dot}} />
                <div style={{display:'flex', alignItems:'flex-start', gap:10, width:'100%'}}>
                  <div className="timeline-drag-handle" onClick={(e) => e.stopPropagation()}>⠿</div>
                  <div style={{flex:1, minWidth:0}} onClick={() => setEditingIndex(i)}>
                    <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                      {a.time && <div className="timeline-time">{a.endTime ? `${a.time} – ${a.endTime}` : a.time}</div>}
                      {isGroupStart && <span style={{display:'inline-flex', alignItems:'center', gap:4, fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:0.5, color:'var(--brand-pink)', background:'rgba(233,91,158,0.12)', padding:'2px 6px', borderRadius:4}}><Icon name="rotate" size={10}/> Rotation / Stations</span>}
                      {isParallel && <span style={{display:'inline-flex', alignItems:'center', gap:4, fontSize:9, fontWeight:800, textTransform:'uppercase', letterSpacing:0.5, color:'var(--brand-pink)', background:'rgba(233,91,158,0.12)', padding:'2px 6px', borderRadius:4}}><Icon name="rotate" size={10}/> Parallel</span>}
                      {!isTrans && color.label && <span style={{fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', color: color.border, opacity:0.8}}>{color.label}</span>}
                    </div>
                    <div className="timeline-activity">{a.activity}</div>
                    <div className="timeline-meta">
                      {a.duration && <span className="timeline-badge badge-duration">{a.duration} min</span>}
                      {a.staff && <span className="timeline-badge badge-staff">{a.staff}</span>}
                      {a.focus && <span className="timeline-badge badge-focus">{a.focus}</span>}
                    </div>
                    {a.notes && <div className="timeline-notes">{a.notes}</div>}
                  </div>
                  <button
                    className="timeline-delete"
                    onClick={(e) => { e.stopPropagation(); handleDeleteActivity(i); }}
                    title="Delete activity"
                  >
                    ×
                  </button>
                </div>
              </div>
            );})}
          </div>
        ) : (
          <div className="empty-state">
            <div>No session plan loaded for this week yet.</div>
            <div style={{fontSize:12, marginTop:6}}>Use "+ Add Drill" to start building, or select a week with a pre-built plan (PS1, PS2, Wk1, GF).</div>
          </div>
        )}
      </div>

      <div className="card" style={{marginTop:4}}>
        <div className="card-title"><Icon name="clipboard" size={15} /> Session Review — Week {selectedWeek}, {selectedDay}</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:'var(--green)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:6, display:'block'}}>Strengths</label>
            <textarea className="form-textarea" value={(sessionReviews[customKey] && sessionReviews[customKey].strengths) || ''} onChange={e => setSessionReviews(prev => ({ ...prev, [customKey]: { ...(prev[customKey] || {}), strengths: e.target.value } }))}
              placeholder="What clicked? Best moments, breakthroughs, wins…" style={{minHeight:90}} />
          </div>
          <div>
            <label style={{fontSize:11, fontWeight:700, color:'var(--orange)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:6, display:'block'}}>Work Ons</label>
            <textarea className="form-textarea" value={(sessionReviews[customKey] && sessionReviews[customKey].workOns) || ''} onChange={e => setSessionReviews(prev => ({ ...prev, [customKey]: { ...(prev[customKey] || {}), workOns: e.target.value } }))}
              placeholder="What needs more reps? Drills to revisit, players to check in on…" style={{minHeight:90}} />
          </div>
        </div>
      </div>

      {showGenerateModal && <GenerateSessionModal onClose={() => setShowGenerateModal(false)} onGenerate={(activities) => {
        setCustomActivities(prev => ({ ...prev, [customKey]: activities }));
        setShowGenerateModal(false);
      }} startTime={sessionStartTime} />}
      {showBlockModal && <GenerateBlockModal onClose={() => setShowBlockModal(false)} customActivities={customActivities} setCustomActivities={setCustomActivities} userWeekOverrides={userWeekOverrides} setUserWeekOverrides={setUserWeekOverrides} />}
      {showAddModal && <AddDrillModal onClose={() => setShowAddModal(false)} onAdd={handleAddDrill} customDrills={customDrills} />}
      {showCopyModal && <CopySessionModal onClose={() => setShowCopyModal(false)} onCopy={handleCopySession} currentWeek={selectedWeek} currentDay={selectedDay} currentTeam={currentTeam} customActivities={customActivities} seasonWeeks={seasonWeeks} />}
      {showPasteModal && <PasteSessionModal onClose={() => setShowPasteModal(false)} onPaste={handlePasteSession} />}
      {showNewsletterModal && (
        <NewsletterModal
          onClose={() => setShowNewsletterModal(false)}
          weekData={weekData}
          weekDays={weekDays}
          customActivities={customActivities}
          selectedWeek={selectedWeek}
          currentGroup={currentGroup}
          currentSub={currentSub}
        />
      )}
      {editingIndex !== null && allActivitiesWithTimes[editingIndex] && (
        <EditActivityModal
          activity={allActivitiesWithTimes[editingIndex]}
          canBeParallel={editingIndex > 0}
          onClose={() => setEditingIndex(null)}
          onSave={(updated) => {
            handleActivityFieldChange(editingIndex, null, updated);
            setEditingIndex(null);
          }}
          onDelete={() => {
            handleDeleteActivity(editingIndex);
            setEditingIndex(null);
          }}
        />
      )}
    </div>
  );
}

function GenerateBlockModal({ onClose, customActivities, setCustomActivities, userWeekOverrides, setUserWeekOverrides }) {
  const allCategories = Object.keys(DRILL_LIBRARY);
  const [selectedCats, setSelectedCats] = useState(['Contact & Defence', 'Core Skills (Drills)', 'Core Skills']);

  // Coaching outcomes the user can pick — these shape the weekly focus narrative
  const outcomeOptions = [
    { id: 'line-speed', label: 'Line Speed', group: 'Defence' },
    { id: 'marker-defence', label: 'Marker Defence', group: 'Defence' },
    { id: 'tackle-technique', label: 'Tackle Technique', group: 'Defence' },
    { id: 'ruck-speed', label: 'Ruck Speed', group: 'Defence' },
    { id: 'edge-defence', label: 'Edge Defence', group: 'Defence' },
    { id: 'goal-line-defence', label: 'Goal Line Defence', group: 'Defence' },
    { id: 'running-lines', label: 'Running Lines', group: 'Attack' },
    { id: 'catch-pass', label: 'Catch & Pass', group: 'Attack' },
    { id: 'set-plays', label: 'Set Plays', group: 'Attack' },
    { id: 'ball-playing', label: 'Ball Playing', group: 'Attack' },
    { id: 'offloads', label: 'Offloads', group: 'Attack' },
    { id: 'yardage', label: 'Yardage / Carries', group: 'Attack' },
    { id: 'kick-chase', label: 'Kick Chase', group: 'Kicking' },
    { id: 'kick-return', label: 'Kick Return', group: 'Kicking' },
    { id: 'short-kicking', label: 'Short Kicking Game', group: 'Kicking' },
    { id: 'game-management', label: 'Game Management', group: 'Mental' },
    { id: 'decision-making', label: 'Decision Making', group: 'Mental' },
    { id: 'communication', label: 'Communication', group: 'Mental' },
    { id: 'conditioning', label: 'Conditioning', group: 'Fitness' },
    { id: 'speed-agility', label: 'Speed & Agility', group: 'Fitness' },
  ];

  const outcomeGroups = ['Defence', 'Attack', 'Kicking', 'Mental', 'Fitness'];
  const [selectedOutcomes, setSelectedOutcomes] = useState(['tackle-technique', 'line-speed']);
  const [startWeekIndex, setStartWeekIndex] = useState(0);
  const [preview, setPreview] = useState(null);

  function toggleCat(cat) {
    setSelectedCats(prev => prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]);
    setPreview(null);
  }
  function toggleOutcome(id) {
    setSelectedOutcomes(prev => prev.includes(id) ? prev.filter(o => o !== id) : [...prev, id]);
    setPreview(null);
  }

  const catIcons = {
    /* catIcons removed — clean text only */
  };

  // Helper to pick random drill
  function pickDrill(categories) {
    const cats = Array.isArray(categories) ? categories : [categories];
    const available = [];
    for (const cat of cats) {
      if (DRILL_LIBRARY[cat]) {
        available.push(...DRILL_LIBRARY[cat].drills);
      }
    }
    if (available.length === 0) return null;
    return available[Math.floor(Math.random() * available.length)];
  }

  // Build the 5-week progression from user selections
  function buildProgression() {
    const outcomeLabels = selectedOutcomes.map(id => outcomeOptions.find(o => o.id === id)?.label).filter(Boolean);
    const focusText = outcomeLabels.length > 0 ? outcomeLabels.join(', ') : 'General';

    // Warm-up cats: prefer Speed & Mobility if selected
    const warmCats = selectedCats.includes('Speed & Mobility') ? ['Speed & Mobility'] : selectedCats;
    // Skill cats: prefer Core Skills if selected
    const skillCatOptions = selectedCats.filter(c => c.includes('Core Skills'));
    const skillCats = skillCatOptions.length > 0 ? skillCatOptions : selectedCats;
    // Game cats: prefer game categories if selected
    const gameCatOptions = selectedCats.filter(c => c.includes('Game') || c.includes('Conditioned'));
    const gameCats = gameCatOptions.length > 0 ? gameCatOptions : selectedCats;

    return [
      {
        title: 'Individual Foundations',
        description: 'Basic skills in isolation — high reps, low pressure',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: ['Small Sided Games'].filter(c => DRILL_LIBRARY[c]).length > 0 ? ['Small Sided Games'] : gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Individual Foundations — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — individual technique, low contact, high rep' : 'Basic individual skills, low contact high rep')
      },
      {
        title: 'Unit Combinations',
        description: 'Pairs & small groups — building connections',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats.length > 0 ? gameCats : ['Small Sided Games'],
        warmCats: warmCats,
        weekOverrideFocus: 'Unit Combinations — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — 2v1 combos, partnerships, moderate contact' : '2v1 combos, partnerships, moderate contact')
      },
      {
        title: 'Phase & Structure',
        description: 'Team structure and phase play',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Phase & Structure — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — team shapes, defensive systems, building contact' : 'Set plays, attacking shapes, defensive structure')
      },
      {
        title: 'Pressure & Decision Making',
        description: 'Adding defensive pressure to everything',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Pressure & Decision Making — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — opposed, decision under fatigue, full contact' : 'Opposed attack, decision making under pressure, full contact')
      },
      {
        title: 'Full Game Integration',
        description: 'Putting it all together — game-like scenarios',
        skillCats: skillCats,
        mainCats: selectedCats,
        gameCats: gameCats,
        warmCats: warmCats,
        weekOverrideFocus: 'Full Game Integration — ' + focusText,
        weekOverrideOutcomes: outcomeLabels.slice(0, 3).join(', ') + (outcomeLabels.length > 0 ? ' — full simulation, transitions, match intensity' : 'Full game simulation, transitions, match intensity')
      }
    ];
  }

  // Generate a single 60-min session
  function generateSession(prog) {
    const warmUp = pickDrill(prog.warmCats);
    const skill = pickDrill(prog.skillCats);
    const main1 = pickDrill(prog.mainCats);
    const main2 = pickDrill(prog.mainCats);
    const game = pickDrill(prog.gameCats);

    return [
      { activity: warmUp ? warmUp.name : 'Warm Up', duration: '10', staff: '', focus: 'Warm up', notes: warmUp ? warmUp.notes : 'Movement prep' },
      { activity: 'Transition', duration: '2', staff: '', focus: '', notes: '' },
      { activity: skill ? skill.name : 'Core Skill Block', duration: '10', staff: '', focus: 'Skill', notes: skill ? skill.notes : '' },
      { activity: 'Transition — Drink Break', duration: '3', staff: '', focus: '', notes: '' },
      { activity: main1 ? main1.name : 'Main Theme Block 1', duration: '12', staff: '', focus: prog.title, notes: main1 ? main1.notes : '' },
      { activity: main2 ? main2.name : 'Main Theme Block 2', duration: '8', staff: '', focus: prog.title, notes: main2 ? main2.notes : '' },
      { activity: 'Transition — Drink Break', duration: '2', staff: '', focus: '', notes: '' },
      { activity: game ? game.name : 'Game Situation', duration: '10', staff: '', focus: prog.title + ' — Game', notes: game ? game.notes : '' },
      { activity: 'Circle Breath — Debrief', duration: '3', staff: 'All', focus: 'Reflection', notes: 'What went well, improvements, big ups' },
    ];
  }

  function generateBlock() {
    if (selectedCats.length === 0) return;

    const progression = buildProgression();
    const sessionsMap = {};
    const weekOverrides = {};

    for (let progWeek = 0; progWeek < 5; progWeek++) {
      const seasonWeek = SEASON_WEEKS[startWeekIndex + progWeek];
      if (!seasonWeek) break;

      const weekKey = seasonWeek.week;
      const prog = progression[progWeek];

      sessionsMap[`${weekKey}-Tuesday`] = generateSession(prog);
      sessionsMap[`${weekKey}-Thursday`] = generateSession(prog);

      weekOverrides[weekKey] = {
        focus: prog.weekOverrideFocus,
        outcomes: prog.weekOverrideOutcomes,
        tuesday: prog.title + ' — Tuesday',
        thursday: prog.title + ' — Thursday'
      };
    }

    setPreview({
      sessionsMap,
      weekOverrides,
      selectedWeeks: SEASON_WEEKS.slice(startWeekIndex, startWeekIndex + 5),
      progression
    });
  }

  function commitBlock() {
    if (!preview) return;
    setCustomActivities(prev => ({ ...prev, ...preview.sessionsMap }));
    setUserWeekOverrides(prev => ({ ...prev, ...preview.weekOverrides }));
    onClose();
  }

  const availableStarts = SEASON_WEEKS.length >= 5 ? SEASON_WEEKS.slice(0, SEASON_WEEKS.length - 4) : SEASON_WEEKS;
  const totalDrills = selectedCats.reduce((s, c) => s + (DRILL_LIBRARY[c]?.drills?.length || 0), 0);
  const canGenerate = selectedCats.length > 0;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{width: 740, maxHeight: '90vh', overflowY: 'auto'}}>
        <h3>Generate 5-Week Training Block</h3>
        <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:14}}>
          Pick your drill categories and coaching outcomes, then we'll build a progressive 5-week block (10 sessions) that goes from individual foundations to full game integration.
        </p>

        {/* Start Week */}
        <div className="form-group" style={{marginBottom:14}}>
          <label className="form-label">Start Week</label>
          <select className="form-select" value={startWeekIndex} onChange={e => { setStartWeekIndex(Number(e.target.value)); setPreview(null); }}>
            {availableStarts.map((w, idx) => (
              <option key={w.week} value={idx}>
                {w.week === 'GF' ? 'GF' : w.week.startsWith('PS') ? w.week : `Wk ${w.week}`} — {w.dates}
              </option>
            ))}
          </select>
        </div>

        {/* Drill Categories */}
        <div style={{marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
            <label className="form-label" style={{margin:0}}>Drill Categories</label>
            <div style={{display:'flex', gap:6}}>
              <button onClick={() => { setSelectedCats([...allCategories]); setPreview(null); }} style={{fontSize:10, color:'var(--accent-light)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>All</button>
              <button onClick={() => { setSelectedCats([]); setPreview(null); }} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
            </div>
          </div>
          <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:6}}>{selectedCats.length} selected · {totalDrills} drills available</div>
          <div style={{display:'flex', flexWrap:'wrap', gap:5, maxHeight:130, overflowY:'auto', padding:'2px 0'}}>
            {allCategories.map(cat => {
              const isSelected = selectedCats.includes(cat);
              const drillCount = DRILL_LIBRARY[cat]?.drills?.length || 0;
              return (
                <button key={cat} onClick={() => toggleCat(cat)}
                  style={{
                    padding:'6px 10px', borderRadius:7,
                    border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                    background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                    cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:5, flexShrink:0
                  }}>
                  <span style={{fontSize:10, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{cat}</span>
                  <span style={{fontSize:8, color:'var(--text-muted)'}}>({drillCount})</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Coaching Outcomes */}
        <div style={{marginBottom:14}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
            <label className="form-label" style={{margin:0}}>Coaching Outcomes</label>
            <button onClick={() => { setSelectedOutcomes([]); setPreview(null); }} style={{fontSize:10, color:'var(--text-muted)', background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', fontWeight:600, padding:'2px 6px'}}>Clear</button>
          </div>
          <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:6}}>What do you want this block to develop? These shape the weekly focus and outcomes.</div>
          {outcomeGroups.map(group => {
            const groupOutcomes = outcomeOptions.filter(o => o.group === group);
            return (
              <div key={group} style={{marginBottom:6}}>
                <div style={{fontSize:9, fontWeight:600, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:1, marginBottom:3}}>{group}</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
                  {groupOutcomes.map(o => {
                    const isSelected = selectedOutcomes.includes(o.id);
                    return (
                      <button key={o.id} onClick={() => toggleOutcome(o.id)}
                        style={{
                          padding:'5px 10px', borderRadius:6,
                          border: isSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
                          background: isSelected ? 'var(--accent-glow)' : 'var(--bg-input)',
                          cursor:'pointer', transition:'all 0.15s', display:'flex', alignItems:'center', gap:4, flexShrink:0
                        }}>
                        <span style={{fontSize:10, fontWeight: isSelected ? 700 : 500, color: isSelected ? 'var(--accent-light)' : 'var(--text-primary)', whiteSpace:'nowrap'}}>{o.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Progression Preview (static) */}
        <div style={{background:'var(--bg-input)', borderRadius:8, padding:10, marginBottom:14, border:'1px solid var(--border)'}}>
          <div style={{fontSize:11, fontWeight:600, marginBottom:6, color:'var(--text-primary)'}}>5-Week Progression (Simple → Complex)</div>
          <div style={{display:'flex', gap:4, alignItems:'center'}}>
            {['Individual', 'Unit Combos', 'Phase & Structure', 'Pressure', 'Full Game'].map((label, idx) => (
              <React.Fragment key={idx}>
                <div style={{flex:1, textAlign:'center', padding:'4px 2px', borderRadius:6, background: `rgba(233,91,158,${0.06 + idx * 0.06})`, fontSize:9, fontWeight:600, color:'var(--accent-light)', lineHeight:1.2}}>
                  Wk {idx + 1}<br/><span style={{fontWeight:400, fontSize:8, color:'var(--text-secondary)'}}>{label}</span>
                </div>
                {idx < 4 && <span style={{color:'var(--text-muted)', fontSize:10}}>→</span>}
              </React.Fragment>
            ))}
          </div>
        </div>

        <button className="btn-outline" onClick={generateBlock} style={{marginBottom:12, fontSize:11, width:'100%'}} disabled={!canGenerate}>
          Generate Block
        </button>

        {!canGenerate && (
          <div style={{textAlign:'center', padding:'12px 0', color:'var(--text-muted)', fontSize:12}}>
            Select at least one drill category to generate a block
          </div>
        )}

        {preview && (
          <div>
            <div style={{fontSize:12, fontWeight:600, marginBottom:8, color:'var(--text-primary)'}}>Preview — {preview.selectedWeeks.length} weeks, {preview.selectedWeeks.length * 2} sessions</div>
            <div className="parse-preview" style={{maxHeight:280, overflowY:'auto', marginBottom:12}}>
              {preview.selectedWeeks.map((w, wIdx) => {

                      {w.week === 'GF' ? 'GF' : w.week.startsWith('PS') ? w.week : `Wk ${w.week}`} — {prog.title}
                    </div>
                    <div style={{fontSize:9, color:'var(--text-muted)', marginBottom:4}}>{prog.weekOverrideOutcomes}</div>
                    <div style={{display:'flex', gap:20}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10, color:'var(--text-secondary)', fontWeight:500, marginBottom:3}}>Tuesday</div>
                        {(preview.sessionsMap[`${w.week}-Tuesday`] || []).filter(a => !a.activity.toLowerCase().includes('transition')).slice(0, 4).map((a, i) => (
                          <div key={i} style={{fontSize:9, color:'var(--text-muted)', lineHeight:1.3}}>
                            • {a.duration}m {a.activity.slice(0, 35)}

                        ))}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10, color:'var(--text-secondary)', fontWeight:500, marginBottom:3}}>Thursday</div>
                        {(preview.sessionsMap[`${w.week}-Thursday`] || []).filter(a => !a.activity.toLowerCase().includes('transition')).slice(0, 4).map((a, i) => (
                          <div key={i} style={{fontSize:9, color:'var(--text-muted)', lineHeight:1.3}}>
                            • {a.duration}m {a.activity.slice(0, 35)}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
